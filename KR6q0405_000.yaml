body:
  text: 雪竇石奇禪師全録序遄崇禎丁丑歲冬豫友黎太沖結庵城南煙水關延請石奇禪師師至則掩關焉豫與同邑魏司馬賓吾聞風特往謁師韻格靜遠相對穆然久之而退雖未領玄機然已仰門風高峻矣師啓關後昭陽語録出豫為文序之自是復入天童望重緇海豫牛馬走蹩躠風塵燕豫秦晉靡不洊歷不意大運崩迫皇輿告傾至于今日中間消息茫然江河倒地簸蕩逋遺無有定棲乃復病臥潭西閉戶悲吟有似苦行頭陀師以甲申開山雪竇從荒殘灰燼中寶莊嚴剎每欲追隨道侶走乳峰鏡水中快承色笑而渺不可得惟時形寤寐而已丁酉冬際聞師挂錫南庵賦詩草牘命小兒元萊特往問訊而高詠素札同日俱至古人神交不介而合亦猶是哉師念歲月易逝後會難期乃於返棹歸山之日訪泊荒村魏司馬墓木已拱太沖衰病畏寒不能出戶豫白髮盈巔年臻七十仰瞻黃面瞿曇亦皤然一老矣師謂所見海內諸老淪亡始盡止柴庵一人在耳相對凄然師肯留一日下風問道則曰且靜坐豫曰年已衰邁且種下種子以俟再來師曰又推開豫自惟靜坐之説先儒程子屢言之當仁不讓吾夫子諄諄勉人亦豈有異間乎次日早師坐舟中對語半日商密義則開顏微笑述往事則掩袂長吁行二十里許至小村飯畢握手乃別而竊謂平生良遘支公之於玄度遠公之於淵明風致類然山夫高足語柴庵云歸當為師刻全録幸柴庵為之序豫故述今昔因緣如此師承源臨濟溯派楊岐固支達以上人豫則自附陶許云爾若語録所記大機大用本色接人須上根自悟師二十餘年説法原未嘗著一語豫又何能贊一詞哉淮南遺老吳性撰靈鷲語録原序我天童真子石奇禪師開席靈鷲門下士録其語行世問序於余余聞宋儒有言臨濟正宗應庵密庵真子孫其説法峻峭崷崒下臨雲雨如立千仞之華山蹴天駕空駭心眩目如錢塘海門之濤虎豹股栗屋瓦震動如漢軍昆陽之戰師語則既然矣余尤愛其百尺無枝老幹如鐵似龍門絶頂之孤桐知音外誰則知之昔管大夫慮五衢之民衣弊履穿請以令沐途旁樹枝使無尺寸之陰往來市肆者不得憩樹下戲笑超距者不得憩樹下議論玄語者不得憩樹下期年而民以富饒師正令全提造其室者目不及瞬豈有尺寸陰使人憩足余讀此而歎諸方説禪浩浩皆摘葉尋枝類也天下有道言無枝葉倘所稱直截根源者非耶是故石霜下分為二株一則治璠璵廢碔砆若玉人然一則坐四達聚百怪遺簪墮珥隨所探取若大賈然而子孫光明照人克世其家正脈終歸楊岐者則委曲垂手與直截提持之異也師機用直截如此顧有志住山居恆誦枯木寒林逢春不變之句周海門先生謂先天童曰知命以上師且道風遍界安能深自祕惜耶余於靈鷲亦云或曰師咳唾掉臂作人標格無語可也雄音絶唱詈人裨販無録可也何以序為哉或又曰師塗毒一時語焉而足雷霆百世録焉而足抑何以序為哉余唯唯否否而已同門法弟黃育祺頓首撰雪竇石奇禪師語録目録吳序黃序卷之一台州靈鷲禪寺語録天台景星巖淨居禪寺語録垂問卷之二明州雪竇山資聖禪寺語録卷之三明州雪竇山資聖禪寺語録卷之四明州雪竇山資聖禪寺語録卷之五明州雪竇山資聖禪寺語録卷之六興化普潤禪院語録慈水香山禪寺語録永嘉頭陀山密印禪寺語録婁東南廣禪寺語録小參卷之七問答機緣上卷之八問答機緣下代語卷之九法語上卷之十法語下卷之十下法語頌古卷之十一偈語上卷之十二偈語中卷之十三偈語下囑纍偈歌卷之十四題讚卷之十五佛事附行狀塔銘後序雪竇石奇禪師語録目録終
