body:
  text: 嗣法門人行正等編録住台州靈鷲禪寺語録崇禎十四年師在天童首座寮受請於八月初十日入院三門無見為佛見無門為法門舉起拄杖云大衆還見麼劃一劃便入佛殿水到渠成泥多佛大新長老到來撒開坐具作禮三拜大衆不得蹉過伽藍伽藍土地覿面分明瓣香拈供養出手要殷勤祖師西天東土歷代祖師總在者裏遂插香云急著眼覤方丈卓拄杖云者裏不是毗耶城亦非摩竭國直饒超佛越祖底到來一一從頭打出且道因甚如此喝一喝云明破又爭得衆請上堂拈香云此一瓣香該羅萬有克塞太虛爇向爐中端為祝延今上皇帝聖壽萬歲萬歲萬萬歲伏願壽山聳靈鷲之無窮福海深南溟之不竭次拈云此一瓣香無黨無偏為祥為瑞爇向爐中奉為滿朝文武合國公卿本郡府縣官僚護法檀越諸山耆舊本寺請主等伏願同明般若共證真嘗永護正法毋令斷絶又拈云此一瓣香一往瞻風撥草覓他蹤跡無繇被個沒意智老和尚當頭指出即今拈向爐中奉為現住明州天童山景德禪寺傳曹溪正脈第三十四世密雲大和尚用酬法乳之恩斂衣就座上首白槌云法筵龍象衆當觀第一義師云若論第一義山僧未來靈鷲未出天童時已是花擘了也諸仁作麼生觀有具眼者請出相見僧問十方同聚會個個學無為請問無為作麼生學師云你不在裏許進云因甚麼師云瞎漢僧問昔日世尊靈鷲山擊大法鼓演大法義今日和尚靈鷲寺與靈鷲山是同是別師云天晴日出雨下地濕進云祝聖興揚齊唱和秀峰靈鷲復重新師云也要闍黎證明始得乃云當陽一著獨露分明擬議不來白雲萬里直須豁開頂門正眼透脫生死牢關去住自繇無彼無此更說甚麼孤峰頂上目視雲霄十字街頭入廛垂手直得皇風蕩蕩帝道平平野老謳歌漁樵鼓舞正當恁麼時干戈偃息一句作麼生道明明日月光天德永永山河壯帝居復舉隋時光住持智者大師於大蘇山持誦法華經至藥王品是真精進是名真法供養如來頓悟法華三昧見靈山一會儼然未散師云秪如今日靈鷲寺中四衆臨筵十方聚會大衆見得麼若見靈山一會儼然在目若不見請各散去不勞久立上首白槌云諦觀法王法法王法如是開爐上堂一僧舉坐具云個事分明獨露今朝靈鷲開爐未審如何指點師云紅日當空進云從師釣盡千江月出海金鱗意自如師打云未放你在問承和尚有言無見為佛見某甲即今見山見水歷歷分明是什麼見師云瞎進云見山見水為甚麼道瞎師打云果然乃云爐鞴宏開烹佛祖聖凡齊煆辣鉗錘者回莫作尋常看大衆應須高剔眉當爐莫避見義勇為分明覷透真奇特脫體風流更是誰驀豎拄杖云還見麼直得萬象光輝乾坤獨露縱橫殺活總不繇人把住放行全歸自己如或不然山僧不免重重指點去也還委悉麼杖頭有眼明如日要識真金火裏看擲拄杖下座上堂今朝十一月初一個個眉橫鼻子直現成公案不須參也要諸人自委悉不委悉朝打三千暮打八百直得匝地普天違避不得正當恁麼時如何是直下承當一句還委悉麼霜風撲面來寒威滿衣裓上堂僧問宏開爐鞴水泄不通過量人來如何相見師云放汝三十棒進云驪龍不戀蒼波水鼓翼飛騰遍太清師便打問牛頭未見四祖時如何師云黑漆桶見後如何師云黑潻桶乃云十五日已前也恁麼十五日已後也恁麼正當十五日亦只恁麼正恁麼時不妨道個山是山水是水僧是僧俗是俗更無回互忽若山不是山水不是水僧不是僧俗不是俗十五日已前也不恁麼十五日已後也不恁麼正當十五日亦不恁麼又且如何委悉麼莫守寒巖異草青坐斷白雲宗不妙喝一喝長至上堂僧問一陽復始萬彙蒙新帝德無私乞師顯示師拈拄杖僧云群象森然歸正化當陽獨露布淳風師打云塞煞你眼進云如何是一喝不作一喝用師云禮拜著如何是踞地獅子師云退身有分如何是探竿影草師豎拄杖云還識麼如何是金剛王寶劍師云險僧禮拜云頂門豎亞乾坤眼匼匝風雷掌握中師云腳跟下少一頓在問百丈捲席馬師下座某甲撩衣和尚如何師云休莽鹵進云恁麼則蛟龍海內興波浪猛虎山頭顯大威師便打進云覿面全提則不問四奪家風請示明如何是奪人不奪境師云秀峰高突兀如何是奪境不奪人師云覿面好生看如何是人境俱不奪師云恁麼也得不恁麼也得如何是人境兩俱奪師云恁麼也不得不恁麼也不得進云濟上宗風拈向一邊佛祖來時推他腦後正與麼時賓主酬唱一句作麼生道師云禮拜著進云恁麼則真風蕩蕩歸靈鷲萬古禪林啓秀峰師云也是閒言語問吾有一物千聖不識遂豎拳云和尚還識麼師便打乃云群陰已極一陽生萬彙齊資露本真覿體聖凡無二致虛空充塞等乾坤所以道天得一以清地得一以寧聖人得一以治天下衲僧得一任運騰騰既然任運騰騰不妨向一陽未生之前葭灰未動之際直下坐斷千聖頂𩕳不與一塵作對淨裸裸赤灑灑然後向者邊行履頭頭上明物物上顯一為無量無量為一小中現大大中現小於一毫端現寶王剎坐微塵裏轉大法輪雖然未是衲僧本分事豎拂子云若向者裏覷得透目前無法心外無機一切臨時處處顯現正恁麼時秪如應時及節一句又作麼生道覿面陽和動冰河焰自生薦嚴請上堂僧問大開爐鞴煆煉英靈去世先亡未審如何煆煉師云蝦跳不出斗乃云秀峰山頭雲霧起寒光溢目水生冰分明佛法無多子只要諸人著眼睛豎拂子云還見麼若見不妨道個山是山水是水僧是僧俗是俗直下把斷要津不通凡聖三世諸佛只言自知歷代祖師全提不起一大藏教詮注不及秪如薦親一句作麼生道天上人間無著處塵塵剎剎現全身卓拄杖下座聖節上堂乾龍聖節是今辰遍界山呼萬萬春林下道人齊合掌炷香虔爇祝堯齡歲旦上堂拈香祝聖畢僧問元正啓祚萬物咸新師登猊座有何祥瑞師云拈香祝聖進云當陽獨露人皆委向上提持意若何師便打乃云新年頭正月一普潤乾坤雨珠雪覿面看來個個圓試問諸人瞥未瞥若未瞥看他東家打躬西家作揖張公喫酒李公醉白髮兒童俱面赤惟我林下道人今日還同昨日還委悉麼寒梅撲鼻香難見端的春風在眼前卓拄杖下座春日上堂僧問如何是靈鷲境師云秀峰齊插耳進云如何是境中人師云覿面案山橫進云如何是目前事師打云腦後薦取問霹靂當空照用齊開如何是臨濟玄要師便打進云如何是第一玄師云闍黎頭頂天如何是第二玄師云孤雁落前川如何是第三玄師云分明在那邊如何是第一要師云闍黎休亂叫如何是第二要師打云與你一棒如何是第三要師打云猶嫌少在進云臨濟玄要承師指遂喝云是照耶用耶賓耶主耶師復打乃云一二三四五六七逗到今朝是人日春風驀面忽相逢撲破鼻頭撞破額靈鷲寺裏今日有齊大衆開單展鉢拈匙放箸則且置應時及節一句作麼生泥牛起舞春悠悠不風流處也風流解制上堂僧問把住牢關即不問放行一路事如何師云緊峭草鞋進云灼然點鐵成金去滴水興波浪潑天師便打乃云適才過歲旦明朝又十六時節不相饒光陰何迅速初非法爾如然豈是人情催促靈鷲結制九十日來滴水滴凍大衆鉢囊高挂不許動著一絲頭今日檀越作齊諸人一齊打開鉢袋饅頭䭔子三德六味供佛及僧一飽便休還會麼大方獨步無拘管南北東西信自繇淨光仰心明貫淨持期師過景星巖請升座問答罷師乃云春山疊亂青春水漾虛碧寥寥天地間獨立望何極古德恁麼說話大似在孤峰頂上等個人來大衆且道他要等個什麼人擊香几云定光金地遙招手智者江陵暗點頭上堂僧問夏日炎炎通身白汗還有不熱者麼師便打進云涼風到處通消息拄杖頭邊白汗流師復打云少一棒在乃云昨日火雲燒空今朝陰生巖谷天道何似不常人身隨著反覆或時通身汗流或時乾燥暴暴分明不隔纖毫直下好個消息且道是何消息良久云無事此靜坐一日似兩日卓拄杖下座曹源法友請上堂諸禪德相逢不拈出舉意便知有衲僧家須要舉一明三目機銖兩始得不見道撞著道伴交肩過一生參學事畢秪如今日故人遠至覿面相看又作麼生拍掌云寒山逢拾得撫掌笑呵呵下座升座禪非意想道絶功勳才要如何若何便乃千里萬里所以靈鷲者裏無禪教你們參無道教你們學一味杜田朴實頭種田博飯喫果是當家種草聞山僧與麼道便一信永信如或不然更為舉示以拂子左右拂云還委悉麼山前山後閒田地盡底掀翻要一回除夜升座僧問臘月三十日事如何師云明朝是初一進云請和尚喫茶去師便打問如何是佛祖相傳第一義師亦打問如何是和尚底奇特事師又打乃云今日正喚作臘月三十夜人人打辦過年要將前來所作所為底事盡情打疊得乾淨無一絲毫牽挂然後得安閒自在去明日不妨又是從頭起謂之度年若有所負被人追逼凌辱則不得安閒自在故古來尊宿以此喻爾我生死到來眼光落地時節若生死不了業識茫茫無本可據如生龜脫殼謂之度命如度年古人如此親切譬喻策進學者無他蓋要諸人灑灑落落做個自在人去雖然也是葛藤為他閒事若是個快馬見鞭影而行直得羅籠不住呼喚不回一往向前歸家穩坐其或未然駑駘休謂難尋覓辜負山僧兩道眉卓拄杖下座住天台景星巖淨居禪寺語録崇禎癸未冬重建法堂衆檀越爭題梁師乃升座景星千古禪林檀越休分爾我大家扶起一桁既扶起好惺惺彼既丈夫我亦爾人人覿體開胸襟大衆且道胸襟又作麼開良久顧左右云還委悉麼分明一片閒田地今古還他過量人癸未冬受明州雪竇請升座杲日當空十虛普照清風匝地遍界全彰如是則景星與雪竇齊高乳峰與玉柱一體瀑飛千丈影含珠星墜半巖光映月無彼無此誰去誰來諸仁者若能會得不妨全明全暗全放全收放行把住自在縱橫一切臨時不容擬議正當恁麼時一句作麼生道明年自有新條在惱亂春風卒未休晚參參禪一著須具莫大力量氣可食牛底漢子當下便了瞞他一點不得所以祖師西來直指人心見性成佛原說是直指何有一些打灣德山見人入門便棒臨濟見人入門便喝豈不太煞直截明白今人雖極聰明極用心而不得了當豈非反被聰明用心所障瞻前顧後無繩自縛本具靈光不得顯現若醉酒漢子一般一時呼喚不轉譬如一人騎在劣馬上驚怕不已行過樹下緊緊抱定樹枝馬既脫去猶自懸樹叫人相救驀以竹篦一擊云不知到者裏自肯放手便安貼貼地為甚費許多氣力復以竹篦擊云會麼良久云快請散去垂問四山如削周匝無門如何得到者裏孤峰頂上盤結草菴且道是何意旨景星慶雲一時現瑞畢竟因誰致得上元值雪我見燈明佛本光瑞如此佛與光且止如何是瑞底所以雪後始知松柏操歲寒始見丈夫心正當雪時乾坤一色向甚麼處見他松柏
