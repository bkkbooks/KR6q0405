body:
  text: 嗣法門人行正等編録蘇居士請上堂昨日大雨盆傾今朝南熏入奏殿閣生涼阿誰能覯天地旋山河走須彌頭倒卓面南看北斗惟是個中人一舉無先後時有僧出舉坐具師拈棒打下通安莫居士悼念難忘請上堂僧問空劫已前徒指注空劫已後錯商量是否師云出頭來作麼進云遍界盡非常草木何山松柏不蒼蒼師云你看背後什麼人進云錯師便打乃云春光明媚春山鳥啼春風淡蕩春雲離披春暖百花香春寒多雨水會則偃息干戈未會則橫尸萬里會與未會且置秪如鐵船高駕又作麼生道逢人但恁麼舉夏中無糧破堂化士請上堂五月將盡六月未到庫下粟麥俱空廚頭冷落鍋灶燈籠餓得匾露柱幾跌倒拄杖子竭力扶起揚聲大叫幾許懶禪和真好笑個個如泥塑木雕不肯大家出手長連單上死睡覺今日不得破堂化士歸試問諸人個事如何了以拄杖擊香几云了不了百味珍饈無過一飽明因明源二禪人送受業靈骨入普同塔請上堂靈光獨耀迥脫根塵但離妄緣即如如佛大衆還委悉麼更為汝通個消息谷風清山月白分明一具黃金骨等間放下便安然摩訶般若波羅密結冬上堂十月十九執事頭首結制坐禪將無作有大衆煮無米飯炊不濕羹大家出手擔柴運木仍依舊聞普梆即便走休落後被人喚作不唧溜不許你衣長裾扯大袖又誰許偷間靜坐成窠臼拄杖子劈脊摟以拄杖卓一卓下座上堂僧問如何是奪人不奪境師云境如何是奪境不奪人師云人如何是人境兩俱奪師云俱奪如何是人境俱不奪師云俱不奪進云恁麼則千聖同轍去也師便打乃云仲冬嚴寒天上人間雲凝不動水滴成團烏龜凍得頸縮飛禽凍得嘴尖茅屋上鴟吻不敢𨁝跳山頭石敢當冷地自在默默無言秪有堂前露柱較些子風吹日炙一向如然堪笑衆禪和衲衣高擁打坐參禪只想奇玄奇妙不肯直下豁然蹉過當陽者著子直教參學到驢年卓拄杖長至上堂日南長至晷運推移拄杖子不動不變穿卻諸人鼻孔不許出氣建法堂謝檀護上堂臘月正窮冬日日是好日百草頭呈古佛家風一毫端現寶王剎直得普賢大士運斤成風文殊師利不拘繩墨所以道建大廈非一木之能濟巨川非一棹之力況慧日高懸法幢重建且道畢竟承誰恩力還委悉麼分明舉鼎調羹手撥轉如來正法輪下座上堂臘月十五寒風似箭召大衆云照顧面門元旦上堂僧問露柱升堂即不問燈籠入室意如何師云與你一般進云元旦拂開新月面年頭一喝透天關師云漆桶生光乃召大衆云一年三百六十日今朝是最初一日若有道得最初句便乃年新月新日新日日新時時新刻刻新新新無住於無住中不妨天是天地是地山是山水是水僧是僧俗是俗未嘗移易一絲毫所以道是法住法位世間相常住喝一喝云又是從頭起解制上堂九旬結制今朝解解結都來拄杖頭普告現前諸衲子一齊拈卻任優遊至白雲訪鹿門大師圓道朱將軍請上堂二月春將半名藍天外幽雨餘山色曉觸處暗香浮巖巒回合林嶺交參殿閣俄新光明溢目到者裏不必説心説性問主問賓誰玄誰妙若動若靜殺人刀活人劍置之一處肘後符將軍令且放一邊自然草偃風行聲和響順一念無為十方坐斷秪如人境相稱一句又作麼生良久云委悉麼白雲深處坐時領谷中間至天童訪費隱和尚衆請上堂大衆從上來事舉目分明祖父家園通身受用更要格外提持衲僧巴鼻有我法兄和尚在山僧到來不敢動著且道何故不會作客煩勞主人楚陽憫生上座偕紹初淨空勝光諸禪德請上堂春雨溟溟三月天落花堤柳鎖寒煙知音不待重重舉江北江南總一般天童費隱和尚至上堂靈鵲屋頭噪好音纍日聞必然有客到今喜是同門同門既到賓主歷然語笑歡天清風匝地大衆且道以何秪待委悉麼擊鼓升堂聊供養更無一物可勝慚結冬上堂僧問一槌打就固是好手點著便來不妨伶俐紅爐上雪片即不問堂裏聖僧道個甚麼師云西山有老虎進云恁麼則萬古碧潭空界月再三撈摝始應知師乃云今朝十月十六較之去歲前年千足萬足羅夢章居士為我新蓋法堂七間權可安衆寮房又添得幾間茅屋監院知客直歲安單有序上下內外雍雍肅肅山田薄收得晚禾蚤穀不用休糧方人人俱飽腹呵呵呵好快活知事頭首不肯安分更要剋期結制做瘡剜肉衆中有個漢聞山僧恁麼道便出來大叫長老長老你與麼説話與我置之高閣我等出家秪為不明生死不遠千里百里而來究竟佛法一字不聞終日普梆忙忙碌碌不是擔柴運土便要磨磨舂穀稍有遲回便乃打罵如雷及至今朝又説恁麼話教我晚輩後生如何棲泊山僧向你道上座上座與麼則老僧罪過卓拄杖下座知浴請上堂初三草七不用揀擇才有揀擇千差萬別所以一切世界有以音聲為佛事有以光明為佛事有以莊嚴為佛事有以香飯為佛事今日雪竇寺裏有齋一任諸仁信手拈信口咬只不許揀擇忽若夫口咬破舌頭呵呵大笑且道笑個甚麼好心得個好報喝一喝上堂長安甚鬧吾國晏然拈拄杖云大衆不可道拄杖子不晏然也遂點云低聲低聲上堂僧問萬別千差即不問當陽棒喝暫停機如何是雪竇境師云茆蓬六七座如何是境中人師云坐臥不知寒如何是人中境師云看取眉毛乃云小盡二十九大盡三十日循環十二月今乃又初一諸禪德須委悉當門那許栽荊棘咄上堂僧問雪滿長安乾坤一色畢竟明甚麼邊事師云頭頸骨縮進云歸根得旨事如何師云赤骨𩪸地乃云臘月一十五瑞雪空中舞來歲定豐年普請快活過過過過撞見胡達磨不道少林消息在冷光一片亙今古召大衆云不須久立元旦上堂舉香嚴道去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧連錐也無洞山又道去年富未是富今年富始是富去年富惟有一領墨黲布褊衫今年富添得一條百衲山水袈裟師云看者兩個老漢各各安其分守其當真所謂貧而無諂富而無驕雖然猶挂齒牙在雪竇即不然去年貧也不貧今年富也不富貧富總無干元日蚤升座解制上堂十五日以前燈籠拜露柱十五日以後露柱拜燈籠正當十五日燈籠是燈籠露柱是露柱各站一邊了無交涉自然天花亂墜地涌金蓮各各面門放大光明照耀今古遂豎拄杖云且道者是今耶是古耶試定當看萬古碧潭空界月再三撈摝始應知上堂連旬雨雪祖堂寒庭際無人立問端豈是山僧間舉覺大家努力莫輕看所以道欲拋香餌須待長鯨縱有纖鱗應無希冀衆中還有恁麼人麼良久云今日失利奉川邑侯虛來吳居士偕兄湯日儒學何渭侯請師於彌勒塔院升座僧問當年笑口今日慈顏還有為人處也無師云問取拄杖子進云把住則家邦寧貼放行則斗換星移畢竟把住是放行是師云照顧腳下乃云彌勒真彌勒分身千百億時時示時人時人自不識大衆還識也無若識也天之高地之下中間水陸空際雲行鳥飛人畜草芥無一不是彌勒分身闡揚豈待覺城東際始見文殊樓閣門開方參慈氏況此封山塔院大士全身道場即今殿宇斬新山靈增耀邑侯虛來大護法特命山僧就此升座今辰一會若僧若俗若男若女各各眼見耳聞無異無別擊拂子云畢竟者裏如何委悉遂擲下云善財別後真消息直至如今事宛然覺海禪德轉經畢請上堂止止不須説我法妙難思諸增上慢者聞必不敬信豎拂子云信麼遂擲下座結制上堂有利無利不離行市雪竇山門年年結制七十三八十四東家賣賤西家賣貴則不問汝諸人不是心不是物不是佛且道是個甚麼維那一喝師打一棒云亂喝作麼便下座因天童請上堂舉楊岐和尚示衆云福薄住楊岐年來氣力疏寒風凋敗葉猶喜故人歸咄咄咄力囗稀諸仁切莫亂針錐山僧既忝末裔不敢自欺卓拄杖云病骨只宜茆屋下失便宜是得便宜復卓下座長至虞居士請上堂仲冬嚴寒日月彈丸一陽來復乾三坤六豎拂子云到者裏為什麼問著十人有五雙不知落處以拂子畫一畫云秪為分明極翻令所得遲史顯臣居士為薦先嶽請升座佛祖之道其直如矢但無一切人我是非等見自然得入無住心體如天普蓋似地普擎無一塵不攝無一剎不周無一體不該無一機不備靈明廓徹亙古亙今秪因不了一念妄生取捨分別便有許多頭角興起被他回換不得自繇二六時中隨情造業隨業受報以致六道輪回頭出頭沒無暫停止若能一念回光當頭坐斷不是心不是物不是佛不是冤不是親不是凡不是聖業纍俱空了無向背所以道了即業障本來空未了應須償宿債只如孔石行恭上人宿債既償且了又如何道擊拂子云千峰勢到嶽邊止萬派聲歸海上消上堂和暖天似欲雨草木叢林發歡喜南山燒炭北山紅頂後神光千萬里便與麼去三家村裏土地只是個無轉智大王好與三十拄杖且道何故逢人不得錯舉元宵上堂鐘鳴古寺月映澄潭離相離名非聲非色便恁麼去處處緑楊堪繫馬家家門首透長安不恁麼莫盤桓但看天上月甚處不團圓到吳門戒幢禪院佛殿告成振寰朱君為父懺罪請上堂青蘿夤緣直上寒松之頂白雲淡濘出沒太虛之中即此斬新佛殿清淨伽藍樓閣門開莊嚴具備盡是當人自受用境界若能於此洞達得去千處萬處皆明世出世間無異直下前後際斷三秪劫空便與從上佛祖同一受用同一福嚴於其中間覓絲毫頭罪相業相是相非相俱不可得全是個金剛正體自在如如以此懺罪何罪不懺以此集福何福不集要知集福懺罪總在者裏復説偈云集福懺罪俱了了覿體秋陽而杲杲朱君檀越如未知試請自問尊翁老喝一喝下座吳江柳升宇汪仲濂衆居士入山請上堂五月深山雨熏風殿閣涼可中端的處觸目是心光所以道靈光不昧萬古徽猷入此門來莫存知解知解既不存越山吳水清都來不隔線腳底最分明下座沙彌剃染請上堂舉崔趙公問徑山欽禪師弟子欲出家得否欽云出家乃大丈夫事非將相之所能為趙公乃省師云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園只如現前大衆各各方袍圓頂履地戴天且道如何是大丈夫事意氣不從天地得英雄豈藉四時摧結冬知浴請升座結制之事也是間説只要諸仁一時放下便休且道放下個甚麼不見僧問趙州一物不將來時如何州云放下著僧云一物不將來放下個甚麼州云放不下擔取去趙州老人大似布縵天網子要打衝浪鯤鯨爭奈不遇只得飲氣吞聲若是其人何必朝三暮四暮四朝三蹙額攢眉東尋西討剋期取證畫地為牢果能放得下自然虛而靈寂而妙風行草偃水到渠成一切施為總是成現至如德山於龍潭吹滅紙燈臨濟喫黃檗三頓痛棒庭前柏樹子乾屎橛麻三斤諦當甚諦當敢保老兄未徹在乃至四照用四料揀賓中主主中賓轉換落落地要拈便拈要置便置有甚麼難若是一絲頭放不下底問他宗乘中事作麼生聲色裏如何透直得舌如匾擔眼似銅鈴饒他強作主宰撑眉努目豎一拳喝一喝拂袖便去湊得一轉兩轉合頭語總是識情意解博記得來有什麼交涉等間被人拶著卻又去不得了是者等的二六時中觸途成滯舉目荊榛人我是非擔取一擔出叢林入寶社總在境緣上作活摶量裏過時業識茫茫幾時得相應去者些子業識害人不淺從無量劫來受其牽制向六趣中輪回生死直至如今不得自在遂擊拂云丈夫漢者裏若不一刀兩段更待何時衆中還有麼若有上前來老僧好與三十拄杖召大衆且道賞伊罰伊試辨看以拄杖一卓下座臘月一日上堂僧問精嚴戒律名為佛子佛未出世時未審還有戒也無師云你是外道進云南泉斬貓歸宗斬蛇又作麼生師云禮拜懺悔著乃云寒威凜冽紛紛雨雪茆簷上鴟鶻不敢出頭拄杖子通身烈傑卓拄杖云諸禪者知不知南北東西卒未休金剛焰復從何起佛成道上堂釋迦老子睹星時昔日今朝不隔絲個個面南看北斗丈夫誰肯受伊欺上堂天上月滿人間月半霄壤不同是非何判所以道宗乘一唱三藏絶詮祖令全提乾坤失色到者裏且道是滿耶半耶是耶非耶良久云但得雪消去自然春到來下座元旦上堂新歲今朝新舊年昨日舊新舊總拈卻普請共知有擊香几下座解制上堂僧出叉手而立師云且站一邊僧以拳加頭上師云捏怪作麼僧又加一拳師云不識羞僧繞禪床彈指一下師便打乃云正月十五泥牛輒舞布袋打開西秦東魯誕辰行敏陳居士請上堂召大衆云一年一度謂我生我謂一年一度死生不自生死不自死生乃死之生死乃生之死生死死生體自如老僧沒卻當門齒所以釋迦老子道妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真一喝云當門何用栽荊棘後代兒孫惹著衣結制上堂黃雲漠漠陰雨溟溟克塞虛空分明不識便與麼去略較些子稍涉遲違即入陰界還有恁麼人麼若有山僧退身有分若無且聽葛藤豎拂子云看看遂擲下上堂僧出禮拜云作麼師瞬目視之僧喝師便打僧接棒送一送云恩大難酬師云更與三十棒乃云山僧兩日病説法口難開向道諸禪者不如歸去來長至上堂冬仲陽生鶡旦不鳴蚯蚓口結大地成冰且道山僧拄杖子又作麼生遂一卓云已過新羅上堂僧問話了云請和尚打師云不打僧云為什麼不打師云為你買賣不相當進云蛇吞鱉鼻口生煙虎咬大蟲頭戴角轉身歸位師劈後一棒乃云仲冬嚴寒風聲似虎推倒須彌掀翻露布到者裏赤骨𩪸地寸絲不挂無係無依不可勝數若不具擇法眼睛面前鐵壁銀山依舊難過召大衆如何即是今日裝密且去搬磚運土上堂天寒地冽觸處成冰思量驀地笑倒老僧盡謂長老是甚麼善知識定有多少奇特殊不知是個三家村裏破落戶沒意智的村僧並無一些文理禪道那有佛法身心老僧恁麼説話設有個人出來道長老你既如此畢竟以何為人卓拄杖云會麼棒打石人頭嚗嚗論實事上堂霜明雪白二陽天無位真人面目全端的不知誰委悉梅花冷地笑無言豎拄杖云拄杖子莫廉纖打風打雨當底錢雖然也勝首山道新婦騎驢阿家牽上堂一不得有二不得無一二之義正在半途有人道得恰好句麼若道得不惟雪竇有光亦見汝衲僧家有明辨古今眼目不然總是隨例喫飯漢願海惟極二上人領沈氏行廣請上堂尼問山前有猛虎人人遭其毒口和尚也須照顧師云向前來作麼尼一喝云看虎師云者畜生尼攛坐具作虎聲師便打尼喝師乃云臘月今朝是初六時良日吉修冥福天神喜悅來散花空階步步都成玉聖凡生滅俱不見一片冷光照人面不用尋思直下看個裏何常有涯岸沒涯岸活潑潑是什麼不是心不是佛不是物咄
