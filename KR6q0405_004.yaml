body:
  text: 嗣法門人行正等編録辛卯冬重建大佛殿海憲王公協鎮張公邑侯夏公入山請上堂問話畢乃云祖席荒來久俄然以復新叨承檀護力扶起破砂盆今日各位宰官台駕入山作大佛事命山僧升座舉揚大事因緣誠不忘靈山付囑昔我世尊於雪山夜睹明星云奇哉一切衆生具有如來智慧德相即今雪竇山中日輪卓午豎立大雄寶殿群賢畢集旌旆森嚴僧俗交參人天共見正與麼時還有證得者麼若是利根種智大解脫性一聞一切聞一見一切見一了一切了一證一切證則人人具足個個獨尊與釋迦老子同體受用無二無別所謂寶王剎現於毫端大法輪微塵坐轉見麼大道體寬無向背當陽直截大家看擲拄杖下座春朝上堂臘月二十五春到山門左四大天王驀頭撞見便高聲問云春哥春哥你今年與麼蚤來作麼報道雪竇祖庭昨朝豎立大佛殿而來慶賀即便揖進佛殿中央倒地三拜直得和氣騰騰克滿僧堂方丈洎及各寮廚庫人人滿面春風歡喜無限土地伽藍不覺足蹈手舞老僧到此亦不免隨例歡喜唱個囉囉哩哩囉囉好大哥扯索去古燕遊宦張調鼎居士入山請上堂舉睦州和尚問一居士先輩治何經論士云易經州曰易中道百姓日用而不知不知個甚麼士云不知其道州云作麼生是道士無語州云果然不知師云可惜者居士蹉過睦州聽取山僧一頌道在尋常日用中不知知也體玲瓏分明一味無多子變換調羹手不同解制上堂十月十五正月半九十日期虛打算威音那畔本現前鼻直眼橫誰解看若得徹去不妨孤峰頂上盤結草庵的一任盤結草庵十字街頭縱橫遊戲的一任縱橫遊戲壁立萬仞帶水拖泥總非分外脫或未然三十年後不得辜負老僧上堂二月十五春寒山塢風兮鳴條雨兮破土釋迦老子遍現色身文殊普賢觸處顯露達磨西來不立文字直指人心見性成佛有何所補召衆云會麼唵折唎主唎準提莎婆訶剃染升座景際清和候紅稀緑暗時一般好消息能有幾人知苟時節未至心地不明業識茫茫無本可據且道即今是什麼時節彈指云會麼彈指圓成八萬門一超直入如來地佛誕妙瑞庵主請升座一二三四五六七八毗藍園裏降生時春風滿地花狼籍休狼籍雲門一棒打殺與狗子喫貴圖天下太平曲不藏直復舉當時歸宗會裏有一僧夜半忽然叫云我悟也我悟也旁僧問云你悟個甚麼答云師姑原是女人做者僧悟去雖則是個老婆禪也須是個人始得山僧有一頌師姑原是女人做覿面何曾有回互明明恰是老婆禪悟去不妨稱獨步下座上堂不是心不是佛不是物甚是現成恁麼也得不恁麼也得恁麼不恁麼總得有甚隔礙便與麼去如龍得水似虎靠山直透萬重關不住青霄外雖然更須知有棒喝交參主賓互換照用同時一著不然只知事逐眼前過不覺老從頭上來卓拄杖普濟禪寺大佛開光趙瑞芝請就寺升座問答罷乃召衆云當陽坐斷過去未來現在甚處安排覿面全彰法身報身化身莊嚴相好一一騎聲蓋色塵塵耀古騰今正眼洞明十虛融暢全機獨運八表升平出沒縱橫卷舒無礙直得闞湖水滿人人洪注福源古寺維新比戶光分祥瑞可以集衆善可以滅諸殃可以報君親可以安家國全憑者段威光不在別處流轉且道在甚麼處遂云行滿功圓明個事通身佛眼應時開尼九如薦子行直請升座人生人死人皆委誰死誰生誰解知今日山僧明指示虛空撫掌笑嘻嘻召大衆云你道他笑個甚麼笑世間有等人日用癡愛執著情想分別人我親疏境緣好醜處處留滯隨情造業隨業受報以致生死死生無有停止驀一喝云被山僧一喝直得虛空粉碎大地平沉乃至地獄天宮一切罪相業相生相死相悉皆冰釋如日融霜且道其中人又在甚麼處安身立命以拂子左右拂下座大悲誕日錢則之居士預為母五旬壽請上堂觀音誕辰是今日三月十九道人生法身普應應無別只個圓通不二門所以道應以佛身得度者即現佛身而為説法應以菩薩身得度者即現菩薩身而為説法應以比丘比丘尼身得度者即現比丘比丘尼身而為説法應以居士婦女乃至人與非人悉皆現之而為説法大衆即今居士婦女身現且道老僧為他説個甚麼法即得呵呵不可教壞人家男女以拄杖一卓下座永嘉法幢上座自頭陀來參請上堂問千里遠來本為己躬大事一朝啓請卻無半字堪提未審應時及節一句和尚作麼生道師云看腳下進云棒頭取證豈是男兒喝下承當未為好手離卻棒喝請道一句師云禮拜了退問掀翻四海求知己得造山中話舊翁如何是賓師云闍黎如何是主師云老僧進云賓主相見時如何師云退去進云涼風處處通消息拄杖頭邊白汗流師便打僧喝師復打問世尊拈花一場出醜達磨西來眼裏添沙和尚今日將甚麼指示師云你因甚亂道僧喝師便打乃云智鑑當軒本無向背靈機在掌寂而無痕寬若太虛明同杲日把住則乾坤暗黑日月無光放行則普天匝地七橫八縱恁麼也得不恁麼也得有時一句如踞地獅子有時一句如金剛王寶劍有時一句坐斷舌頭有時一句隨波逐浪會則途中受用如龍得水似虎靠山未會則世諦流布猶如羝羊觸籓然只要個獨脫底英靈腳跟下不帶枝葉赤體條條便與麼擔荷去羅籠不住呼喚不回十字街頭縱橫垂手自然轉換落落地至於結角淆訛處著著亦自有出身之機若是情存意想滯句承言動則喪身失命所以道垂鉤四海只釣獰龍格外玄機為尋知識衆中還有恁麼底麼出頭天外看須是我般人受張孝廉客卿為僧升座六月十九人謂圓通大士成道耳聞不及眼見今有大心之士祝髮披緇眼見不及耳聞召大衆云秪如聞見二俱不及一句又如何通信卓拄杖云相逢莫道休官少林下今朝又一人天童密老和尚十周拈香巴陵三轉語楊岐生捏怪雪竇一炷香轉身禮三拜不圖報德酬恩只要全身遠害便插香慧修上人請上堂豎拂子云只者是明杲杲觸處洞然何所不了世尊才生下來便以手指天地行七步顧四方口喃喃地無非是驚蛇打草所以道秋江清淺時白露和煙島良哉觀世音全身入荒草大衆秪如行普賢行願赤腳蓬頭帶水拖泥巴鼻又誰討擊拂子云不是苦心人不知上堂舉臨濟大師問黃檗的的大義三度被打不知落處及至高安見大愚愚問甚處來云黃檗來愚云黃檗有何言句濟云某三度問佛法的的大義三度被打不知過在甚處愚云黃檗與麼老婆心切為汝得徹困猶向者裏問有過無過濟聞忽然大悟云原來佛法無多子師云者老漢夢方得醒既云佛法無多子極是易事為甚喫他六十痛棒雪竇今朝路見不平要為他雪屈復云仔細思量好事不如無便下座心月上人請上堂舉槃山示衆云心月孤懸光吞萬象光非照境境亦非存光境俱忘復是何物洞山又道光境未忘復是何物者兩個老漢一人解收不解放一人解放不解收大似徐六擔板各見一邊仔細看來有甚好光境若要扶豎從上來事各喫二十拄杖召大衆秪如收放俱解底來據山僧亦與二十拄杖諸方善知識又不知作何商量試為一頌心月明明在目前光吞萬象獨娟娟拈來拄杖當頭楔幾個男兒血濺天卓拄杖上堂一之日寒風急寸絲不挂底即乃頂門裂裂裂現出三頭六臂把主風神一摑直得須彌山倒地無數英俊𨁝跳禪和被他壓死不能轉身吐氣直待春雷起蟄驀地叫云屈屈屈堪述絶後再蘇真欺不得一喝無凡上座為母難日請上堂問四十八年前此日未出母胎事若何師云即今看取進云蒙師指出娘生路為報劬勞罔極恩師云也難得乃舉昔日龐蘊居士參石頭問云不與萬法為侶者是什麼人石頭即以手掩其口蘊便有省後又問馬大師大師云待汝一口吸盡西江水即向汝道蘊於言下大悟頓領玄旨者漢雖然一期大驚小怪險些坐在死水裏有甚用處若向石頭掩口處徹去一腳到底便是百億須彌無邊香水海總在一毫端上要拈便拈要置便置拈起也須彌岌峇海水波騰放下也涓滴全無管教盡底豈止吸盡西江水而已具眼者應須自看上堂適來喫粥未完侍者來催上堂卒急打點不及且歸暖室商量便下座法幢藏主請上堂問不是安名周甲亦非坐定生辰欲酬深恩於母難請師大轉夫法輪師云日輪正當午進云恁麼則九族生天猶寐語為親齋得一員僧師云匝匝清風滿座筵乃云今日是法上座六旬誕辰請山僧升座説法然山僧有何法可説記得祖師道我説法要譬如天澤汝緣合故當見其道即今眼眼相看心心相知豈不是緣合且道又作麼見試聽一頌門前案山子今古長如然惟有千尺松靈鶴巢其巔卓拄杖下座法幢上座誕後二日乃子齊鈇齊鐸設供兼資贈母趙淑人生母周氏暨密印監院曇朗門士陶岸生等請上堂鈇鐸同出禮拜鈇問承聞為親齋得一員僧未審是和尚是父親是大衆師云總在者裏鐸云和尚和盤托出師云好個消息鐸云父母深恩如何報得師云將此身心奉塵剎鈇云恁麼則個個胸流千丈瀑人人壁立妙高峰師云天上是地下是同禮拜退岸生居士問叢林代廢代興青山今古依然未建叢林時兩條柱腳在甚麼處師云者消息從那裏得來乃云當人一著其大無外其小無內萬象森羅無向無背千古萬古長悠悠曠劫來今若為對若也於斯擔荷得去不妨在天同天在地同地以此為忠為孝為武為文為王室股肱為法門城塹不忘付囑乘大願輪令佛法久住人間恩無不報揭祖燈明未來際福無不臻雖有如是奇特若到雪竇門下好與他三十拄杖何故有功必賞上堂值內翰陶岸生及何元發林威侯集侯辭行師云今朝雲霧許誰知留得台星滿座時試看白雲嶺頭上送行還欲待遲遲解制上堂幢藏主問盡乾坤是個解脫場不知結個甚麼解個甚麼師云摸取腳跟進云恁麼則時至竹栖乳竇鳳春來雷躍隱潭龍師云老僧不聞不見進云且喜和尚鐵枷今日一併脫卻師云放汝三十棒進云孟春猶寒伏惟珍重師便打乃云春山岑寂百鳥和鳴日照天晴光華滿目不逐四時遷謝百草頭上全彰能隨七縱八橫何妨打開布袋拈拄杖云你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子又作麼生會一喝下座覺空上人同何性壽請上堂山寺春明物情踊躍無位真人觸處彰端的不知誰撞著忽撞著是何物一喝云莫錯莫錯弘傳上人領陳養源請上堂祖師心印萬物昭回古佛家風春雲片段禪和家長連床上有粥有飯開單展鉢把箸拈匙還相應也未以拄杖擊香几云若未相應時光容易過白卻少年頭上堂今日風頭太冷寒毛卓豎普告諸禪切記切記切記甚麼齋粥二時不得忘卻匙箸性可禪人請上堂一即一切一切即一春夏秋冬生住異滅少壯促齡驀豎拂云總向者裏流出禪和家都是要參禪學道明心見性且問汝喚什麼是禪什麼是道什麼是心什麼是性還明也未還見也未擊拂子云不得春風花不開花開又被風吹落一喝下座興化吳相國鹿友居士送法衣黎太沖吳北海二居士修供請上堂春山疊亂青春水漾虛碧寥寥天地間獨立望何極召大衆云古人與麼道還有知他落處者麼若有所謂古今一致千里同風若也未然聽取山僧一頌舉袈裟云楚陽山水秀如此伊人宛在彼一方更有靈山付囑者袈裟遠惠覺花香一喝下座東甌余孔謙居士請上堂舉臨濟一日與普化在施主家齋濟云毛吞巨海芥納須彌為復是神通妙用為是法爾如然化便踢倒飯床濟云得即得太粗生化云者裏什麼所在説粗説細至明日又去一家齋濟云今日供養何似昨日化又踢倒飯床濟云得即得太粗生化云瞎漢佛法説什麼粗細師云者兩個老古錐一期做處直是驚群動衆氣宇如王雖然猶有佛法在大衆秪如無佛法一句作麼生試道看若道得如龍得水似虎靠山豈不為快忽有個衲僧出來問老和尚還道得麼山僧向他云今日供養主是東甌人誕日協臺行頓張公入山送法衣修供請上堂僧問無量壽佛示現受生百萬人天如何祝慶師云盡在目前進云和尚自道如此親切師云你又作麼生進云某甲禮拜去也師云磕破鼻孔問道本無生即不問今朝降誕事如何師云莫謗老僧進云棒喝交馳人天慶祝猶是功勛邊事只如威音那畔大人相作麼生現師云老僧不打汝問瞿曇出脅不向他家借路我師降誕畢竟如何示人師云拔出腦後箭進云恁麼則恩大難酬師云放汝三十棒進云今日護法到山和尚作麼酬對師云又被風吹別調中問臨濟四喝一喝云者一喝是甚麼師云野犴鳴尼問六十年前六十年後事即不問正當祝壽一句作麼生師云向前來與汝道尼喝師云再喝看進云今日且放過師云亂做尼一喝禮拜云高山流水深深意自有知音笑點頭師噓噓又尼出喝云者老漢大似裝模做樣師云老漢被你一喝進云親切一句分付阿誰師云念將來進云蒼天蒼天師呵呵進云今日問話不著便歸衆乃云青山白雲裏檀越頻來到祖席已蒙光更念及衰老惠我僧伽黎福田明了了今日命升座舉揚佛祖道慚無一字言惟看山水好瀑飛千丈石松鳴萬樹老殿閣斬然新丈六一莖草卓拄杖下座妙瑞庵主請上堂祖師心印大地文章衲子家風一塵不立鉢裏飯桶裏水日用現前頭上天腳下地阿誰離得秖貴直下知歸自然風行草偃一喝云還有不受惡水潑者麼有即也大奇嘉定無等禪宿同衆居士請上堂一花開天下春森羅萬象只般新撞著道伴交肩過看來原是舊時人莫費力且休尋丈夫立地便成佛惟人自肯乃方親下座虞山賓化禪人領衆信請上堂三月初一天空地闊大道只在目前狂心何不便歇若歇也拂袖便行歸家穩坐那管釋迦彌勒若未歇一任南天台北五臺東拋西擲卻怪老僧不得雲間吳萃凡居士請上堂青山滿目不晦時機一鑒晴空千差洞徹所以佛法門中有縱有奪其縱也處處緑楊堪繫馬家家門首透長安其奪也乾坤坐斷惟我獨尊秖如不縱不奪又作麼生卓拄杖云自是不歸歸便得五湖煙景有誰爭因衆禪人托鉢升座僧問去年窮未是窮今年窮始是窮請道是甚麼人境界師云老僧到者裏無下手處進云去年窮猶有卓錐之地今年窮錐也無師云穿卻鼻孔乃云常年結冬頗頗過今歲冬期過卻難山田高低旱夏荒蚤禾晚禾不上倉大雪盈庭堆尺許兀坐禪床冷相倚山門檀信杳無來一日空腸轉幾回開了大門七件事所需不過米為貴住山有柴徒有水柴水如何飽飢餒無米飯不濕羹有誰能做得人吞老僧隱隱冷肚疼肚疼如何説向君幸爾思量個轉身效學祗園會上人著衣持鉢入城去七佛儀式應不替次第乞已還本處洗足敷坐為活計釋迦老子既行先今我兒孫豈不然出門大道直如弦矩步規行驀直前撞著道伴交肩過賓主相逢休話墮化得知音來報我老僧為爾重按過呵呵設有個禪和兒出來道既然與麼老和尚為甚不去咄豈不聞祖父從來不出門上堂今朝十月半結制舊公案不必老僧言普請著眼看還見麼見則頭上安頭不見則當面蹉過教中道見見之時見非是見見猶離見見不能及咄釋迦老子心肝一時粉碎山僧一喝盡力為他也只圓得一半那一半留與諸仁復一喝下座長至虞本實祈嗣請上堂僧問如何是父母未生前本來底佛師云本來無佛進云面前是甚麼師云你自會取乃云冬至一陽生大地人皆道惟獨有心者能向可中討所以謂天得一以清地得一以寧聖人得一以治天下百姓得一歡心悅意受用現成雖然向上更有一著在如何是向上一著逢人但與麼舉上堂臘月天寒凜冽金剛腦後三斤鐵道人活計直如然須是一番寒徹骨寒徹骨莫驚惶試看梅花撲鼻香善修上人領衆信請上堂正月二十一雨下地上溼佛法遍天下時人總不識若也識便休歇活潑潑受用通身不須外覓直下坐斷聖凡舌頭是非杳絶生死去來迥超出若不識善修上人等也須自著力喝一喝長至上堂初陽才動萬彙萌新物我無殊衲僧意氣所以道天得一以清地得一以寧拄杖子得一東西十萬南北八千四維上下謦咳一聲無處不到山僧到此退身有分且道為甚麼霜華兩鬢茆簷白數樹晴梅香老庵卓拄杖下座上堂僧不二問百年三萬六千日翻覆原來是者漢敢問者漢在甚麼處師云不二進云如何是一喝不作一喝用師云喫棒別時來乃云仲冬十五嚴寒無措兩序執事定要老僧升座何苦何苦既然與麼不如大家去擔瓦挑土元旦上堂僧問龍象蹴踏即不問當陽一句請師宣師云照顧頂門進云恁麼則人人鼻孔撩天個個腳跟點地師云仔細著乃云逢新送舊遇物爭先今朝歲旦人人又添一年秖如長者長法身短者短法身牙齒一具骨耳朵兩片皮鼻子面門居眉毛眼睛上不能移易一絲毫者一年又添在甚麼處以手作策眉勢云還會麼眉毛罅裏藏春色鼻孔撩天意氣多下座元宵解制上堂新正月半燈光零亂觸處洞然急著眼看遂豎拄杖云看看過去燈明如來在山僧拄杖頭上一期賣弄傍若無人口喃喃道我乃放大光明遍照三千大千世界無有一人見我本光來處秖有娑婆世界東震旦國雪竇山裏禪和子見得些子光影今朝便要肩橫拄杖闊步大方七縱八橫隨意放曠咄被山僧一喝正要問他本光的來處便向拄杖頭上隱隱退去擲拄杖云是汝諸仁還見麼見之不取思之千里便下座法幢上座請上堂僧問世尊初生云云雲門為甚麼要一棒打殺師云乘虛接響乃云二月二十五韸韸擊法鼓謂是我生辰特地請升座召大衆即今座已升更要老僧説個甚麼呵呵大家共展摩霄翅莫效啾啾只一枝古鑑禪德請上堂僧問靈苗花艷瑞穎珠垂野父忘功白牛露地正與麼時如何師云腳下草漫漫進云果日一輪光不借清波無處不含輝師云匝地清風嘯不休進云謝師答話師云識甚好惡僧喝師便打乃云長夏熏風殿閣涼山家活計日尋常雖然一等尋常事也要諸仁肯自強是則是雲門大師道盡乾坤大地無纖毫過患猶為轉句不見一法始是半提更須知有向上全提時節還知麼山僧拄杖長七尺五是汝諸人底不知長多少一喝云切忌錯舉
