body:
  text: 嗣法門人行正等編錄機緣上僧問沒奈何時如何師云山僧更沒奈何云爭奈目前何師云目前是甚麼云推不向前約不退後師云何不禮拜僧禮拜師便打僧問東山水上行意旨如何師云喫茶不暇答話云畢竟如何師以拄杖拄云東山水上行你為甚不行直拄出方丈僧問演唱宗乘須具殺活縱奪敢問如何是殺師舉右腳示之如何是活師舉左腳示之如何是縱師亦以右腳示之如何是奪師復以左腳示之僧擬進語師喝僧云殺活縱奪已觀拈出孟春猶寒是何宗旨師云站過一邊僧云即此一語殺耶活耶縱耶奪耶師云截斷舌頭問特來呈舊面時如何師云多少大僧喝師云再喝看僧無語師云弄虛頭漢問新歲已臨舊歲何往師默然云不涉新舊更請宣揚師云禮拜了退云新舊已蒙師指示中興古剎事如何師云來朝看取問某甲暫別和尚意旨如何師云快走云有人問雪竇佛法如何秪對師云莫謗山僧問如何是有佛處不得住師便打如何是無佛處急走過師又打有無都不著又如何師即扯耳推出僧呈問頭數則求師答師驀頭棒云一齊為汝答去居士問古人道學道之人不識真只為從前認識神又道看到無心處凡心即佛心既是凡心即佛心何異識神弟子有疑師打云會麼士云弟子知痛師云正是識神士禮拜云謝和尚指示師云見甚麼道理士云無見師拈杖云見麼士云見師云自語相違漢又打士云弟子實體上苦道不出師云實在什麼處士擬議師連打問一口氣不來甚處安身立命師云鼻孔遼天問古澗寒泉則不問瞪目不見底時如何師云今日天雨云恁麼飲則是不飲則是師云且看腳下問生死不了求師開示師云喚什麼作生死云不曉得師云生死已了虛谷顧邑侯問宗門事從何門得入師云從無門入士云儒家必從讀書門入畢竟作麼師云正如銅墻鐵壁士云那裏是銅墻鐵壁師云時刻在前問和尚棒喝嘗用麼師云從來不曾士云古人青州布衫話我道喚白喚黃喚青都得麼師云且識青底問悟時即迷迷時即悟作麼會師打云者裏會云會得後又如何師云你作麼會僧擬議師又打問覿面相逢事作麼生師便打僧云恁麼則觸處迥然縱橫獨露也師云兩重公案僧參云入門休問榮枯事觀著容顏便得知師云且道山僧年多少僧無語師云掠虛漢僧呈偈云只要行人步不移師云你是個死漢麼云某甲只今是坐是立師云死漢云一對師云你連累老僧那便打火頭問某甲特求開示師比兩手示之云不會師云問取灶門去問古人道離心意識參既是離心意識參個甚麼師云樹上烏鴉叫云也是龜背上拔毛師云甚麼道理僧喝師便打問一念無思時如何師云死水裏僧喝師云喝那個云明月無私師打云正在死水問長安雖鬧我國晏然即今長安大鬧如何師云老僧在者裏受用麼云獨樂不若與眾師云未可道我國晏然問風從何起師云問從何來問如何是諸佛實相師云十個指頭五個長僧云體用齊彰師便打問無地可立如何師云即今在什麼處師命一僧做尊證云不敢待有人尊證弟子纔好與人尊證師云你向來作麼僧一喝師云莫道無人尊證僧云不識好惡師云果然問如何是安居樂業一句師云今日天寒云向上還有事也無師云來日向汝道問終日穿衣喫飯為甚學人不會師云爭怪老僧云乞師說破師云穿衣喫飯云是誰聻師便打居士問墻坍壁倒時如何師云好個消息士云放光動地師云光在甚處士擬議師便打居士問世尊拈花迦葉微笑是甚麼意旨師豎起拂子士喝師云者一喝與山僧拂子是同是別士擬議師便喝問弟子薪水道人特來問和尚禪師云山僧頭痒無暇答話禮拜云謝和尚指教師云你見什麼道理云只在頭痒處師便棒僧頌月落三更穿過市因緣呈師師云意旨如何僧喝師云你喝月喝三更僧無語師便打僧求開示師云你向在那裏住云徽州幾時到這邊云去年十月師便打問從來工夫一時放下請師別垂方便師便打云不會師云會取去問徹骨徹髓時如何師云待徹向你道問如何是學人住處師便打云除者一棒還有麼師云除者一問道看僧喝師又打居士問如何是北斗裏藏身師云面南看取士擬議師便打次日士禮拜師云北斗面南看作麼生士擬進語師打一棒云父母未生前北斗面南看分明在者裏不用別鑽研僧求住師云沒有你安身處僧近前瞬目視師師云作麼僧禮拜師便打眾入方丈請小參值師立次卻云待坐了為你們小參眾禮拜師云說什麼小參直是大參了僧參師問來做什麼云親近和尚佛法師云他沒有佛法云將什麼示人師便打云豈不是佛法師云喚作佛法入地獄如箭問推倒須彌山如何是向上一著師云你頂門眼在麼僧擬議師便打晚參垂問云天寒人寒明什麼邊事一僧云應時及節一云寒時寒殺一云和尚不唧溜師一齊喝出師問僧那裏來云天台師云石梁橋斷也僧擬議師云你不從天台來二僧參師問甚處來云金粟師云錢塘江被王總督把斷作麼得過云渡海來師云海風作又如何僧無語師云一齊淹殺晚參眾禮次師云玄沙道因我得禮你汝等作麼會侍者打師一下云者裏什麼所在說你說我便行師便打眾無語次日一僧入方丈云昨晚和尚垂語侍者何得無禮大眾前便打和尚師即打趁問僧一日行益多少飯云大眾彀喫師云你在大眾數否云某甲日日飽師云飯袋子師落堂云結制五日了今晚要還老僧飯錢一僧云飯錢且置昨夜馬大師來也師云與你道甚麼僧一喝歸眾師云響則響當不得飯錢又僧云某甲不曾喫飯還什麼飯錢師云二時過堂作麼僧擬議師便打一僧云某甲庫藏裏一物也無將什麼還飯錢師云如何是無一物底消息僧擬議師亦打一僧出纔禮拜師打云者一拜也當不得便歸方丈僧隨後入云適纔和尚一棒意旨如何師又打僧云費力不少師連棒打出僧出山師云臨行一句作麼道僧云某甲著草鞋去也師云有人問雪竇如何秪待你作麼對云清茶淡飯師云也須嘔卻師入堂云維那要老僧落堂警策顧左右云還用為你們警策麼拈棒一齊打退居士禮次師云日來消息何如士擬開口師一喝士無語師云應是你喝以杖拄出師搊一僧云作麼生云某甲打米師云即今聻云不間隔師云昨日事作麼生僧擬議師便打僧參師云幾時起程云六月師云一路有人與汝說禪來云那裏見得師云者漢猶困在師落堂一僧問如何是學人自己師云兩眼對兩眼云生死如何得了師云又是從頭起云父母未生前聻師云你且了取一頭一僧禮拜云泥彈金彈則不問如何是高超一句師云看取腳下云頭頭獨尊去也師云何不禮拜僧佇立師便打問僧那裏來云龍池師云來做甚麼僧頓足師云向甚處去也僧無語師便打晚參師問長安甚鬧我國晏然如何是晏然一句試道看一僧禮拜而退師云儱侗一僧云某甲在者裏師云未得晏然一僧云者僧不會和尚意便行師云果然不會行者五人求命一師過法華經師云惟有一門而復狹小尋得門著即與汝過經無語一齊打出一僧禮拜起遶一圓相師云你病麼云不病師云為甚麼頭暈擬議師便打僧參師問那裏來云十八澗師云亂走作麼云不曾動一步師云爭得到者裏僧遶一圓相師云大好不動步云和尚莫作此解師云你作麼生僧又遶一圓相師云蝦跳不出斗一僧禮辭師云有問雪竇如何秪待向他道個甚麼僧無語師云老僧罪過僧云殘羹餿飯不勞拈出師云過去久矣問不是心不是佛不是物是個甚麼師劈口打云不是心不是佛不是物問古鏡未磨時如何師云昨日閻總戎進山打仗去你知麼云某甲不管閒事師便打師入堂眾禮拜一僧云著賊也師云賊在甚處僧喝師打云汝試說看僧云明日再商量師復打僧問無夢無想如何是大用現前師一喝問一棒打破髑髏如何安身立命師打云會麼云脫體無依去也師云未是你放身命處僧以指打一圓相師云兔子不離窠僧參云久慕和尚今日親見師云那裏得者消息云某甲自松江來師云老僧有甚可親云不入虎穴焉得虎子師云野狐精僧參送香儀師云更有也無僧云再加二十兩師云將來看僧以坐具一拂師云我不要假銀子僧無語晚參眾禮拜侍立師云請歸堂去眾走師喚轉來眾無顧者師云者一隊漢秪解恁麼去不解恁麼來王念尼海憲於協府會齋次問云知有底人日用如何修行師云穿衣喫飯士云有時穿衣喫飯沒有時又且如何師云居士不妨疑著一僧看溈山水牯牛公案至芭蕉托此相呈之處指問一僧是甚麼道理僧彈指云者裏會得一串穿卻僧云未在更道僧便掌其僧不肯白師師云他者一掌落在甚處你卻不肯僧擬議師掌之遂喚前僧徵云芭蕉三圓相你因甚打他一掌僧作掀桌勢師云亂做連打三棒復云芭蕉為甚作三個圓相你二人道看他道得你與他懺悔你道得他與你懺悔若俱道不得各請歸堂哭泣有分一僧遶一圓相一僧云白雲覆青山師一齊叱出至晚參師舉問一僧適纔者公案你如何理會僧云目前無和尚此間無學人師云知你在鬼窟裏作活計僧禮拜師云似即似是即未是又問一僧僧云我王庫內無如是刀師云老僧未肯點頭在僧辭師以拄杖劃云道得從汝去僧將坐具一摵便行師云前面有人大須仔細問已悟底人為甚當機暗昧師云連日陰雨爭得到來進云只如入林不動草入水不動波是甚麼人境界師云路滑難行進云會不得師一喝僧擬議師便打居士問昔日鹽官問侍者犀牛話者無對古德代云和尚年尊別請人好此意如何師以拂子左右拂典座禮拜師云做多少饅頭云五六百師云說一是一說二是二何得與麼儱侗座無對侍者云和尚有一分座云侍者也有一分師云莫將官物當人情拈出你自己底看侍者打師一掌云某甲卻有師叱退僧參師問那裏來云雁宕師云詎那尊者在麼云在師云做甚麼云看水師云他年多少云天長地久師云恁麼你未見在僧云即今親見師云即今那裏見僧無語師便打收飯僧入師云你今日為甚來遲云草鞋斷了師云還我磉來僧喝師云我問你腳跟下事亂喝作麼僧禮拜師便打一僧問侍者露柱懷胎燈籠生子不知是男是女請商量看侍豎起拳云且道者個是男是女僧云放下著更道侍與一掌僧云分明道看侍又掌云將謂別有僧亦掌師偶出侍舉似師僧云和尚面前不好難為你師云你那裏去了僧云者老漢未會末後句在師云如何是你末後句僧豎起拳師云不是還我末後句來僧無語師打趁之居士問兩條路不明求和尚指示師云兩條什麼路云來去兩條路師云來去止有一條為甚麼卻有兩條云不會師便打僧呈偈師云看過了你本分事作麼生僧云適纔喫粥來師云終日喫飯未曾咬著一粒米你如何道僧擬議師便打出至晚一僧代云疑殺天下人師云你底事作麼生僧云更要第二杓惡水麼師以手搊其鼻僧禮拜云求和尚印證師云者死漢僧問承師有言秪要放下便休請道放下個甚麼師以棒擉云放不下擔取去僧參云求和尚授記師云授記你明日死云某甲卻曉得生死無常師云恁麼則未便死在僧參師云雨淋淋地因甚遠來云和尚風高師云那裏見得云樹大招風師云莫眼花玄音參云向失親覲師云說離又爭得音禮拜師云汝自來有人同來云自來師云何不尋個伴侶云用伴作麼師云路險處如何過云種田人頗多師云也不放過你玄無語師云且去師入堂眾競出下喝師云喝則由汝喝你道一喝不作一喝用作什麼用一僧云鵓鳩樹上啼意在麻園裏一僧云床窄先臥粥稀後坐一僧云喚作喝入地獄如箭射一僧云老漢著甚麼死急先後下語凡三十餘轉師云可見你們一個個不知一喝底用處大呵罵而出隨示一頌曰一喝堂堂作用全不作喝用力加鞭衲僧直下知端的鷂子新羅過那邊師拈古鏡未磨因緣問尼惟極汝作麼會極云會即會道不出師云果然會道不出不會道不出極云教我道個甚麼師便一掌極云甜瓜徹蔕甜苦瓢連根苦師云你又恁麼去也極禮拜僧參師云那裏來云長老山師云長老在家麼云在家師云在家作甚麼云經行及坐臥師云為甚者樣著忙僧擬議師便打僧喝師又打海憲王念尼居士入山問昔日布袋和尚見人便道看看今時何故不學他師云且道德山棒臨濟喝雪峰輥毬祕魔擎叉與他存兩樣無兩樣士云實處即是一般師云貧道即今棒居士還領得麼士展兩手云不離者裏師云不是再道看士擬進語師笑士起身云小解去師云擬要脫身那士云喚作脫身即錯師以杖擊云正好喫棒問佛與仙是同是別師拈棒士抵云我是正問師云那裏是邪問今時還有逆行底菩薩麼師云有士云作麼生逆行師云早間放告晚上比詞問僊家性命雙修工夫也妙師云禪家只論見性不論工夫士云見性總不離性命雙修師云喚什麼作性士無語師一喝僧參師問那裏來云徑山師云你因甚捨一取一云也要處處到師云者裏是什麼境界僧擬議師喝出法幢上座早參從左門入師云何不從中門入幢云若有個中卻成偏去師云只如老僧不在禮拜即是不禮拜即是幢擬進語師一喝幢震驚師拈棒便打幢拜起師遽揖出晚參眾纔集師云吾有一問道不得底拂袖便去道得受汝禮拜眾立定師撫掌云失利失利一僧便出師云教汝去便去若教死便死即得一僧作禮出云念和尚年老師云你既答不得亦不受你禮師入堂坐次打幢藏主一棒云作麼生會幢云剜肉作瘡師云只道得一半幢云者一半也不消得師又打一棒云且道是賞你罰你幢云總不與麼師連打兩棒便起身幢一日呈小影請師題師云如何是你大影幢拂袖出師云只許你一半幢云不受和尚謾師一日問幢古人道知是般事便休上座喚什麼作者事幢云盡力道不出師搖頭大笑幢云說似一物即不中師叱云更說道理那僧參云自遠趍風請師一接師示你者雙草鞋從那裏來僧擬進語師劈口打師問一僧從那裏來云杭州師云錢塘江為你說甚麼無語普請挑土次師問侍者你挑幾轉者放下土擔叉手立師拈棒者挑起便行師云到疑著他歸方丈復問適來公案未完你還知麼者云劍去久矣師云腳跟下事作麼生者云今日熱如昨日師云文殊是七佛之師為甚出女子定不得者云惟人自肯乃方親師云罔明是初地菩薩為甚卻出得者云到江吳地盡隔岸越山多師云未夢見在者云和尚疑則別參師打一掌云且道是賞你罰你者云是什麼所在說賞說罰師復掌者禮拜師與一踏僧問若不言前親薦取終身空自枉勞心如何是言前底旨師搊僧鼻云會麼無語師便掌居士問鳳鳴天下瑞時如何師云道什麼士復舉師一喝士亦喝師云你一喝我一喝是同是別士又喝師云一喝分賓主你者兩喝那是賓那是主士云者裏說什麼賓主師便打士云盲加瞎棒師直打出方丈
