body:
  text: 嗣法門人行正等編録法語上示無似禪人承汝檀越謝居士遠惠信物齊儀等要山僧上堂汝不知山僧通身是病調養猶自不暇更有何法可說何堂可上山僧縱為汝說得而汝與檀越又在永嘉相去二百里許又何能得聞雖然汝還知世尊不說說迦葉不聞聞麼既世尊不說說迦葉不聞聞則山僧無說是為真說汝與檀越無聞是為真聞既無說是真說無聞是真聞則山僧說法已竟而汝與檀越聞法亦竟山僧恁麼說汝還信得及麼若信得及非唯汝檀越父母得度脫直見盡大地人無一不度脫者亦見同一壽命同一體用正續綿綿曾無間斷三世諸佛亦如此歷代祖師亦如此天下老和尚亦如此山僧亦如此汝亦如此檀越亦如此檀越父母亦如此既皆如此都盧是個大解脫門豈更有能說所說有生可度有壽可延有嗣可祈哉復沈初引居士居士既云見三千大千無在用藥無在非藥莖草可示信手可拈又道欲到山來要山僧證汝父母未生前本來面目并乞我拄杖何自語相違之甚也古人云參須實參悟須實悟始得不然成大妄語寧不為懼此復復靜淵法主屢承佳貺感怍何如適令孫囑以薦母事一如來諭但云要山僧垂慈一喝令者婆得三日耳聾去恐喝則喝矣渠若作喝會未必真耳聾也莫若為他捩轉鼻孔向無鼻孔處出氣又病朽何福承老法師費念山中大衆端受供養謝何可當諭云其個中事對面千里良可歎也若論個事不隔一毫何歎之有即此對面而言千里者何自謙也豈不見古人云君子千里同風乎次偈奉答個事初無晦分明反著疑重關君自隔棒喝我何奇千里同風句今將覿面期援毫聊奉答青目即當機答念慈老宿來諭云某際此桑榆末照欲得力一句還望大師不吝慈悲者若論得力則一句也無若有一句一字礙於胸中則非得力也復黎太沖居士得手教有如覿面之喜又遠承信儀及供何過殷也來諭云不曾決了因循世法中無怪觸途荊棘橫來挂人終未知處此得有佛法分否山僧謂離卻世法並無佛法若離卻世法別求佛法何異斬頭覓活離水求冰耶只於二六時中動靜施為應緣接物料理家務無時不到無事不然自不覺故耳正所謂日用而不知也果能直下覺得了信得及去一覺永覺一信承信則火裏蓮花時時顯艷自然貼貼地信手拈信口道信腳下要來便來要去便去那見有佛法世法了與不了荊林拄人哉雖然山僧亦是寐語此復示沈初引居士四事供養助道因緣吾出家人所不可闕初引居士心有餘力不足惟以醫藥為供匍匐於祈寒溽暑中手到病除鮮有不驗雖然更有一種病一味藥猶未識在且道是甚麼病甚麼藥要識病麼古人云我有一病非世所醫又馬大師一日院主問云近日尊候如何師云日面佛月面佛者是要識藥麼昔日文殊命善財採藥曰是藥者採將來善財遍觀大地無不是藥卻來白云無有不是藥者文殊曰是藥者採將來善財遂於地上拈一莖草度與文殊文殊接得呈示衆曰此藥亦能殺人亦能活人試問初引曾識得非世所醫的病麼還識得日面佛月面佛的落處麼并識得文殊示衆能殺人亦能活人的藥麼忽然看徹直教通身是病通身是藥信手拈來要用便用那時殺也在你活也在你灑灑落落利己利人無施不可經云諸供養中法供養最不然自己一場熱病到來要且如何下手所謂業茫茫無本可據至囑至囑示自如禪人上人既號自如有何不如更要山僧開示若要山僧開示則自如不自如了也釋迦老子云如我按指海印發光汝暫舉心塵勞先起金剛經云應如是住如是降伏其心夫既如是則上人分上不少一法不多一法既不見多一法又不見少一法則上人全體自如豈待山僧問示雖然也須親證到者個田地始得古人云參禪一著了要敵生死不是說了便休昔僧問趙州和尚萬法歸一一歸何處州云我在青州做領布衫重七斤上人作麼生會如不會直須豎起脊梁剔起眉毛咬定牙關仔細看他是個什麼道理看來看去一朝忽然看徹則全是上人自受用三昧個裏覓些子如也不可得是也不可得不如也不可得不是也不可得如是不如是總不可得不可得亦不可得如是向者裏翻個身來便喚作如亦得是亦得不如亦得不是亦得如是喚作不如是亦得不如是喚作如是亦得乃至一切皆得者便是真自如也然雖如是上人莫見山僧如是說便作如是之見示吳道人尊翁敬溪居士來云道人因病痛念生死倘到無著落處沒個把柄如何是好要與山僧討個把柄分明指示個著落處山僧別無指示即此沒把柄便是把柄無著落處正好著落不見古人云我宗無語句亦無一法與人道人若信得及直下擔當莫容擬議不見有聖不見有凡不見有生滅不見有去來乃至一切是非人我等相俱不可得如是則世間出世間一切法皆在於我矣若生死時到便與麼去佛國也在我魔宮也在我天堂也在我地獄也在我乃至驢胎馬腹總不由人如或不然且看個父母未生前自己一段歷歷明明底能言能語能見能聞底在什麼處安身立命行也看坐也看茶裏也看飯裏也看中間不容間斷看來看去看到無所看處沒滋味處清寥寥白滴滴進前又不得退後又不得提又提不得放又放不得心頭熱悶悶時切記者裏不得放過乃到家消息近也如驀忽一時看徹咄眉毛不離眼上那時始信我語不誣矣示絶學禪人從上來事古人指示於人不妨直截省要初無纖毫隱晦秪如永嘉大師道絶學無為閒道人不除妄想不求真無明實性即佛性幻化空身即法身如此說話何等分明直要令人洞明本地風光與他佛祖把手共行同一受用而已雖然也不甚容易須是個人始得看他長慶和尚參雪峰玄沙往來三十餘年後至一日捲簾次忽然大悟云也大差也大差捲起簾來見天下有人問我解何宗拈起拂子劈口打又靈雲大師道三十年來尋劍客幾回葉落又抽枝自從一見桃花後直至如今更不疑此二老豈不是大根器大力量大丈夫不能徹證徹悟終不肯草草取次承當蓋為他最初發心行腳立志與人不同其不取者愈大則其所辦者愈遠近者宗門淡泊名器濫觴遍界狂禪盡是魔家眷屬出世為善知識者殊不本其實一味好門庭熱鬧尚名言妙句四六文章穿鑿公案為深密玄妙以誘初學一等不識好惡漢尋香逐臭依草附木一見便通身癢颼颼地正投其所好不覺不知師資契合如膠似漆甚至串習新奇語句然後出衆一問一答以為機鋒妙捷取勝俗眼不顧識者掩鼻如此為參學究竟真可憐怋若是個有血氣漢子實為生死不了發心行腳者豈肯入他群隊作者野狐種草耶絶學上人頗追古風直有丈夫氣概遍參海內知識既有年矣秪不肯自欺去冬到我關前以道義相從時被病魔纏擾然窮究之心初未稍倦若不到大徹大悟豈肯小小便休誠不虛行腳也茲者秋風乍冷復別南行腳底腳頭善為道路若要易會只消歇卻馳求心來莫自作雖秪向二六時中孜孜不息看個圓悟禪師道熏風自南來殿閣生微涼是個甚麼道理又切忌作道理會看來看去冷地一朝豁然漆桶子破便見從前一切祭鬼神閒家具佛病法病身病毛病一時瓦解冰消矣到此田地盡大地人性命總被上人一條斷貫索穿卻了也更無一個走漏豈不是大丈夫漢成大丈夫事雖然更須知有玄沙道底始得示周瑞亭居士摹像古人云參禪一著子要敵生死不是說了便休者而今多少人摹得個影子邊事欣欣自足便為千了百當不肯用力參究誠為可惜瑞亭居士臨我天童老人小像十分克肖凡見無不禮拜歡喜讚歎雖然亦摹得個影子若是我老人真面目居士須自親見一回示孫紹雲居士紹雲居士參禪有個領處見有一等實為生死發心欲修行者多受一種外道邪魔荼毒便不肯真參實悟為究竟秪認個識神穿衣喫飯行住坐臥底叫做本來人無說無言便是西來大意誠可憐憫茲因山僧南行特持紙來乞留法語以為彼誠若欲究明者段大事必須發大心具大力截斷塵緣參究去不計歲月忽然徹證則知生死皆如夢幻於一切境上如行雲流水總無住著無住著亦不住著到得如此方可說前恁麼話不然是大愚癡人徒自取戾古人云學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人者是也居士以為何如示李籕史居士經云佛為一大事因緣故出現於世既謂之一大事因緣豈可容易哉古德云須是恁麼人承當得恁麼事居士於正月間同數君子到貧道關前貧道一見雖未言及個事便識得居士不是尋常者輩及八月間再會時果一言之下打失鼻孔便信得此段因緣及非積劫多生親近善知識熏習得般若因深緣熟安得如是但未得盡底掀翻耳是時貧道私喜自許為具眼者矣次復見居士根性太利聰明太甚便要將古人公案得一時盡會去殊不知起念要會腳跟下錯過多少了也要知個事甚不如此但知作佛何愁佛不解語居士既信得此段大事因緣及請直下歇卻馳求心即向信得及處看個女子出定因緣是甚麼道理切忌向意根下卜度將心意識湊泊急於要會亦不得忘懷置在無事甲裏務要緩急得中真實踐履久久看去得一念相應則古人機緣不假絲毫作意自然與他相符合不會而自會矣日用應緣處亦自然頭頭上明物物上顯到恁麼時則不見有世間出世間大事小事因緣亦不見有一切是非人我等相全體是個李籕史直下不疑佛不疑祖不疑生不疑死然後推己之餘化彼同類亦不是外事切不得使聰明就要會便解道初不是文殊不及罔明亦非罔明勝是文殊而杓柄總在女子手裏若作恁麼會則辜負先聖不少而今禪和家才入叢林要參禪者盡作者般見解既然如此阿誰不會又何必古今知識盡將者則機緣拈提為最難透者不見道末後一句始到牢關絶後再蘇欺君不得斯言豈欺吾哉往往見居士們學道盡向不意中得個入頭處便向有意中打失了臘月三十日到來返道佛法無靈驗今居士擔當個事惟恐得處太易伶俐太過便不以修行為念把本參話頭一總置之腦後將現行業識以為究竟撥因果以為解脫令傍觀者不信有此段大事因緣非惟於己無益抑且法門有罪者一著子得易守難且不可忽須是頭正尾正始得忝為道契不覺葛藤如許復單士華居士來諭居士自呈自斷一一分明山僧更復何言雖然是居士解到如此實未證得要證得即在無功用處無下手處直下擔荷直下透徹則聲前句後明與不明古人機緣了與不了乃至大悟小悟皆為剩語與黎太沖居士前諭從親侍數年亦曉佛法世法無二無別既曉佛法世法無二無別如何又道恐在家人認著斯語儱侗過日以致自家終不安穩云云余道居士正病在曉得向無二無別處作伎作倆所以生死根株不能斬絶恁麼喚作家親作祟難救之症也既曉得佛法世法無二無別何得更起第二念即向無二無別處一刀兩段直下徹證便與龐居士日用事無別惟吾自偶諧同一無二無別又與法華經所云治世語言資生事業與實相不相違背同一無二無別所以前來書云果然一覺永覺一信永信則火裏蓮花時時顯現那見有佛法世法了與不了十分為居士道破了也猶不瞥耶今不得已把個古人底應驗靈符舉示居士僧問趙州狗子有佛性也無州云無且道趙州為甚道無不許起第二念穿鑿直下看是個什麼道理又不得作道理會二六時中猛省看去忽然看破即此無字是斷命根底刀子便曉得佛法世法果然無二無別者是古人應驗靈符切不可忽與王紹箕居士信音久無矣暮年操履何如初番看居士偈見地不脫坐在一色邊所以復居士書舉僧問古德萬里不挂片雲時如何德云青天也須喫棒上春二月寄我手扎謂兩次法語遙頒僉云大法弟子拜閲托開兩手噴地一聲若有法是誑師雖然猶恐居士坐在者裏不能轉身吐氣我有三十棒寄打居士且道是賞是罰如簡點不出春風天朗過我雪竇親喫如何示半字來問祖師西來秪覓個不受惑底人為甚神光三拜依位而立便肯粉骨碎身去向汝道知恩方解報恩若識得神光三拜依位而立自然無惑亦肯粉骨碎身禮拜山僧有分信夫掩關普寧而實不離貧道爐鞴也外白紙一幅求開示即恁麼還上人與仙居邑侯施清城居士睽隔許久每以道履為念茲聞清勝慰心多矣但前所云僧問趙州狗子還有佛性也無州云無即者無字能透脫也未古德云不得向無字上作活計不許向意根下卜度不許向開口動舌處承當狗子還有佛性也無無門下但即如此究竟久之日用應緣處覺得漸漸省力者便是得力處此處不可放過一念疑情忽破乃到家受用也世界騷然當事者多所分憂所貴者一著子有個下落則古所謂長安雖鬧吾國晏然耳復邑侯虛谷顧公備食明惠開慰多矣所諭頑鈍下根登之覺路何過謙耶正不知應身末世以王事之靡鹽入泥入水即門下無動無為澤及蒼生時也餘惟慈照復徐孝伯居士來諭云尚未知入徑但持此心刻刻不忘或有出路只要直下識得自心便無入而不自得亦無凡無聖絶死絶生入徑出路向甚麼處著者事初無期限所貴大丈夫漢直下一刀兩段不涉程途耳如言下瞥然即親面貧道復屠禎伯居士接來諭并偈云云山僧不信有是事既謂萬緣本空一法不有覿體解脫矣何更求解脫即真空尚不可得而又有頑空為障乃至種種惑謬來總是居士妄想意解為然耳果見萬緣本空一法不有即直下證去下手去加功去舍此則無別參證無別下手無別加功直饒證得來見山僧正好喫棒且道為甚如此參跋楚文上人血書華嚴經者一部佛華經人人本自具足不待書寫文彩自彰楚上人得得刺血書之不似好肉上剜瘡乎然受持讀誦固是少他不得如一向只見血墨即被伊換卻眼睛復黃文公居士來諭云心如異類恐未能領棒喝者是何言與我道三十棒居士喫過久矣只因自己不薦棒頭落處所以有同有異有聖有狂又喚棒是棒喝是喝自生畏難耳殊不知我王庫內無如是刀只要向一念未生前識得棒頭落處則一切是非同異聖狂關頭冰消瓦解又擬向何處閉關耶大慧云未悟時意識紛飛悟了時方帖帖地直饒居士到與麼地正好與汝三十棒且道何故復吳湯日護法接手詔并垂嘉惠知指日旋旆以不得晤謝為惜只可遙對慧勝崖頭神接維摩居士而已承欲以鄙語為本分事究竟古德云君但隨緣得似空飛沙走石不乖空但於事上通無事見色聞聲不用聾此即貧衲所謂無貪著則身不待跳而迥超三界無厭離則跡不必滅而隨處自在之旨居士便驀提得去一念相應則自勘自驗終不借他人鼻孔出氣日用現行便如大火聚一切物近傍不得如太虛空一切物棲泊不得於逆順境界不著照了自然無喜無憂所謂一種平懷泯然自盡是也自家分上既有如此受用不妨興慈運悲利益一切山河大地草木叢林無一不是清淨妙覺之場男女老少智愚賢不肖無一不在一體等觀之域直得灑灑落落諸惡不作衆善奉行然據本而論即使修一切善不知善是何物而況云不善之事昔日世尊四十九年說法不為別事只為衆生迷背已久直指心源令其歸家樂業遞代宗匠示一機一境一挨一拶正是言言見諦句句超宗說也說你自己有的教你行也行你自己有的不曾別有甚麼法教人去學教人去行持然則貧衲今日又焉可有別法相為哉李都尉云參禪須是鐵漢著手心頭便判直趍無上菩提一切是非莫管居士須是恁麼始得切莫以貧衲所言作道理解會忉忉露布實以為罪跋金剛決疑卷後憨山大師道重天下其著述浩多所以墻岸法門醒迪述背者非一而足古所稱高僧中之雄者不是過爾金剛經有決疑之詮也亦既盛行於世胡子晉公普卿昆弟別欲刻行者為其先君若木居士未之年篤信是經蓋先君之手蹟存焉當乙酉兵火胡子懷藏佩服於顛沛流離之際卒能全其身以廣父之善可謂佛法無靈驗乎示吳我因居士夏初簡問居士工夫無怠否鼻孔曾摸著否今報云雖時時摸取鼻孔工夫未成一片後又云忽遇一個無面孔漢教他摸個甚麼不妨為居士恭喜雖然要問居士曾摸著鼻孔知他無面孔耶未嘗摸著知他無面孔耶蓋鼻不離面面不離鼻若摸著鼻孔鼻孔即面孔面孔即鼻孔何必更摸若未摸著鼻孔即居士錯過面孔矣不可道個無面孔也看來居士雖能時時摸取鼻孔實未識無面孔漢要識無面孔漢直須摸著鼻孔鼻孔一摸著則不見有面孔矣面孔既無鼻孔何來到恁麼時方可道克副所望也示無蘊吳道士來書老僧覽之好與汝驀面一啐將謂道人具有丈夫氣概與尋常不同還要法語為工夫策進耶如有工夫教道人做即是賺殺道人不見先聖道知得者般事便休道人若直下信得及一腳到底一念萬年萬年一念去諸佛尚不奈汝何況有生死奈得汝來而乃朝三暮四暮四朝三向人問工夫討下落轉見不唧溜轉見埋沒自己到處受人顢頇未有了日在復馬培原給諫年前面晤不惜為上人深錐痛拶至今尚未有個消息古德云但辦肯心決不相賺若要了此大事二六時中撞著銀山鐵壁相似進則無門退之則失又如墮萬丈深坑四面懸崖荊棘者裏一跳跳得出翻個身多劫塵勞一時頓息千般伎倆從此冰消則向末法濁流激揚酬唱隨類闡徵不為分外千萬以此自強他非所望邵得魯居士為母王夫人六秩請示法要佛法如大海非信莫能入若一念生信則河沙福德盡歸方寸剎塵壽量只在心源豈人間形影邊事所得而算數譬喻耶前晚得魯居士問老僧如何是直截根源便與一棒云者裏什麼不直截士云畢竟如何老僧云待禮拜了即道居士作禮連棒打之即此便搆去活活潑潑可以該天括地可以豎古窮今今日尊堂太夫人六十壽誕居士即將者個消息和盤奉獻不妨殊特若更索法語則是五彩圖畫虛空轉沒交涉透伊禪人求示古云一處透千處萬處一時透一處通千處萬處一時通透得一萬事畢透伊上人一日來呈拈頌一卷老僧看畢遂問伊云喚甚麼作正法眼藏伊低頭無語令老僧不妨疑著雖然者裏要須實透始得正不在拈古頌古上祖師西來原不立文字語言直指人心說個直指又曲了也更有什麼為礙若直下透底人則生死幻翳永消金剛正體獨露一透永透無有間斷若履踐得日久歲深自然左右逢源打成一片不見法昌道入荒田不揀信手拈來草觸目未常無臨機何不道咄切宜勉之復韓仁甫居士新春起居諒必如心去冬接手扎云蒙徵詰一時訥於酬對途中忽惺悔不即震聲一喝所謂當陽拈出斬新條令者云云正是當場不戰退後興兵知過即得若謂拈出斬新條令者不妨令人絶倒更云自合喫三十痛棒尚有一人未肯放手在縱居士與麼道秪如一喝不作一喝用又作麼生道三喝四喝後又作麼生道若向者裏下得語轉得身吐得氣方好喫老僧痛棒不然縱有棒阿誰肯打居士來復姚益城中丞附原偈輪開五指雷音動拍向癡頑老子身此意教人親薦取李陵原是漢朝臣接來書云當丙夜半夢半醒間忽作此偈朽衲不覺拍手一笑為老居士助喜蓋實似有所得之語也後段以為此猶是門外人說話亦見鄙念拳拳結於夢想云云豈老居士自認此偈為夢裏話耶試問老居士夢時與醒時不知是一是二于此一覷覷透則無事不畢矣辱寄丸藥與病質頗宜多謝道愛別詠甚善正是春風披拂情怡意悅時也領惠領惠復林文侯集侯兄弟曩歲密印一期闡發大事因緣頗為四衆植般若種子將來敷花結實正未有艾此皆尊翁大德及賢昆玉開闢法窟之大心故有如是種種吉祥以上承覺祖下惠來葉只此大心乃諸佛妙心不從現在勉強好效而得從多劫已來親近善知識熏修純熟而得以故居俗不為俗纍居官不為官纍讀書不為道理纍立身不為習氣纍惟此大心觸境逢緣頭頭顯露祖師道心地含諸種普雨悉皆萌吾本來茲土傳法救迷情此之謂也觀二居士英姿挺發又能砥礪於道為楊為李足可觀光於老朽有深望焉如尊翁大德發祥密印時不以老龐自居直以臨濟德山自任亦其素秉一副靈骨種子堅牢故也及三上乳峰隨衆參請刻古於祁寒溽暑之間勤亦至矣旋離密印而應大梅之請大梅破屋壞垣僅蔽風雨古德隱棲其處早有一池荷葉衣無盡數樹松花食有餘之句其次第受用非密印可比所以伊時大梅請而尊翁請老僧無片語成褫之惟伊自肯方親故有今日住大梅之緣也讀來扎勤懇纍幅出於至誠自應隨事隨機代為勸駕詎忍以等閒視之正恐其堅執卒難驟舍來不緣召之而來去不緣勸之而去耳在二居士援引盛舉然尤望以羅睺羅阿難陀現身自視而以身貧道不貧視現在永嘉其為孝更有甚焉行止之緣自有時節惟望道力堅護密印以應娑羅結果之祥為禱
