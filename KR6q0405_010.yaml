body:
  text: 嗣法門人行正等編録法語下復嚴髻珠司馬客秋九月山事寂寥之際道舊好音忽千里而至依依遠情浹於心目中之感荷無可似者入山之訂夫豈虛語然所諭此一大事因緣朽直是無可相為蓋素諳居士根性利理路純熟朽若與麼提居士早是與麼去了也才向者邊說似又向那邊走脫了也總饒舉似一則兩則直截現成底公案設或驀提得去便把個孤明歷歷見聞覺知動轉施為底以為究竟似者般底提起便有才放下便無等閒遇著一個咬豬狗手腳底當面一拶直是無可抵當況生死分上能用得著耶故朽不羡居士有目機銖兩底眼願有一口吞盡乾坤不遺蹤跡底力量古李都尉云參禪須是鐵漢著手心頭便判直趍無上菩提一切是非莫管是甚麼力量是甚麼面目居士實實得到如此便休不然待親到雪竇有個商量處復姚益城中丞讀自省偈語令朽病體頓輕歡喜無量富貴中人忽然跳出潔白地上與麼受用莫當等閒正所謂八十翁翁入場屋真誠不是兒戲事雖然如是見地不脫坐著一色邊正是學道人之理障正知見不得現前楞嚴經云知見立知即無明本知見無見斯即涅槃記得香嚴禪師一日偶以瓦礫擊竹大悟云一擊忘所知更不假修持動容揚古路不墮俏然機溈山和尚云此子徹也仰山云未在此是心意識著成待某勘過則得一日見香嚴云聞師兄參得禪也請道看香嚴云去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧連錐也無仰山云與麼話如來禪許師兄會祖師禪未夢見在試再道看香嚴又云我有一機瞬目視伊若人不會別喚沙彌仰山方肯道恭喜師兄會得祖師禪也老居士試將此三偈一一細看自有一番超脫處并拙偈奉答未審以為何如次來韻非思量處易無難任運騰騰與麼觀世界踏翻同古鏡安禪識取者蒲團風生起滅誰為聽月放眉頭自著看莫道貧家無長物目前隨我用般般題鯢淵張相國贈無凡上人手軸有天有地以來陵谷之變遷朝統之互換世運之興衰人類之賢愚不一而足矣而天地之所以判然成立者賴有義以持之義者何不偷之謂全此不偷之義而執笏立朝操戈戡亂以至考槃泌水若而人皆有光明碩大以持扶天地元氣即我如來無上妙道傳至今日代有偉人出而驅邪逐魅震地轟天無過擴充此不偷之義耳昔人放下屠刀云我是千佛一數又有曰我偷心死盡始行活路此其徵出豫今獲睹鯢淵張公贈無凡上人手卷而有感其為人也張公身死社稷挈家盡節義也無凡仗劍相從能事既周挂冠剃染義也至張公亡而身冒險難骸骨之暴露者收葬之遺孤之囚執者安全之亦義也然則一出一復處一死一不死皆無愧於天地之人哉無凡從豫遊理乳峰院事有素矣戒如冰雪丰骨稜稜夫亦可以義法門也雖然觸著遇著老僧粗拳辣掌並不放過咄咄復姚益城中丞春光和暖道容在望四神丸之惠過沾新況謝謝承諭云除卻知見益無入處貧衲不妨為老居士恭喜既無入處則全處入全處入則全體入矣若能全處全體入則無入而不自得所以香嚴大師道我有一機瞬目視伊若人不會別喚沙彌與麼道喚作知見得麼拙偈附書扇頭老居士當一笑而擲之一機瞬目視前人不會沙彌誰更親知見無知何處入李陵原是漢朝臣復胡其章給諫諱鼎附來書釋迦文佛四十九年說玄說要因緣果報攝入毫芒卻被嵩山鈍漢一齊鏟削盡作沒字碑文不知誰遮誰掩誰撒誰露嚼斷千古老和尚舌根謗佛罵祖不曾說著些子且問南廣寺去織女廟多少若還過得河借取支機石看孤峰晏坐曾辱良書大護法高風徑節懷佩已久客歲過南廣原擬暫住旬日即圖晤對不意延閣至茲中之負歉非可言似辰刻一居士持問頭相見知是個中人鄉曲喜出意外士從容云須假答話朽衲雙手舉云老僧到者裏不識請收起士云有回語即來相見朽衲笑云但恁麼去回覆莫錯過好居士拂袖便行不妨伶俐侍僧不唧溜隨後卻索原紙呈似朽衲與一掌云可惜許後乃知為大護法所示也朽衲幸然不負來機今未免知而故犯更向第二頭與大護法周折一上從前與麼告報不知是說玄說要耶一齊鏟削耶且道南廣立地在甚處而有過河不過河之說更要支機石看切莫作如是語話也真正作家百中難得鄙中不勝神候復蘇康侯居士附原書後段云務令胸中明了曉得者是個本真發露者是個雜念流注方不被境緣所轉方不虛此歲月秪因力量小工夫少未能大死一番每見境風扇動不覺和身跳入此所以留心日久而不見成功也具述來歷自呈自斷一一分明後段務令胸中明了及不被境緣所惑云云即據要曉得者是個本真發露者是個雜念流注正是學道人受病處何故聻若只曉得便休了只認得個昭昭靈靈的於生死分上何曾得力咦當頭一棒莫言不道彌陀懺儀辨語介石文公請三界無安猶如火宅俊哉丈夫甘在業海中頭出頭沒而不知返惟是上根利智不難自著眼腦張紫巖云我學佛然後知儒學佛豈小緣哉滇南介石文翁仕於婁述彌陀懺儀以公紳士為祛業進福者勸然則現前水鳥樹林皆悉念佛念法念僧在會君子其薦之否乎夫遠公後而蓮社不作文翁猶今之遠公也豫為之加額復王九一居士附原書三到南廣卻被和尚針著頂門直得無言可訴無理可伸未後冷灰豆爆惡水一潑得手答偈語益復打碎膠盆子蒼天蒼天和尚幸是大人卻成造次了也雖然無孔鐵鎚不妨下楔朝來聲色堆頭提起陳年葛藤特特請質一上昔靈雲悟道玄沙云未徹靈雲果是失錢遭罪不可謂溈山不具眼若玄沙實不放過且道他過在什麼處和尚必然捉敗靈雲兼然捉敗玄沙乞盡情批判一回免得平地上陷阱無數也若復作賊他日相見莫怪弟子捉敗前日盡情為居士說破老僧罪過不少來問靈雲悟道機緣謂靈雲失錢遭罪則且置又謂玄沙實不放過過在什麼處云云居士如此理會要見玄沙三十年後平地上陷阱無數居士還跳得出也未老僧有三十痛棒要打九一到底何故冤有頭債有主莫錯莫錯珍重復朴庵座主細閲來扎備知上人留心向上一著多歷年所非上根利器未易得此頗極歡悅然此事必須親見作家宗匠久經惡辣鉗鎚從冷灰中爆出力量方大以此為人殺活縱奪威行自在真足以死盡天下人亦足以活盡天下人若止從解路卜度而入者即使自己日用中不無受用處而才一開口未免傷鋒犯手世之誤用金針而擉瞎人眼者不知凡幾可不慎歟閲諸頌不可謂上人見處不是但不傷囫圇便露斤骨即此便知上人作用未能盡善盡美矣總之此事非言語可傳亦非紙筆能盡來扎云為講席所羈甘作傳言送語漢以當苦行不見昔日德山於紙燈吹滅下發明大事即將青龍疏鈔焚於法堂前便開大口云究諸玄辨似一毫置於太虛竭世樞機如一滴投於巨壑未聞有目睹全潮而猶戀戀於一漚者上座果能追蹤德山太原諸大老毋論老朽不能壓良為賤即三世諸佛歷代古錐與天下老和尚俱當退避三舍珍重使旋附復不贅示歸望之居士佛言學道人斷欲去愛識自心源達佛深理悟佛無為內無所得外無所求心不繫道亦不結業無念無作無修無證不歷諸位而自崇最名之為道釋迦老子開口要人去愛今時人在愛中著倒迷而不捨何時識心源達佛理悟無為哉望之居士為喪子故做工夫輒不得力質於老僧老僧曰只此愛念且道從何處起若識得起處只此愛念冰消瓦解乃至諸佛妙義百千無量法門亦一時冰消瓦解望之立地處自然冰消瓦解了也咄切須努力更莫別生枝節別來惟恐忘卻因書寄之示趙天錫居士號墮僧密印僧來所諭河田渡口親喫白棒不識到今還承當得也未如云骨頭雖疼心靈自若則居士頭疼處別有個心靈自若豈不錯過山僧一棒乎昔百丈從馬祖遊山次見一隊野鴨子飛過祖曰是甚麼丈曰野鴨子祖曰甚處去也丈曰飛過去也祖便把丈鼻子一搊丈負痛作聲祖曰又道飛過去也丈便悟歸至侍寮哀哀大哭同事問曰為什麼丈曰被師搊得鼻頭痛曰有甚因緣不契丈曰汝問取和尚去同事問祖海侍者有何因緣不契在寮中哭和尚為某甲說祖曰是伊會也同事回問丈丈乃呵呵大笑同事曰適來哭如今為甚笑丈曰適來哭如今笑同事罔然試看百丈被馬祖一搊鼻便爾了徹居士親喫白棒仍向痛邊錯過何也自識墮僧便是不墮切冀努力復囊雲公唯昨接來書云早已推倒火爐冷啾啾去也上座不可作如是之見直須扶起火爐始得不見古云如今人多是得個身心寂滅前後際斷一念萬年去休去歇去古廟香爐去冷啾啾地去便為究竟殊不知卻被此勝妙境界障蔽自己正知見不能現前神通光明不得發露又有云平地上死人無數出得荊棘林是好手上座曾到恁地也未火爐頭究竟豈可少耶復鄒子尚居士居士云以乾屎橛親近老僧不識乾屎橛在甚處安立要老僧設一座與居士耶又欲即於現前付一法名留在門下作一個不削髮不住山不專以皮囊親近和尚底俗漢居士既自道取不妨喚作行漢如何如何復沈恂如居士居士與解上座起居並佳足慰朽懷老年兄弟以大事相警策尤為希有但此事秪在自肯朽衲究竟何以加於居士居士萬法歸一轉語只者一猶未識在若果識得一了自然不問老僧萬矣所以來偈亦爾滯為拈原韻并復萬法歸一一歸何信手拈來不較多一棒打開日月面等閒翻卻了娑婆頌古拈花微笑拈花特地揚家醜百萬人天俱束手迦葉頭陀獨破顏一笑至今難合口迦葉三度作舞撫琴作舞絶疏親彼此明明過量人大地山河較些子不妨盡解作琴聲世尊一日三喚三應乃曰無為真佛實在我身呼應分明弄識神瞿曇真個老婆心珊瑚枕上兩行淚半是思君半恨君文殊握劍持逼如來文殊仗劍逼瞿曇逼殺瞿曇實不堪五百聲聞皆自悟莫教錯聽老婆禪栴檀像接佛如來身栴檀像覿體看來沒兩樣心肝五臟不知他兩眼分明對兩眼耆婆善別音響敲破髑髏血濺人耆婆何似不惺惺應知閉口深藏舌天上人間只麼行調達謗佛身陷地獄天堂地獄不須疑調達通身受用時寄語瞿曇謾饒舌試看誰不丈夫兒外道問佛不問有言不問無言世尊據坐外道便悟若問如何驀面一唾殃崛摩羅托鉢殃崛摩羅托鉢撞著人家分娩特為救伊産難回問世尊一轉女子出定孤掌不浪鳴獨樹不成林出定與入定一隊野狐精德山托鉢德山一口鉢托出大家扶雪曲誠難和莫擬唱吳歌應無所住而生其心月朗星稀烏鵲南飛繞樹三匝無枝可棲青州布衫青州布衫重七斤老婆心切趙師僧分明直指我家物多少癡人向外尋僧問趙州和尚姓甚麼州云嘗州有僧云甲子多少州云蘇州有嘗州有蘇州有拈得鼻孔失卻口不是渠儂不丈夫大都只為貪杯酒熏風自南來熏風自南來殿閣生微涼逢人便恁舉淚出痛肝腸直指人心直指人心見性成佛誰識老胡當門齒缺五祖前身與後身東山西嶺青昨日是冬至五九盡逢春婆子拋兒老婆自棄小孩子一段真風直到今好手手中呈好手貴圖千載有知音雪竇化主諸佛出世未出世雪滿長安風悄然雪竇無端遙喫棒應知頭上有青天毗盧師法身主毗盧師法身主極目雲山煙靄裏道與不道論疏親三十拄杖不饒你鎮州蘿蔔盡道鎮州蘿蔔大誰知滋味沒些些我今豈是閒饒舌三十年前咬著他南泉斬貓南泉舉個死貓頭換盡時人兩隻眸看取一刀分兩段不風流處也風流靈雲見桃花三月桃花映面紅誰家不見笑春風時人只說靈雲老開眼明明在夢中法眼丙丁童子來求火丙丁童子來求火十個指頭是二五翻思昔日老禾山見個人來只打鼓題錢聖月居士莖虀菴偈莖虀不識是何物居士名菴也大奇奇語諸方高著眼莫教錯過自家底
