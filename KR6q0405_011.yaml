body:
  text: 嗣法門人行正等編録偈語上示方六平秋雲幕幕整秋衲秋雨泠泠打山蕨活計吾家正是時忽頒佳什手忙接珠玉言言如走盤率兮坦兮如何說古人昔日語措大覓巧不得胡為拙一念不生體自彰玲瓏八面休剞厥鳶飛魚躍天地間顯非顯兮密非密寥寥吾道絶古今六月炎炎千里雪寄徐石侶北風寒山骨露思君昔日曾相顧非相顧大地不曾有寸土胸襟落落寰宇寬勞思勞慮胡為難秪緣入理喜深談悠悠不出在林間夜來孤坐寒窗下松風瑟瑟堪瀟灑達人居處我知也單時化時鼎二居士入山論三教如日月星自述不能入道因緣師示以偈吾道本寥廓非止人名目名目既可得何物不被育試看宇宙中歷歷皆可讀日月與星辰佛儒道無逐動靜及飛潛總歸一念覺覺即絶思惟步趍休自卜形色雜青黃許誰分石璞空明既自照何妨任磨琢天地本無言要知語盈谷熾然說無間端不一幽獨日用者卷經讀之自須熟熟後始得知聖賢只一服寄酬王紹箕居士千里百里江重隔霜風凜凜花狼籍巖房寂聽松鳴長煙漠漠兮山蒼蒼澄澄絶域杳何極分明普示諸知識君不見行路難千尋寒色上眉端雪裏梅花試更看送冷堂上座歸里華亭江上春風長千古令人思不忘蘭槳獨敲霜夜斷推篷室靖月痕光華亭江上春風冷千古令人發深省沙清水肅影涵空底事明明驢覷井上人歸去有何別今兮古兮橫該抹逢人秪乞一文錢咄臨濟德山是甚麼乾屎橛送本無上人之南嶽住靜禪家流好居山臨機要自絶躋攀行兮止兮真實解脫之道語兮默兮無非一字之關修證不無染不得古兮今兮同潺湲遊吳入楚春漫漫嶽巖不辭行路難迢迢此去何時還十載從吾非等閒答李艾山居士韻物生天地間莫不有根荄春榮秋零落於理何悠哉物情既如此不可人無猜大好惺一回其實何從來天高地自下人兮才不才萬物備於我體得從安排鵲噪和鴉鳴夫復何所乖天高一何極仰之誠渺茫鯤鵬能翥羽霄漢從翱翔背負無何有腋底清風涼六合外誰論時聽雲浪浪古今在一瞬志士何悲傷摘星臺晚眺臨眺憑虛淵相看極八埏夕陽山頂木白鷺溪邊田萬壑光吞月千峰影插蓮何須買沃嶺理釣傲秦川俯仰乾坤外其如此石顛送離言法姪住寶慶翛然四壁何寥泬獨坐寒窗對孤月萬木泠泠景象虛未知誰站庭前雪因思寶慶言上座十載睽違眼眨過應住今秋訪老僧目擊不須存話墮最喜山居鄰大梅清風早晚來相和送制副寺歸霅上迎受業幻緣師靈骨去年來雪竇今日忽思歸歸去原無事先師靈骨暉甬上湖山隔千里一條古路直如矢白浪滔滔何處尋芒鞋兩耳清風起相逢不用口忉忉踏著便是自家底歸來送入窣堵中贏得清風猶未已送環侍者回衡嶽大智若愚大巧若拙掉臂因行開口見舌磨磚不可作鏡坐禪豈能成佛珍重南嶽高峰直截紅爐點雪恁麼人承當恁麼事恁麼事恁麼人承當百千年滯貨杲杲秋陽光佛法遍在一切處渡水登山便恁麼去家裏人逢家裏言抽釘拔楔誠良御誠良御休落草等閒更莫打之繞春水揚帆歸及早鉢囊待爾來收好送鑑藏主還嘉禾通身只個大圓鏡萬象森羅一印印白蘋紅蓼滿汀洲目底閒閒秋水浚青山不敢青白雲不敢白一大藏教明歷歷歸去來歸去來悠悠伴我空崔嵬送恂知客還白下朴實頭禪只一句盡在尋常行履處渴飲饑餐不等閒閒閒豈可為活計江南江北任縱橫足底從來坦坦平賓主相逢休話墮臨機貴要忘其情秋風涼秋路長石頭城去一千五百里白雲盡處山蒼蒼送介嵩上人高高山頂立清風生八極深深海底行步步起紅塵有力者剔起眉毛便去吳山越水任爾縱橫力不足者腳頭腳底切莫因循達磨西來文字不立直指人心見性成佛冷坐九年嵩山面壁可大師庭前立斷臂覓心不可得一言之下便寧帖帖帖帖休述彼既丈夫我亦爾那個男兒不如此上人之號號介嵩介嵩之介介何窮直須窮徹無窮底踢出須彌第一峰送值鐘廣朗上人上人三番來雪竇一一面南看北斗特來為我索長篇矢上何須更著尖會即便會與麼去竿木隨身逢場作戲不爾從前依位住佛法揚萬億國中鐘聲傳三千界內曹溪水吸乾大庾嶺粉碎老盧鼻孔一時穿大丈夫兒緊著鞭胡半庵寫經愈人面瘡乞題卷帙吾道一揆今昔無異迦諾尊者半庵居士索債償債皆第一義意旨如何靈文證據咦應知一個鼻子兩孔出氣請益不是心不是佛不是物擬議不來遭點額眉毛剔起自家看半庵居士法諱栗咄參示普擎禪人如地普擎似天普蓋擎者何人蓋底何在老僧道破終不相類咄剔起眉毛超然物外學喫虧偈阿誰肯喫虧喫虧誰肯學學喫虧不來喫殺虧不覺學喫一分虧省作一分惡學喫十分虧討得十分樂喫虧是便宜世人休認錯文殊與普賢剛得者一著王季白出畫扇嵒頭江濱擺渡婆子抱兒拋水圖索書知音六個不曾遇一個看來總不消拋下通身活潑潑不逍遙也亦逍遙好逍遙畫也扇也玩畫與搖扇之人也有甚隔礙而不自陶陶寄黃文公秋風昨夜冷巖木千里萬里空寥廓澄澄絶域眉自橫孤坐蒲團想高躅青雲落落白雲飛白雲片片青雲齊南北東西何所宜洪暉吉護法病中嶽丈包顯之入山乞偈洪公智慧居第一說禪說道休唐突說不到處進一言莫教情見絲頭惑眼根耳根須放空吹毛之下無冤賊此身本是山嶽靈守護崔嵬稱有力示達侍者秋風起兮海山裂百草頭邊漫饒舌曉來靜聽松鳴長亭亭杲日中天揭吾家自信有其人磨不磷兮緇不涅從來濟道出常情試看一掌一握血寄空林大師高標傑立傲諸方下視雲霄踞一床白眼光寒先聖膽青蔬香斷後昆腸草趺行履半間屋篾束風規千仞岡病骨每懷徒自悵竹笻橫按對蒼蒼答參友為法門須個丈夫慚余病骨日煨爐情懷落落渾如野拄杖閒閒亦若孤萬仞寒巖飛白雪一林空影宿玄烏有時獨立千峰上只少同參入畫圖和陸文虎孝廉募結雪瓢韻白雲深處好為瓢面面相逢若久要但得肯將頭自點何須更待手來招風懷落落宦情淡道骨仙仙緇誼饒今日無端賦歸去未關五斗折吾腰㲯毿破衲是生涯誰謂從前見作家咫尺雲山殊可寓一身天地亦何賒雙趺或向林間坐十指每將額上加惟願高音共酬唱此心非邇也非遐堂堂廟社卻成墟山寺何妨住薜蘆瓦沒半椽人易去庭深一丈草難除風寒耐喫非為慣祖席堪憐念在初拼個殘軀如此過未言謀道合籧篨一分情少一分貧貧到無貧始見真片地閒閒休問主春風浩浩自來賓新篁滿目皆吾友古塔當陽豈外珍端的不須他處覓分明時待可中人我生愚拙學何艱聖傳文章未會刪一個蒲團容習懶數間草屋絶追攀從教帶礪千秋業不博雲林半日閒獨惜米家人最好相逢徒只拜空山當門齒缺在年前口不關風語弗全極力偶然成個字都來不值半文錢優游一念休泉石潦倒通身遠市廛為憶逃禪人自愧方池有水未栽蓮不居西嶺不居東小址人人顧盻中雅搆可娛林下快傾囊那惜手頭窮山楣效我茅來蓋竹戶憑他雲自封一室晤言欣得近免思千里有同風我勿如何君若何若何惟恐念尤多兵荒在在隨伊去理亂悠悠漫自過乞食固難尋長者無心容易坐巖阿端然不是空生定莫道儂家效達磨用韻示姚居士老倒通身一個瓢無榮無辱亦無要從來鐘破影難覓自古垛生箭易招片片白雲閒共度清清流水淡相饒寸絲不挂常年事十八孩兒弗繫腰空空無礙亦無涯天地其如是我家成現山林眉際曠自然風月杖頭賒兩輪亙古行猶在一字從來點不加何故人隨他處覓應知當體未曾遐酬國清儲法姪時逢末年不經看舉著令人心瞻寒豈是憎他閒意況也非傲己實情西來直指指何直從上單傳傳弗單遙憶松門古風韻豐千玉珮獨珊珊酬天童費隱和尚法門柱石有同條病骨慚論尚未凋暮雨聲中寒料峭春風影裏夢飄颻玲瓏巖碧高鱗幟乳竇峰晴只草瓢但得些些閒意況似成漁牧似成樵懷爾愚副寺蜀中未歸今日何如昨日涼搬磚運土自忙忙法堂去歲工成始禾榖今年萎更長日逐菜羹充飯足夜來草薦枕頭香頻思副寺歸宜早秋冷風高箬笠霜酬馮次牧馮真長周我生三居士韻時在香山春風春雨溢春潭春滿山花影瑞曇獅子座中閒白法象王峰頂臥青嵐從來有道唯存一直抵無疑不再三佛跡半天空劫外未知何處是伊龕古路行行草木香野花極目笑春王我知觸處承其力誰道長安弗借航日月滿空唯浩浩風雲遍界若皇皇山家忽爾凝眸際早見滄溟幾度桑春明日暖覺風微漫引天香過竹扉是處有伊花盡放誰家無爾月空飛連朝望入憑雲路片席從教解垢衣今古乳峰晴雪在一回舉首更依依送余無度還東甌次法幢上座贈行韻棄卻家山向外詢春光莫令昧當人草鞋可惜腳頭路笠子應知額上珍遍大地都只個眼盡塵沙界是分身法幢大士如相問去去來來一夢真用韻留葦公睽別峰頭已隔年匆匆行色莫忙然萬重山外天如爍六月途中汗似漩草履晒乾秋後著石床坐冷夜深眠乘時笑晤休云緩早晚看看皮骨穿酬嚴髻珠諱扶別時何地費追尋年往誰知不再今舊事連床中夜語新詩題扇草年心小窗有月憑虛望雪澗無人秪自吟每慰同風千里句尚湖消息寄秋深過觀海酬阮旭青都諫諱震亨年前神晤香山寺相見還從東海庵大智為慚倫往哲淨名誰許讓奇男半題玄要機全滅只麼家常道絶參敲唱不勝消息露噱然天地一虛龕酬姚益城護法諱宗文晤別歸來乳竇山高懷時憶若躋攀臨風默默如何道對月亭亭秪者顏夙世同心無剩語相看一笑等閒間綸巾百衲誰為二年老輸吾腰腳頑答趙安伯居士韻獨露乾坤體一堆巍然兀坐萬山陪數椽茅屋隨身搆兩扇柴門鎮日開誰道哲人已昔往我知居士現前來黃花翠竹分明極莫把根芽向外栽答陳金如封翁韻憶昔同遊選佛場藤陰溪緑共徜徉羡君學業如深海愧我才情似客囊草載春風琴水上數椽茅屋景星傍悠悠獨倚寒巖立望月臺前駕鐵航盡擬宗門有別關銀墻鐵壁峻難攀都來平白分緇素卻向通途絶住還世務弗須頻置撥詩章何厭幾重刪惟人肯諾原無事千里同風總一山送余孔謙居士四面晴嵐起石臺寒威寂寂望靈台秋林極目景難寫天籟憑空響自來遍界風光眉宇合一肩雲影杖頭開仍從舊路歸家去萬別千差一道該赴昭陽黎居士請掩關留別吳門諸友西風落葉樹頭高極日蕭蕭駕小舠髮白不禁人自老形疏轉使念同袍青山幾處留寒雪小鳥頻飛惜羽毛病骨漫貪千日懶法門寧屬我辭勞答陳育繁居士韻時膺病骨憶盧公誰謂斯人弗易逢二豎並驅千里外一身輕快兩年中春晴山寺頻開雪曉霽征帆欲破風佳句何須重惠贐慚余眉際不勝紅答李芬遠居士西來祖意我同年杲日明明麗碧天觸目未嘗拘近遠遼空何限絶中邊疑時莫解休尋句悟後方知不在言但向己躬參叩徹從教捉敗老僧禪有感暑氣閒閒一草堂時聞墻外野花香安心會得覓熊耳不識無緣去大梁佛法古今誰剩少人情朝暮見炎涼有生豈作天涯客願向空山禮法王關中次韻古云坐久則成勞放倒其如一覺高有志要知身出汗無言那見舌生毛活人須是活人劍殺賊應還殺賊刀會得我家關捩子白衣束帶總同袍過一秋兮又一秋現成受用愧何投園蔬不種時時有溪水長清日日流業海無邊人自溺法門有道孰來遊一關雖設吾嘗啓獨坐寥寥等個儔除夜偶拈禪者韻六十年來只麼容灰頭土面及時濃夢回石枕何妨再客至茅茨弗厭重病老豈無渾未解歲除那有不欣逢殷勤看彼梅花上擊碎寒雲待漏鐘送玉齊耿兵憲崎嶇不惜到峰頭一見高懷喜溢眸靜坐熏風三日雨漫看瀑雪數聲鳩空拳為舉分明道滿口無言未足酬拂袖轉身何快便山溪水急泛輕舟酬姚益城護法見寄之韻我生看徹等浮漚不用休兮休自休有念歸空空有事無心忘境境無憂閒閒大地閒閒土疊疊高山疊疊丘觸處心花與麼現縱橫十字只伊頭用韻送余孔謙還東甌萬山深處只孤峰千里來斯弗易逢泉石不羈心地印風雲開拓祖師宗春江一道歸帆水乳竇長鳴送客鏞何似老僧情思重善為途路要從容冬至日用圓侍者韻漫疑斤骨老如隤有念還同未死灰時喜孤輪夜深坐那嫌兩鬢白頻催閒攜竹杖敲寒石忙折霜姿插案梅卻比去年冬至日更無他事上心來簡復姚益城護法客歲曾期來雪竇令人夢想兩年中謂能頓破關山路便可擎來日月宮一掌無文音自足漫言有理識難空我家敗闕何藏覆白棒聲聲喪祖風酬空空禪師我病多年夢亦閒閒行閒坐夢閒還閒中夢想閒中晤夢裏閒思夢裏顏閒便逢人問閒處居常閒處即居山閒吟驀地閒相接十載閒思閒夢刪挽徐心韋護法旋嵐俄偃樹清涼法社無光動淚長扶起砂盆乘大願親膺磨衲印心王影堂片片悲雲染海甸濛濛白日藏意緒逼寒神在夢對瞻靈几倍多傷挽六可禪師有引六公禪師將欲遷化以書儀見別兼致持護之意可為出入生死遊戲自在余不勝感悼賦挽遠遠飛書到乳峰告余兩腳欲捎空隨身鐵笛橫吹便不道那伽大定中幾處闢開荊棘地巍然翻作梵王宮津梁已似從今折翹首台山痛未終諸徒卜月之二十奉全身瘞於寺左余以老病未及遠赴先以香茶致奠風儀灑脫若為陪歸去來兮正眼開好滌瘴煙龍穴淨漫扶靈骨白雲堆躘踵老步慚無力翰墨淋漓念有哀一片旃檀和鉢薦法身端不隔塵埃挽余孔謙居士維摩鼻孔已昂藏導世何妨老愈剛冰檗自怡敦節操風霜煞緊誦門墻甌江我道伊人起臨濟其師一脈揚背手忽吹鄉國調山河黯黯動悽傷立春日積雪未霽次道嚴書記催晴吟晨興堂上一回行庭際光浮眉際晴且喜和陽今日始那愁湧雪不時平門前有路人應見灶底無柴誰會烹山運漫隨天運轉春風也解合豫情將往禹門掃塔期語溪師姪蚤還曹溪一口都吸盡塞殺咽喉語不聞不聞不聞聞不聞可中消息若為論南山起雲北山雨肩擔拄杖秋風煦荊溪故里莫稽留早晚歸來共我舟贈施清城居士諱于身雲南人仙居令清城居士每以本分事相質別來一十五年重復敘晤徵詰之餘乃知逆順境中不忘參究腳跟下事且喜不受人瞞余將還雪竇而居士亦擬過留都作偈志別不妨言中有響因次韻相酬以表道信并書原韻於前有識者自能鑒之原作當時混跡赤城西早識浮名夢幻齊濁熱中間親猛喝浪流著處覓真棲貧來自笑錐無立參後應知路不迷越水吳山重悵別恆瞻孤月印千溪休云南北與東西法法當前物物齊覷破不妨隨自得了知何處著真棲錐無立我貧誰立路不迷人參甚迷珍重兩眉橫額上清聲時聽在山溪己亥冬修治西塢塔址喜得明覺禪師靈骨舍利用正首座韻多年祭掃及時來每拜空階動地哀悵望四山徒樹影未知何處是靈胎法身舍利謀方吉佛骨難提鍤下回歡喜不虛勤料理當陽卓立太崔巍寄懷吳柴庵相國秦不知兮漢不求只緣立處自能幽掩關無事登山屐得句頻傳寄遠郵漫道出家能將相早知說法現公侯別來已是三年久何日相看笑白頭次諸禪人老庵成韻客至年來懶送迎澗邊喜結小茆成翰林松老山頭翠千丈瀑飛天外聲孤坐柴床寒石斷靜看霞帳乳峰清叢林料理諸仁事聽我閒閒過歲庚送韓仁甫居士石浪住靜用恂書記韻懶閒臭口說誰宗時有當前不老松小鳥銜花臨竹戶野猿啼月上孤峰山家觸處真消息道者通身是慧鋒過一日兮兩半日閒閒效我只枝笻次酬史及超護法諱大成住來乳竇經多載嬴得千尋瀑雪悠黃鳥每聞春漸老青狽時見我頻遊頃思入鬧因無路敢為登龍不縮頭清韻忽從天外度翰林松色彩雲浮南廣除夕風風雨雨過殘年守歲猶欣未易眠茅屋任從隨處漏紙窗那管舊時穿病餘弗惜燈前夢老倒承歡座內賢此際不知誰料理耳邊爆竹一聲傳贈王煙客太常天高海闊眉毛上策起須憑大丈夫一念萬年誰住著千七百則若規模等閒白棒掀翻過觸處清風自在吾所欲從心老居士豈嫌山叟嘴都盧贈吳魯岡觀察二萬五千二百過一萬八千日正新地久天長誰問王山高海闊總同春窮通居易全由我出處安閒自在人靈鷲當年親付囑于今永作法王臣人日有懷雪山八日初晴暖漸開我家底事上心來當前只片閒田地據坐唯餘傲雪梅寥廓不知誰是主龍鍾已識自非孩南山飛瀑千尋遠未便臨風走一回寄雲門爾密和尚生平不解事唯念同參友別來十載餘瞬息晤亦久雲門誰高步法窟君獅吼坐想春風前裁詩寄一首送禪友迥出千峰上蒼雲未許緘半瓢依古木一杖立寒巖良晤庭前竹披襟月下衫敘來何便去惆悵豈同凡答李元相韻中元時值霽青嶂喜來登山靜開寒色林空度曉聲栽蓮慚慧遠看菊想淵明不審成何也佳音慰我清贈連雲古淵法姪標格在清徑衰風庶可屏獅子一滴乳驢乳十斛迸六合竟何憑杖頭須按定南遊我將還送君有餘興東甌雲山禪院迢遞來青嶂熏風五月天分開雲影路踏破水聲煙絶壑留輿坐奇巖抱石眠萬山憑眺望祖意杖頭宜讀賓吾魏司馬詩賦贈一關深自掩叩我接新詩展卷春風沐盈眸清思馳老貪林下趣閒誦佛家詞廬阜當年社攢眉豈讓伊答李艾山居士韻只者初無住寧容落那邊閒看白雲飛片片凌霞煙朝隨天曉去晚共寒鴉還出處自無心對坐令忘年次韻答邑侯顧虛谷草趺猶未暖蠟屐忽臨關絃誦才三月仁風已遍山清知民事簡傲得宦情閒似憶靈峰囑殷勤萬壑間有感末世可勝念誰能直道行同為佛家子況復共條生欲樹法門起還將心地平從來論實事莫只衒虛名秋日懷羅夢章觀察時寓靈隱山寺空然坐枯懷已若知秋高風入冷天曠日行遲泉石閒清況雲霞淡遠思毗耶多口士此際一何宜除夕病骨本臞然悠悠老我年臨流無濁澗登眺有高巔性逸茆蓬底風清古塔邊燭燒今夜短梅影上新篇雨中有懷徐心韋侍御春冷宜多雨人何惟熱中柳煙江岸斷松雪祖庭空髮並年來白身隨老去窮遙知古君子時亦念同風次酬慈令詹確庵護法山晝晴光暖花飛雪瀑流風前嘶木馬月下喘泥牛展足峰頭快披襟雲外愁遙看人世裏若個悟浮漚贈黎太沖居士七十二月風和暖春光匝地開青高白髮柳香尚老年梅緑竹庭前立明霞席上陪山中無事客也喜逐忙來贈無等上座誦法華經妙蓮華經者無等等三昧日用中行持毫弗假於外是法非思量分別之所解瞥爾肯承當靈山只一會羅夢章護法誕晨望入江城暖春明遠道香山花憑蕊放海鶴帶雲翔盤薄古今極洄漩劫外長掌中閒日月任爾物蒼蒼寄懷邑侯吳虛來護法兩載不相見豈因行路難冰河翻雪浪霜月映青巒步驟長如此風儀只一般法門承願力千古為誰寒送法幢上座往武林乳峰剛兩月獨步去錢塘一句超方外全機絶覆藏臨濟正法眼滅卻瞎驢旁只者破砂盆待將為舉揚贈法幢藏主誕日空山陽律回天曉高寒宇落落方外情寥寥人間譜滄海月何明少室風亦古千載乳峰前翰林松卓午寄陸春明居士長夏空然坐風清遠壑明一身天地老萬法我人生古道有高節枯懷無別情瀑飛千丈石以此寄賢英送法幢藏主還永嘉密印別我春風裏臨行一句親杖頭宣大義足底播芳塵往復乃無事縱橫已絶鄰到家嚴面目所以接嘉賓岫雲法姪歸秀峰初夏正長日山頭顧如冷睽違已三載相晤只一頃齒老不關風形衰何足影痛念法門秋此語知先領寄仇靖侯居士冥坐寒巖上頻思吾君子春吟二月風炎對高齊水天岸啓幽襟道履閒居止寥寥雲外人端不求諸己寄駱天植居士天縱英賢事從教法法如人惟生住著誰解絶躊躇不出尋常用何曾物外居攜孫并訓子讀盡五車書謝陳存之居士偕靖侯諸公入山迢迢來遠道我社亦光生物外機先息塵中念頓輕青山常突兀人事幾虧盈尚德誠多士臨風無語呈登高原大師舊隱木末霜明候風寒萬井煙籃輿隨壑進杖履帶雲旋入戶分賓主開言儼後先故人何處去我欲問蒼天壽白雲鹿門大師遙望白雲峰白雲朵朵玉環紆拱寒翠突兀憑高旭法雨繞香林天花散間蓐問渠何以然我從心所欲壽求如禪師石浪山頭碧巍然矗大清秋陽曝寒水孤月淡高情思極冥無際神交自有聲誰知千古意端的一長庚挽東甌李拙餘都諫諱維樾從師受大戒合掌稱佛號而逝萬法原無住人生安足言雪山曾囑付律社已周旋一病便不起孤明還自圓片香千里寄表念尚依然壽空林大師小陽天氣暖花雨散空香壑遠晴煙起峰高野鶴翔眉鬚老霜雪道德煥文章正令全提也閒閒坐草堂
