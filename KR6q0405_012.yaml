body:
  text: 嗣法門人行正等編録道嚴書記誕辰朔莫風來徑聞聲凜若斯避寒松葉火樂道老年詩濁世無青眼叢林有白眉圓通門大啓共喜不違時無凡監寺誕辰誰云丈夫事將相不能為且喜石窗後還思宗老規山僧愧無似道者合如斯五十知天命殷勤正是時除夜次郁素修韻甲子從初起看看臘又殘靜陪燈不老坐聽影寒班松火茶前活春風語外閒夜深堪共對不問趙州關謝郁素修居士鐫送圖章塊石無情謂能令人醉觀篆文何自古刀法更生寒畫斷風雲快點開星月攢知音如不偶未便指輕彈寄邁庵禪師客歲春和日晴光甬上新一笻千里別兩眼萬山青古道不輕據交情奈至真法門今日事早晚共誰論寄聞機上座遙憶高齊日因思晤即難春風石上坐黃鳥樹頭看絶壁蘿煙靜空蒼雲夢寒一回才舉筆意況若漫漫寄不壞禪師春到山房暖潛思友道寒年高途亦遠情至念何安末世古人在法門近況難慚余懷不已聊以寫毫端寄胡仲能居士片段春雲曉山頭獨坐時遙思胡道彥行見佛牟尼相好人人喜光圓物物齊莊嚴淨無比親到自能知喜晤太沖居士千里江濤隔飛函數四頒招提新席面賓主舊時顏悟法無生忍高情亦放閒錫停欣久坐緣到不拘山酬解蝶齊居士情緒還從道心心相映留靜凡爻未動藏海量偕遊片念千林啓全機一握收激揚應不舍巖壑待余投悼陸季申居士遁世緣何速臨風惆悵深繩床誰共坐法席況重新高柳無聊色清波慘憺陰知君鼻孔直相見只如今示以貞良道者默坐回眸看洞然殊廓襟乾坤通大量日月共無心事在目前露機非句裏尋西來直指意莫向外沉吟贈徐心韋護法六秩春風三月候百物盡芒蒼林下人如舊溪間流更妄古今誰不老彼此足稱狂甲子新新頌休云我後將輪侍者乞偈贈脫白師五十知命時一句如何說不離日用中洞然光皎潔天地我同根萬物他非別高策兩莖眉有語弗干舌示顧習之新秋三伏候值此亢陽天萬物皆如醉千山盡欲然端居火宅裏誰識道人便寒暑不能到紅輪足底圓送古鑒上座歸楚歲在庚寅古鑑上人來參乳峰居無何辭去贈以短偈有腳跟穩實可居山之句在昔百丈示徒云我有一句子百味具足試將老僧此語作如是觀不妨恰好今乙未夏上人復從五龍山來不二旬日欣然整頓草鞋問其所向則曰五龍山也老僧喜云腳跟穩實可居山豈誣語哉遂援毫敘之更寫贈行一偈帶熱五龍去辭余青嶂間道情真個好途路不為艱五味禪從鬧三玄爛勿攀生涯誰足偶到底只居山示朱玄穎學道無難易唯人自肯親頭頭發深省法法了生因觸處靈光曜逢緣覺穎真祖師門下客端不問前津賀費隱和尚住堯峰秋月清輝滿堯峰一盻中世皆尊碩望我亦慶家風黃檗香光遠虎丘嶺脈通乘風縱巨壑津躍意何窮贈嚴髻珠六秩秋老光凝碧林間紫氣旋曹溪天共遠虞嶺鶴同仙有句三千鑰無心自億禪山家何長物以此頌君年贈朱振寰居士時寄以鴈山圖上年君五十春風蕩晴日雲山千里遙山家始聞吉何物堪為贈思量取不出藉彼鴈山圖佳景供閒逸寄懷瑞安邑侯談春舸居士甌江兩接見恍矣舊時人有句非聲色揚眉一主賓金書從夢錫禪板尚家珍好對千尋瀑臨風獨悵神寄沈恂如居士憶自客秋晤黃花香滿林藥石起我病瀑雪娛君心旬日便歸去一年不通音隈巖無事老其如情深深贈雪鑑上人一見罄嘉猷談言慨以慷為余覓幻藏羡子有玄賞大地鏡中觀山河歸指掌韜光二十年於此占宿養西鄰看梅曉發尋幽興扶黎過小橋香風隨袖轉晴雪映梅遙未問主向在先看梅自饒一枝頻欲折惜取待來朝其二欲踏溪南去先須問竹橋望中春自遠杖底路非遙樹樹含香靜枝枝帶雪饒因思嶺頭月可似我今朝禮鶴林素禪師塔有懷五月松風清凌晨冷孤衲引領仰高山懷香拜祖塔長江白水回叢林翠微合有句向誰言鐘聲雲外答其二熏風當午夏極目山冥冥塔影隨雲白碑文斷草青霞飛新古木石立老空亭一炷香浮靜煙光結翠屏京口寄懷山翁和尚松風涼五月避暑潤城西囊篋慚無句江山空有題思君大手筆為我然靈犀道遠嗟何及神傷煙樹迷登金山拳石江心立擬當萬里流南城環鐵瓮北岸繫瓜洲吳樹煙光老楚山雲影浮勞生在此際誰共啓雙眸重過焦山兩度來時異長江一派流焦公祠尚古枯木室仍幽隔岸空音滿孤峰天影浮落霞隨袖轉豈在緑蘋洲月夜懷杜子濂兵憲邂逅山亭日因緣豈偶然夙乘般若力肯屬宦情牽道況長江水天機秋月禪閒閒在庭際晤對十分圓子濂杜公過訪書贈竹院涼生候君來半日閒晤言從上事好看目前山出處承誰力閒忙總一般惺惺無個語黃鳥自關關寄懷子濂杜公承顧鶴林後高懷動我思長江一帶水短句數行詩有意堪遊戲無心永護持老僧回棹邇期悟莫遲遲贈一足恩孫禪師葉敲閒砌涼生大火流久知江已北有子繼前修月擅維揚麗燈分太白悠我來恣遊覽二十四橋秋疁城分衛贈彭子上居士自笑山中客衰年業力牽叢林大家事分衛祖規然我念無高下君心等聖賢一期周勝法欣慰老僧還喜陳金如過南廣多年不晤面晤面豈容易彼此髮皤然相看眼如醉天氣值清和熏風喜時至共坐莫嫌貧杏陰鋪滿地哭僧幢建侍者草載叢林事劻勷一日同老成法門瑞太息我心公道在人弘遠時窮福不充此中難盡話揮淚獨臨風寄晦山顯孫禪師法道未寥落克家不少人狐蹤絶影現獅子解嚬呻鉢挂三湘舊風回四祖新鄉情亦何有太白一燈親贈陳麓屏知州福星明一路澤國有神君阡陌膏甘雨桑麻靄慶雲銘心碑口合千里一時聞更得無弦趣南來風正熏贈念峨孫封翁星燦當南極春回在歲寒一陽始來復萬象有同觀松柏爾承茂岡陵朋壽安願翁老加進心現鉢羅歡示靜諾百草頭邊意當人貴自知戒珠光燦爛信力慧扶持有主誰呼應無心不受欺本非男女相今古末山尼寄山中正恂諸子我年七十來老病精神少歲月理可期佛門事難了南山兀閒閒此念長擾擾分付我兒孫殷勤看木杪示純初上人一念純真作指南劫初田地好生看春風若懈耕鋤力他口休嫌場圃寬示禪如上座禪非意想絶攀躋日用常然體不迷謾坐春風三月裏虛堂寂聽柳鶯啼示悟朗上人聞聲悟道如何委見色明心無甚奇皓月一輪中夜靜子規啼徹緑楊枝示慎所上人君子毋欺慎獨居道人隨處絶思惟相逢設說誠其意試問誠其意者誰示淨光上人盡底掀翻用力窮莫教死水暗藏龍拈花意旨窮須徹管取頭頭觸處通示子禹居士既云我道一以貫夫子瞿曇豈別津不涉禹門三級浪心空及第便超倫次覺中頌六祖無伎倆偈太虛不昧一纖塵萬象森羅覿面陳喜怒不嘗難測我年來痰火病通身示心和上人春風三月繞荊門兩眼時時莫著昏看到水窮山盡處和身放下一乾坤送本無禪人歸永嘉才上山來便下山曹溪一宿豈成閒秋雲試自看何起不在林間即水間弔斷峰禪師雲山迢遞隔江寒千里同風念自寬未審影堂誰個侍一燈續焰莫輕看次李君韜居士韻松濤隱隱接寒潮翠竹山頭暗發條搖拽珠音天外度小窗不甚覺無聊懷古南和尚萬竹林中獨直時清風瑟瑟動人思山家六月曾無暑此景悠悠說向誰答空林大師每因迢遞隔雲巒黃鳥雖聞若等閒病骨欲趍憑杖栗一回拈起一回難景星居月明山夜獨扶藜靜坐翛然似木雞萬籟不知何處去聽來只有子規啼病骨稜稜覓隱棲殘碑草沒見虹霓春風無限花狼籍片片飛來點緑堤摘星臺夜深獨立孤峰上手把南辰攀北斗妄想如何做得來悠然拽杖回家走斷虹崖一條界破蒼巖色宛若飛虹挂九秋何似渠儂收不盡等閒遺落在山頭贈單時鼎居士西行天道麥秋時物物頭頭適所宜端的望中誰是主新新只在兩莖眉示雪汀好憶嵩山事通身雪不禁莫為江上客徒作白頭吟示單時鼎衆生劫值豈堪言顛沛流離固所然大丈夫兒須猛省好看父母未生前勉衆山居茅屋十餘間驀地狂風盡打翻珍重我徒齊著力大家扶起莫生煩化米偈曾聞粒米大如山信施看來非等閒林下道人幸無事一身做債一身還寄白雲鹿門大師白雲山頭白雲老鼻孔遼天何處討千里同風事可知豈是玄沙白紙好示馮恕甫居士恕己人人容易恕恕人若個便無難果能推此心行去世出世法無兩般豫默禪師五秩昔年夜叩鏡湖春燈下相看老未真甲子五旬今又始南山遙對數峰親雨中口占雪竇高茅屋破晨昏秋色入床頭可中多少閒情況雨下分明坐漏舟示僧密印底事參來徹未曾秋風秋月最相應松窗密密提撕看曠劫晴空一印生示淡然安然淡泊是生涯念念相應便作家試看白雲天際曉悠悠自起日輪斜示問松上人寒松落落影垂垂試看渠儂何所為未肯易隨繁卉去餐松宿雪自怡怡化造佛殿偈人家佛殿盡巍然雪竇空空來募緣不是山僧成特地祖庭傳襲有千年春日過羅夢章護法新舍雨後晴川入望賒宛然秋水過長沙有無不到如何說靜聽松風若幾家寄錢維宇居士君行順水舟來慣逆水灘頭又若何但自腳跟牢踏穩不妨隨處是風波僧省親乞偈生身本父母皆久不知親此去忽相見昔人非昔人挽夾山林皋和尚夾嶺花香正是時紛紛竹影見高枝春風驀地來搖蕩撲落虛空遍界噫拮据叢席九年斯大似嵩山面壁時能事既周赤腳去遺來一隻臭鞋皮寄金山老宿謝君遙顧乳峰頭屈指于今三易秋彼此住山人事淡淡中吾更沒來由贈灌頂山主灌頂山頭春色滿住來足與道相宜他年老興登高訪童子開門莫教遲贈僧若函春雲瀟灑為函為蓋情兮何高意兮誰在南北東西任去來數峰點點青崔嵬偶言霧鎖空庭不見雲行黃鸝數囀多謝有情示獅巖蓬山二禪者獅子巖前獅子踞地牙爪通身貴復自利他年返擲應須記學道貴通達通達如何說如舟得篷如篷得風風兮篷兮無往而非宜送僧歸鴈宕一重水又一重山千里誰能易往還陌上桃花笑春色送君直抵舊鄉關觀瀑飛流千丈雪冷落何無情獨立長松下瀑花兩袖生示僧若閒秋雲縹眇秋風清秋水澄澄秋月明會得不須他更覓閒閒若我過平生寄六可禪師一毫端上三千界百草頭邊古道場不是知音誰把玩春風影裏覺花香寄覺中禪師千丈巖高六月冰霜天尤是若崚嶒莫嫌冷淡無情況那取工夫試一登弔素純法師友道來今三十年法音時接到林泉臨風哽咽清秋夜明月誰知落那邊悼古津大師吳山越水一江湄把手峰頭每共期忽聽泥牛去入海臨風惆悵意何之悼惟一大師兩月之前辱寄書訃音忽遂到茆廬影堂柯月標風格誰信吾家少一渠悼同人師弟黃雲莫莫鎖空除月影寒潭午夜虛鴻雁忽聞聲更咽令人爭不著思惟山居茅屋無油不點燈蒲團兀坐正相應忽思來日清晨事依舊青蔬飯上蒸寄友室中無事懶燒香危坐多時倦即橫一覺惺來人不見屋頭靈鵲噪斜陽友慈上座結茅昭陽乞偈一莖草頭三千界三千界內一莖草佛日高懸茅廬中茅廬一輪光杲杲贈雨關主人神晤雖云久高齊始得臨坐談三日雨一滴一關心酬東甌余孔謙居士無心無度無心度度度心心實古今溪上日行三兩遍行行不遇少知音示靈玄密嚴二庵主靈山囑付別無玄腳踏地兮頭頂天彼既丈夫我亦爾好看父母未生前密密意兮在汝邊動靜施為體自然昔日趙州曾捏碎看來不值半分錢鑑上人乞偈住山參遍諸方一字關腳跟穩實可居山相逢問我峰頭事千丈崖高不易攀送圓書記至吳門乳竇峰前別我時筍長七尺尚如錐歸來莫待秋風老陳陳寒聲上竹枝示自得化士佛法門中貴率真率真也要得人情人情佛法兩相許始是我家道等平示堪輿李日新無陰陽地久荒寒要爾重新用力看莫把一針容易定他年仍受別人謾送制維那東甌行乞秋風一夜甌江水千里涼生動客襟此去莫嫌山路遠歲寒方見丈夫心贈行片片晴雲杖底浮蕭然行李一輪秋把茅未卜居何地緑水青山道者謀送純書記住山茅茨小結奉城西幽靜深宜道者棲菜葉不隨流水去等閒未便有人知因事漫題大人境界只尋常白棒聲中氣自昂鹽醬不隨胡亂撒賺他業識共忙忙示呂明宇居士擎拳問我若為憑放下教君冷似冰三喝四喝如何道徹底婆心會未曾雪朝示嵩山道者少林立雪當年事千古一朝來亦親昨夜萬山頭盡白不知誰是個中人送能侍者結茅仗錫仗錫風高別是天一廬坐斷萬峰巔他年衲子來相訪踏破芒鞋豈惜錢送慈典座調燮叢林不憚艱朝來辭去別居山居山不惜無油醬只為思量一味閒送潤直歲匡扶祖席力多年忽去他山別搆椽爾為養親應若此老僧手臂得誰焉送拔監收誅茆何必去深山令我思量晤面難二十里雲隨杖底早間來此暮間還送古巖藏主誅茆弗遠合時還還共雲山閒復閒不是閒人閒不得閒人豈可等閒攀傅惕庵參乞偈山疊疊兮水重重流碧堆青觸目逢此際南詢非浪擲可中端的是渠儂陳舜席居士乞偈道者生來六十歲再加六十幾曾閒野老為人只此語牙齒問君寒不寒寄邗江吳漢良居士江南三月鷓鴣啼獨喜揚州鶴不羈一舉便沖霄漢去虛空背上漫棲遲贈李芬遠居士昭陽波闊越峰深水宅山居別至今高思盡輪風月夜直須彈取沒弦琴贈陳育蕃居士守護心城不放凋無根樹子發新條殷勤況遇曹溪客曾泛滄溟弄海潮示吳我音居士一切聲原是佛聲山山猿嘯雜啼禽曹溪客是無機者歷歷明明著眼聽勉徐煥谷居士參究閒情歷盡得心回慧眼乘今一拶開念佛即能全受用西天不用達磨來贈林子尚居士真相非同歲月遷崔嵬未可類生年龐眉何似人間世薦取毗盧古佛先贈李籕史居士心量繇來涵剎塵眉間光徹海門新大機獨揭連城重翰苑叢中宛有人示曹中吾居士資生事業非違背無我如如道者心古木任教頻轉緑何妨白髮幾莖侵挽魏霖雨居士丈室來焚一炷香昔時契合未應忘摩醯正眼無回互誰信將身北斗藏示張伯純居士驟驥馳風挽不同層層關鑰盡衝開本來直截事如此誰道九年面壁來勉沈初引居士佛理工夫始徹頭幾人端的得歸休靈雲覷破桃花面匝匝春光溢兩眸贈黎馭遠居士直取驪珠利物因高閒胸宇十洲春無機便續毗耶印剎剎塵塵闡法輪示孔台鉉居士惺得歸休猶涉工瞥然證徹眼頭空龍吟枯木誰堪聽一曲無生對曉風示趙對垣居士高年為道須真切七十春秋造化功識得最初前一著青山無改四時容示何玉芝居士受用輸君能淡靜尚須證徹主人公力參直到省力處剎境剛然絶點蒙贈心池上座波瀾寂寂冷涵空碧漢無雲日正紅極目盡教消息在應知道者不朦朧贈祥光上人接待只喜雲袍動地來山門閒徹日南開直教吸盡西江水拂拂清聲為共陪憫生上人一片仁慈古佛心驅牛奪食道存高提鐵棒雲門老不謂猶然犯至尊岷山院主山重萬兮水重支杳杳江源無盡時發用天然迥如此忘緣兀兀趣還卑蒼玄藏主佛祖玄機欲到邊昔年鷲嶺喫粗拳澄澄海藏曾深入揚子江濤口吸乾大威上座殺盡魔軍意始休不能由處亦堪由眉間剔起吹毛劍佛祖都來似活仇答艾山居士山僧不解有動靜無喜無嗔無若何絲線竿頭隨自弄從來原不犯清波一條拄杖活如龍布霧興雲隨出入試若一回翻個身其中自會得非得贈方周圓書記住山六十年來耳順親一周花甲又重新古今淡泊家風在菜葉常流洞口春
