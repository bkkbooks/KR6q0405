body:
  text: 嗣法門人行正等編録贈古拙上座覓巧不得拙胡來得本應知萬慮灰獨坐寒窗堪聽處大洋海底發春雷贈靈雨上座滴水成龍用不多那需匝匝萬層波人人眉底眼睛碧不獨西天老達磨師到安豐黎太沖王紹箕二居士請益臨濟示衆論劫途中不離家舍公案家舍途中事若何一番驟雨長新荷今朝順水舟歸去笑看漁翁唱哩囉智豫上人禁足乞偈踏破草鞋無覓處如何禁足水雲間無智人前聊夢語山僧罪過已難言酬解蝶齋虛空無去亦無來無去無來已著塺一喝如雷明底事頂𩕳正眼豁時開何事莊生有物齊物齊還是悟中迷誰知白棒無回互指出靈明上上犀居士八秩奉為諸善尋常事八十翁翁恁麼行十世古今無異樣如來端的最長庚示無蘊貞道者無心無佛亦無生五蘊空來體自真父母未生前面目應知不隔一纖塵挽體中上座一期佛事如心意瞥爾藏身寂寞鄉余過舊遊重有感楚天漠漠水茫茫遠攝上座遷化後其徒淨然淨業乞偈供養昔年相見舒情事今日思君話未圓一室翛然清影在瓶盂珍重好生傳蒼玄上座自期閉關乞偈衲僧行履離情謂日用翛然一味休休到至休休不去都盧收在腳跟頭即事示禪者泗水瀰漫天上來衆生百萬厄其災曹溪波浪渾相似無限平人被活埋關中口占一室蕭然獨掩門機關喪盡絶寒溫白雲朝夕間來往笑我無繩繫腳跟示楊林泉居士道人須得林泉趣方好參玄進步來不是山僧愛幽致世間多被俗情埋不信參禪偈有等之人不信禪不思者段大因緣尋常日用承誰力好自看來不當錢有等之人不信禪剃除鬚髮為何緣不如歸去為俗漢免得吾家費口涎有等之人不信禪大都福薄故如然者回若不生深信犁耙將來恐上肩有等之人不信禪愚夫愚婦共紛然誑他利養無慚恥恰似一盲把衆牽有等之人不信禪胡言亂語誑人前講經説教誇能所鼻孔何曾摸著邊有等之人不信禪教人亦莫把禪參不如我念彌陀好那個彌陀似汝顛有等之人不信禪漫持衣鉢為人宣老閻不要袈裟著問汝將何抵飯錢有等之人不信禪光陰可惜漫虛延眼光落地時辰到看你湯鍋蟹一般送一峰書記還婺千峰寒色尚凝虛兩手扶笻未甚舒舊路歸家知不問秋風來棹莫躊躇制維那還靜室多年隨我時長病此去山廬獨自居折腳鐺煨無米飯也須得個共栽蔬紹維那還觀海相隨老朽歷多年今日辭行為病纏歸去只消兩服藥飢來喫飯困來眠示知休心機廢盡不如休休到無休始徹頭拂袖便行好歸去春江兩岸一扁舟岷禪人乞偈鐵壁銀山在目前等間撞倒是神仙東西南北何拘管渴飲飢餐倦打眠蒼禪人乞偈滿目蒼蒼塞太虛子規啼徹萬花時溪山各異情何限盡在渠儂一鑒之法印禪德還天台參遍諸方一宿禪住山活計不須言年來老大鋤頭重只好間間伴石眠贈懶石禪人山中一片石卻是雲成塊視之勢欲飛貪懶還自睡示張雲臺居士參禪須是信心極信得心極總無別釋迦彌勒老婆心臨濟德山只一橛雲臺雲臺自猛烈行廣求字師以大心二字示之道人日用用無心會用無心即大心天地同根物一體不離眉睫意何深送起副寺明知佛法無多子盡道久長難得人十八年來起副寺未應辭我在今辰示見休見見之時見非見見不及處見即休須識當年昭覺祖為人豎起個拳頭禪者請偈化造鐘樓樓高百尺鐘聲遠聲未遠時樓未高為有知音千里外故將短句漫濡毫秋日結茆三楹於方丈後高址顏曰老庵茆庵結就序輪秋景淡花明月一鉤影入江湖千萬里拍天雲浪動鰲頭煙青雲碧四山頭樹樹蒼松翠欲流贏得老來無料理坐看終日冷雙眸送虛舟省上座三十年來省道者一朝得法徑山老珍重行持莫浪傳此語分付得最好送體如禪子之吳門五更忽聽曉鐘鳴不覺翻身冷被輕千里去來衣要暖春寒時復凍雲生次正侍者折梅韻入座春風片片香案頭忽見凍英長老年何似多清興獨喜冰霜伊倍嘗徐玄洲居士乞偈玄洲居士老無子卻要山僧書所以不知兒女有前緣明明索我一張紙寄廣潤巨靈法姪春山寂歷望何寬撩亂梅花香影寒試問不知誰料理間攜竹杖溯流湍寄守靜禪德江山千里隔多年想念其如在眼前接待水雲非易事金牛公案又重圓示朱漢章漢章居士求開示開示無非要信心千佛會中同一數不妨共撫沒弦琴吳萃凡居士乞示偈三首戴天立地丈夫漢成佛如何倚別人一念回觀親薦得毗盧頂上腳縱橫法應知一句無不知向外苦奔波回光直下看教徹祖母依然是阿婆薦祖母劬勞一念無為報得得來山乞我言言説俱無真實義應看父母未生前薦先慈送聖知客偕正侍者住靜道人家活合應時學地工夫莫待遲他日有成山嶽動掀翻休作等間兒次韻送韓仁甫曳杖下山景何肅秋空日影淡無痕老僧欲借來相贈珍重當陽一句新登華頂重山上山華頂踞斷虛空勢獨雄不許白雲頭上過但從日月運西東題石梁石梁橋底瀑聲寒陳陳飛流下碧湍響徹林巒因甚事半千尊者在雲端宿方廣徹夜泉聲到枕頭幾回展側夢難留廣長舌底言無盡誰解當機問截流贈香柏峰本悟禪友多年不見住山翁今日相逢只麼容把手斜陽雲影動通身毳衲引清風登慈雲一重山過又重山行過重山到此間松竹滿林雲冉冉清風吹破老僧顏送孤卓法姪住通玄天台通玄住持失守幾淪荒草歲在乙未林和尚賢嗣泰寧礙公者請命於老僧時孤卓法姪來山省候恰與礙公會機緣相值老僧許以通玄屬之斯乃祖庭起見應非越俎代庖爰書四偈相贈兼志叮嚀之意孤公其勉之通玄蕩廢可傷神灶裏無煙屋有磷法姪泰寧悲訴我於今委托得其人公能去守念頭真逆順風吹在自珍昔日祖翁開法地時將此語上眉輪空房尚有百餘間物務僧園莫去攀立地不妨空索索依然滿目是青山山形地運幾更端聞耗來今念念寒公是庉村為長子法行法令莫輕看乙未初夏懷正侍者賦此出門二月山頭暖江岸春寒情未舒奈見青梅子漸大熏風忽又到茆廬拮據叢席十年餘荒亂時遭弗易居豈是老僧堅忍力森然殿閣映青虛法門近日不堪眼遍地時風寒我裾冷暖自甘能幾幾瞎驢種草是誰與序屬夏初時漸熱二三千指望歸與老僧獨坐軒窗啓莫待征途五月車題臥仙石塊石休云著甚由長年不起枕寒流儼然洗耳人猶在日日攜笻來共遊秋日寄邵子長居士曉起茆簷淡淡秋目拈松子竹爐投翻思象外有玄侶契闊何時能聚頭題自牧法孫待菴春花著處不勝看爭若梅香耐歲寒珍重者回冷徹骨寶王剎現一毫端示胡雙源地師無陰陽地許誰知眼在東南意在西翻轉羅經背來看忽聞黃鳥一聲啼儀廷陸君延師至功德林齋馬星垣林啓垣偕仲旭上人請留偈剎竿重舉意深深揚子江濱功德林一會儼然談不二晚煙攜杖聽潮音仲嘉上人檢藏乞偈趙老曾因請轉經禪床跨下便經行全藏半藏分明極何必忉忉鼓舌聲示施柏菴居士六十四年已過去再加六十有耶無汀花岸柳芳菲處急急歸來在半途歸途未滿一百里眨個眼時便到家高坐虛堂了無事不須門外覓牛車碧浪禪人乞示萬年一念冷如冰徹底應知要轉身對面難言心曲事黃鶯啼柳意諄諄贈越塵禪德我到梅峰上山居五月寒數重清翠影落落在眉端雲山偶詠縹眇雲山山上頭杖藜卓破碧煙浮風前無限驚人句盡在渠儂眼底收山雜詠石梁洞鬼斧仙弓何處用石梁高架自天成可中宛有真消息端的原從腳底生靈峰洞靈峰石洞不知年誰信劉郎開鑿前一道寒光常自照水晶簾挂月涓涓靈巖面面峰巒面面奇奇峰奇極筆難題米顛若也曾來此應悔從前錯拜底飛來羅漢羅漢神通值甚錢飛來莫訝在當年既然何不仍飛去日炙風吹古道邊僧拜石峭石奇峰人盡愛試看石亦愛奇峰不知問訊成何底紫氣靈雲常護封卓筆峰一枝筆卓寒巖上似寫虛空半幅箋個裏不知誰下手淋漓著處見雲煙剪刀峰誰將山頭一巨石兩片分開若破天碎剪白雲千萬疊零零落落碧巖前館頭晚眺行盡蒼山到館頭坐看霞錦一江浮子規啼樹聲何切歸去來兮落日悠答王九一居士附來書并偈夢參譾劣下根不明生死撥草瞻風歷有年所但以家貧纍重工夫未能成片罕遇明眼宗匠承虛接響腳跟下實實欠穩今幸遇和尚卓錫南廣瓣香參叩伏承一拶不覺兩袖骨董到此全無用處旋承四語露布家醜蒙改末句二字不啻換骨良方點晴妙手此時覺得心頭了然又承和尚深針痛拶匆匆歸去疑團轉加迷悶獻歲恭侍和尚備觀煆煉諸學人鷸蚌相持且喜漁翁得利臨別又承一擊良久分疏不下行至中途忽得一偈今特呈座下密密玄關幾度推相思然急兩行眉轉來識得東風面鼻孔原來向下垂無孔鐵鎚卒地揮粉身碎骨絶思惟三更迸出紅輪日覿面堂堂更問誰撥草瞻風歷有年家貧無物恰翛然等間摸著娘生鼻始信從前錯廢參一棒當頭不用推擬推額上又栽眉還家舊路應知得撒手春風柳線垂歸南廣寺見銀杏有感一片荒涼古寺基我曾刪削草離離參差殿閣無消息獨有渠儂茂若茲喜晤靈巖儲姪禪師和鶴林牧和尚韻二首無私晴鳥協宮商花草松筠百和香勝地已知天作合吾宗此際得人昌素交自古亦何求剪燭深談水乳投二十年來如一日相看但笑改玄頭示息波上人一波才動衆波隨衆波卻從一波起試看一波何處來個是息波的要旨示松月歸里月挂松梢才見秋水天一色放輕舟到家若問山頭事千丈巖前瀑雪浮山居孤峰立天外間雲冷相倚彼此情何高一味淡於水二雲過窗前白泉流檻外清道人家活計盡底向人傾三竹底聞秋雨苔茵石上新西來祖師意端的不瞞人四山居何長物觸目是家珍竹石松風外寥寥誰共論五秋水澄秋碧秋雲淡所思一腔天地外惟我獨知時六客到山頭遠休云足膝勞溪邊有石磴清供聽松濤七澗水響泠泠空空對明月誰撫沒弦琴令豫聽不歇八獨坐老庵中秋聲起林表不知何所之寂然不見了九石上坐來久竹風涼更深翻思今日事不覺汗沾襟十曉起悠然坐山窗四面開通身無影象何處見靈臺詠妙高臺千尋壁立一身間坐斷晴煙萬疊山翻憶昔人何處去薜蘿時在手長攀野水筧來流不竭間雲幾片落窗前古人活計也如此莫怪山僧自在眠庚子秋將退居妙峰示恂書記秋林紅葉晚來姿光景誰云收攝時珍重不妨寒徹骨梅花香暖在春枝甲乙年生我爾來相因相次漫徘徊相將同上妙峰頂坐斷風雲動地雷偕諸子遊丹霞洞石洞玲瓏古若丹薜蘿纏繞幾回盤相將倚杖連雲坐不覺通身翠滴寒坐雨丹霞洞瀰漫天際白雲低洞口寒煙一色齊何似山靈情太好來朝留我踏花蹊偶成梅花影裏看春色觸處春風暖氣新銀杏樹頭老鶴立分明天地一間人平田四望凍雲開喜得鄰家數樹梅正欲攜笻間步步溪南一陳雨催回送公唯德侍者還囊雲荒煙密密鎖寒影杖底春風不任搖杳靄群峰一千里未知誰把手來招送印洪上人青山滿目道人家千里思歸逸興奢澗響泠泠春睡足籬邊拾翠看梅花歸去錢塘路不賒征帆影轉動飛鴉到家人問老僧事三月頭開銀杏花法五乞偈一法本來無五法從何立識得本無法虛空揣出骨寄王育仲自昔琴川舊得名塤箎吹處有和鳴山家不是尋常調彈到無弦音更青三詔洞三度天書詔不開千秋高影一山陪江聲日夜清人夢誰似先生獨聽來月孟居士乞齋僧偈齋僧無量功德休論百千萬億齋來只管齋去便是再生彌勒送野逸禪人還開先秋雲秋月兩悠悠恣爾橫挑拄杖頭歸去開先齊放下試看湖水拍天浮答正首座懷韻土木無心老病擔業緣前欠後三三翻思舊日經行地賸有梅花共老庵囑纍偈澄清月見南廣録後從澄見請湛菴常侍者住景星法門末年不堪嗟莫易人前露爪牙獨坐雄峰今古事景星巖上足生涯法幢幟西堂住大梅常師法席荒來久今日重新啓後昆目視雲霄誰是伴梅峰獨露正當門即心即佛即非即非佛非心非亦非坐有一琴山作案相逢但指目前機山夫正首座赤肉團壁立千仞頂門廓徹吞乾坤正法眼藏瞎驢滅直得無端纍子孫德山臨濟家風大須是還伊真丈夫殺活縱橫全意氣直教倒把須彌盧師南旋西堂衲僧把柄操持手折腳鐺邊歲月忘信是住山多意況溪流菜葉到今香微菴研監院祖宗門戶潑天廣只在當人力自持珍重個枝無孔笛莫教容易逆風吹冷堂林西堂一周甲子重更始活計從茲令斬新有問西山亮上座拳劈面莫容情道嚴恂書記三十餘年學佛人堅貞其實是堅貞道尊德美人天喜怪説我家有老成律牧制西堂本色住山人只應山裏住鼻孔漫遼天虛空休指注篾束肚皮便與麼去折腳鐺邊有甚憑據打殺鱉鼻蛇拈來和羹煮金牛飯趙州茶個樣風流誰當家弘遠紹西堂近不居方寸遠不在西天熏風南來殿閣微炎古廟香爐冷似冰一條白練挂空青松風白石山頭坐撞見嵩山破灶墮長年只麼在深山鼻孔垂垂當等間即心即佛大梅香黃菜溪頭流更長千古萬古風琅琅僧幢建侍者白露零零秋思凝道人行履冷如冰直教冷徹庭梅放登岱香飄到雪陵爾愚環侍者南嶽峰高插空起秋林日暮影尤寒杖藜卓立超方外寂莫光中天際寬惟極致關主觸背俱非竹篦子等間舉著腥風起娑羅娑羅娑婆訶快哉無著何彼此致上人知不知應知豈是尋常機把與關中惟自持施于身居士還滇南故人分手處柳色暗河梁不謂同風旨今添萬里長古稀我已近強仕爾方剛為贈臨行句吾宗賴舉揚祖綱目侍者住青蓮五十而知天命時了無一法可思惟只今住個青蓮寺香滿南山月滿溪歌詠次吳用汝居士長歌突兀星巖起碧空撑天拄地勢何窮垂垂緑陰簡堂老落落清風康肅公五百年來價不下悠然於此誰為亞古梅軒阿能架破屋敗垣見飛瓦曉起門前撫掌歌夜來一夢笑銅匜鏤金碧麗千秋玉到底終成一爛柯忙忙日月嗟相續誰家不有光明燭試看青燈夜滅時眼前不暗紅與緑八面玲瓏體自空一座明明無縫塔不須誇何殊茅屋竹籬笆風流瀟灑抑何奢客到蒿湯便當茶談笑不知誰佛祖那許於中較文武劍一柄水一盆當機覿面絶寒溫一吸西江龐老吞古今物我莫須論送聞宗歸處州越格超宗過量人腳跟底事肯因循蹉過銀山鐵壁兮韓盧逐塊掣開金鎖玄關兮獅子咬人君不見富春江水兮色如藍嚴陵釣臺兮千古間間又不見蘭溪龍門高五百幾人到此不點額哲人已往消息無羅漢峰頭石空碧雲黃山高接鳳凰遙飛紫氣白雲光桃花流水杳然處別有天地歲月忘阿呵呵好將鶻臭汗衫急脫下拋在山門外邊長溪罷十二時歌夜半子虱蚤咬破當門齒鼻邊雖厭血腥腥摸著一個更歡喜雞鳴丑翻個身兮睡不久柴床硬得骨頭疼席破思量難出手平旦寅悠悠個事不須論惟有鄰家來乞火打戶敲門頻發嗔日出卯堂前苕帚頻來掃好把柴門急放開一道靈光常杲杲食時辰鉢盂托出自相親途中多少未歸客嗅著些香空咽津禺中巳拈得鼻孔打失耳鬧市叢中不見人達磨遺來一隻履日正午大地分明無寸土家家戶戶保平安分付時人休莽鹵日昳未瞌睡起來討盡氣尉斗煎茶沒處尋肚裏無明火空沸晡時申分明不見自家親十市街頭石敢當他之東魯我西秦日入酉拄杖夜來不唧溜忽然撞著個村僧拈未起時他又走黃昏戌老鼠床頭打隊出不顧我儂窮殺人甕頭麻麥都翻失人定亥皓月澄澄照滄海曹溪路上沒人行塞耳漁翁聲款乃和性燥漢顛倒歌世間人何顛倒不惜光陰如電掃誰家灶裏火無煙猙更攜燈向外討古今不昧自恆然覿體分明日杲杲爾顛倒我顛倒倒倒顛顛誰識好捨家珍數他寶終日忙忙何日了回光一念自家看個裏風光殊不少論誰少論誰老只要當人自性燥少遲疑休頻禱兩段一刀須及早打開庫藏莫容情顯出當陽自家寶説甚禪論甚道玄妙三乘破絮襖直饒講得滿天花説食何曾肚裏飽者裏尋那裏討向外馳求打之繞腳跟走破不知休至死無歸空懊惱謾講律受袈裟戒體問渠會也麼戒體不知徒自昧莫將此個作生涯憐一輩啞羊僧假裝模樣作修行教壞人家好男女卻是一盲引衆盲無慚愧莫生偏禪教相非顛倒顛會得個中消息子總把龜毛一串穿丈夫兒休顛倒放下一齊有甚巧忽然撞著本來人大哥之妻是嫂嫂識得了順也好逆也好順逆囫圇一個棗正則隨他正倒則隨他倒倒正總無心不用些做造妙用天機信自然須彌爛把虛空搗禪也好教也好戒也好即一即三作麼考要知個裏熾然説明月當空嘗皓皓是顛倒非顛倒大地山河絶點痕祖意明明在百草百草頭邊事最親拈來便用絶逡巡一莖丈六金身用丈六金身用一莖釋迦老遠未曾四七二三覿面陳果然若遇性燥漢一棒打教盡作塵魔宮佛國都掀倒那有許多爛葛藤無繫著任騰騰咄男兒自有沖天志莫向他人行處行阿呵呵會也麼我和燥漢顛倒歌休為山僧不顛倒山僧顛倒更還多庚子秋日送弘遠上座還海岸衲僧行履空索索遇境逢緣休住著秋影孤輪寒夜高等間驚起天邊鶚補
