body:
  text: 嗣法門人行正等編録題讚文殊大士像文殊大智作獅子吼腳踏青蓮華如意執在手翻思毗耶城中老居士到底不如合卻口又華山見月律師寫文殊大士作獅子吼見月和尚不妨出手要知不二法門何待山僧開口靈然生氣逼人見者自應點首稽首普賢浴象圖破塵出經文彩全現玉轉珠回理隨事變宜其合水和泥蓬頭垢面漫將惡水潑象王此中不知誰解看觀音大士像法身清淨本無衣嚴飾花冠也大奇莫是要人須著眼是非堆裏識真機山之險兮海之闊海神擎山高突兀觀音大士坐其間不知誰為傳消息圓通門啓雲濤碧大士圓通何在不在一葉蓮舟無邊剎海魚籃裏有淨瓶宛然一賽兩彩買底無處尋賣底無人買白浪堆中等個善財普門大士無求弗應侍懷供養知他為甚求長壽求富饒求男女求菩提悉聽悉聽侍懷請尋聲救苦度衆生晏坐悠悠側耳聽鸚鵡如何也弄舌翻來覆去說無生菩薩古幀二布袋和尚應持布袋手捧肚皮布袋何在疑是天台山大肚子羅漢臨凡不妨兩彩一賽咄者阿師不是布袋亦非達磨何事寒崖兀然而坐想是天台尊者臨凡失卻神通向者裏思量個歸路呵呵初祖像九年面壁意如何等個人來打底都不是可師能出手幾乎坐殺老頭陀又渡江像揚子江頭浪拍天蕭蕭一葦破寒煙吾師豈是鮮魚客掗賣與人不值錢驀直去莫留連坐斷春風不計年航海初來未了折蘆江上重遊九年面壁冷地坐得風流處不風流題古佛牙流支三藏全無理打落老胡當門齒分明傳得至如今者個且道是不是咄古佛都來一個齒十八大阿羅漢賓度羅跋羅墮闍尊者頭頂一笠皤然而坐兩鬢髼鬆不知話墮西瞿耶尼洲有你者一個迦諾迦伐蹉迦尊者伐蹉尊者覆身若跪反執癢和長手搔背求己不會求人也道神通三昧迦諾迦跋釐墮闍尊者兩眼睜開固盧張嘴傍若無人長坐不起東勝神洲釐墮闍不是山僧誰識你蘇頻陀尊者先按虎頭次踞虎尾腳亂手忙雙眉豎起如無錫杖護身縱有神通何避諾詎羅阿氏多尊者鴈宕棲身龍宮說法來往不易坐地潑撒一齊放下何如猶執靈羽翠拂跋陀羅尊者一錫飛空回頭反顧兩手背抄行不成步耽沒羅洲跋陀羅遼天鼻孔無回互迦理迦尊者手執連環眼觀腳下不知何物亦爾如假身心一如無此彼如來付囑應難舍伐闍羅吠多羅尊者肚大腳短眼細口闊一個蒲團肩擔獨立若要等個人來彌勒下生時節戌博迦尊者一指端現玉殿瓊樓慈悲根力香醉山頭神通遊戲尋常事有相須從無相求半托迦尊者三十三天中半托迦斗蓬拂子置地堪誇出頭看天外誰似我生涯羅怙羅尊者羅怙羅尊援膝而坐不入禪定思量甚麼畢利揚瞿洲是你能教化迦那犀那尊者草葉為座示空寂身異我回首彼此一真半度波山中長年惟自親因竭陀尊者一心無相水面蓮華咄哉快樂忽張口牙筆研分明高置起那來文字落人家可住山中伐那波斯尊者可住即住隨住而安翛然一鉢默坐無言菩提煩惱平等觀度生一念時懸懸阿氏多尊者瓶中滴水雲雨從龍豈是法爾亦非神通渠儂行履人難測總在圓明不借中注茶半托迦尊者肩挂錫杖輪珠手持肚皮挺起行行無語草鞋踏破人何識天上人間總不如難提密多羅慶友尊者體靜神怡初非入定面壁儼然亦提正令籃中若有些些置之腦後不問賓頭盧尊者耳大眉長號賓頭盧冷倚蒲團無香古爐只因親見佛來年老不道成魔雪竇先明覺禪師像師真兮休疑猜丹青寫得十分有來眼若三萬六千頃之太湖兮澄澄月湛眉如洞庭兩山兮列左右之青堆掌中日月光被天下兮瞻仰何極舌底懸河滾滾兮而千丈巖之飛瀑可陪雪竇風高兮敢擬擬所以為明覺大師乃大寂九世之孫爾禹門幻老和尚像只者老和尚謂是我師祖從來不相識未知還是麼是與不是俱成毀禮拜不須動唇齒天童密老和尚像臨濟未墜之道老人崛起法門將傾之廈一棒全提坐鎮也如泰山之岋嶪令行也奚鬼神之敢窺咦示寂來今剛十年撫今追昔恨何言陸春明請只此先師像白禪謾描摸應知自己底何嘗隔纖粟持歸供養爾殷勤不必山僧更叮囑請只者老和尚一生自孤獨佛法不順人情世法猶難湊泊動則拽杖便行靜則鎮如山嶽圓寂來今幾許年平禪供養何時足平原請天童我老人臨濟三十世來今幾許年棒頭更嚴利不惟掀翻佛祖窠臼自己門風一時掃地誰能為你扶得起湛庵常請轉面無情老凍儂家私沒盡起天童破砂盆滅陳油醬誰信其能振祖風師南能請頭髮蓬骨頸縮奕奕風清秀兩目怪伊不殉人情一生孤獨聲名自響大明國日冷風高山枯海裂崛起一條白棒斬新不帶枝葉打盡四海英靈皮下幾個無血中興臨濟白拈賊春風影現老和尚描畫將來豈我師覿面難言心曲事一條白棒普天知澄清月請宗旨玄要棒徹骨髓南山獨坐兮高峰纍纍老人像如何題塺斑滿面黑媸媸塗污重重又塗污分明有苦阿誰知像塺壞震響禹門通玄發孽坐金粟入黃檗明州育王并太曰撞著的面門裂做盡冤家不肯休大明國裏誰相識不須說七十七年為蛇畫足臘盡年窮一句親杖頭寒色影新新兒孫若個成家業不藉陽和徹骨貧野夫元請讚也讚不到罵也罵不著如龍遇水虎靠山一條白棒旋風落頭上堆疊腳下逼塞面前一片明明歷歷若要不肖讚伊且向者裏著筆臨濟中興老和尚太白山頭起蟄龍聲浩浩徹寰中破砂盆底舊家風法幢幟請本師老和尚骨頭硬似鐵活底撞著死死底撞著活臨濟中興一古錐春風滿地花狼籍津牧制請自題像普天愛熱鬧癡汝獨孤冷時流倒退走宛如離陷阱白棒一味耳任他鬥弄影端居雪竇峰思古常冥冥十數煙柴頭風霜愈清徑我像若為題我語須承領咄諸方云雪竇不肯放行只著得十來個煙柴頭不存衲僧性命掃蕩佛祖窠窟放出無位真人擉瞎頂門一隻常禪常禪且莫容易拈出湛庵常請頭陀法席卻重開拄杖閒攜到一回撥動幾多人落魄掃除知解等寒灰轉身句頂門鎚悄然堪把玩據令何崔嵬法幡幟請通身病骨老年鐵硬拄杖隨身全提正令格外絶承當機先不留朕咄法幢上座寫伊去惑亂東甌人未已又老僧年老矣一杖倚閒身冷坐長如此壯哉正上人巾瓶十五載於我何疏親咦嫉毀慣嘗甜似蜜欣然扶起破砂盆山夫正請為人須為徹殺人須見血試看雪霜中長松凜高節師南旋請拄杖閒閒撐日月七穿八穴任縱橫年來泛濫如何道珍重兒孫莫浪行徵庵研請黃金面皮生鐵作骨拄杖撐天虛空壁立要與天下衲子為標格冷堂林請通身無影全機獨露溢目光生阿誰解顧顧不顧興化克賓曾話墮律牧制請兀坐堆堆地無識又無智有來問是誰頭顱便打碎咦與麼為人也道是臨濟遠孫三十一世弘遠紹請寒威凜凜雪霜天卓朔眉毛口似緘不是老僧嚴面目一分行貨一分錢僧幢建請瞎驢滅卻正法眼藏擬議思量三十痛棒且道何以如此莫謗莫謗爾愚環請臨濟正法眼卻被瞎驢滅雪竇老古錐何須更饒舌一棒掀翻不存軌轍秋月澄澄庭桂香清風浩浩光尤潔澄清月請老僧今老矣獨坐對春風極目明明句高懸祖印隆聲落落光重重只條拄杖閒閒豎盡在渠儂不借中惟極致請祖師心印即在目前一條拄杖鎮日閒閒誰似渠儂樂自然祖綱目請既云直指口喃喃何似東行卻向南覷破阿師分付句青從藍出出於藍野夫元請者漢從來沒伎倆橫三豎四只條棒打破英靈衲子頭不風流處也風流解齊純請臨濟宗風入門便喝只者老漢也解提掇驀然撞著衲僧一時潑撒商豫起請實而虛虛而實虛實明明兩眼赤坐斷春風三月天鐵船高駕虛空窄虛舟省請面黃體瘦骨稜層一拂橫拈意不輕道被好持回供養只條白棒振家聲道被宜請春風影裏老頭陀兀坐堆堆意若何反復思量無別事閒攜拄杖愛人過無凡誠請老庵兀坐靜寥寥瀚海風清極望遙拄杖閒閒從烈傑謾聽春雨濺春濤願海惟極請拄杖倚肩春晝暖頂門髮白露全機閒閒獨坐雙眉啓靜聽雷音徹翠微古音呂請恰恰春風三月天桃紅李白鬥芳妍山僧冷坐無言說喜有松聲在耳邊已信解請蓬鬆髮白鬢如霜卻是東婁徐大郎佛祖位中無處著破堂茅屋即相當破堂杲請鼻孔昂藏眉毛卓朔拄杖不離誠難湊泊咄除是知音為伊開拓蒼玄昊請行猷乞題像教我如何說記得少年遊練川古風月迄今許久年吾嘗於此切汝今持去休狼籍仲嘉猷請不向婁江古寺栖攜笻雲水自東西而今老大仍無用一副形容作麼題隆福請係師發跡處雪竇山僧老無力時把虛空向人塞直教吞吐口難開要與叢林作規則幻峰山請咄哉老漢默坐何以法門盛大至如此思量去後誠無砥靈玄尼請春無三日晴夏無十日雨咄哉老頭陀喜怒誠如此不知有人豈知有己慈雨請東風歷亂春三月草木花香匝地煙老大不堪頻話墮只條藜杖倚青天自願請熏風影裏頭陀老到處逢人便落草草裏突出大蟲來且道落草好不好咦廣心請春風拂拂柳條青舉眼無非觸處真遍界不藏伊面目莫隨形影認山僧慧修請者漢絶情謂獨坐春風前相逢不拈出問著棒頭先直是曹溪客總教一吸乾廣東禪人請架海金鰲何用尋乳峰個老意深深一條棒接英靈漢無限平人聽陸沉萬因聖請頂門髮白雙眼如漆拂子橫拈全機出沒誰信天風助清徹曇請打人打得血腥腥多少禪和怨不平不謂形容如此看元來一等笑欣欣透伊請虛空無壁落大地絶纖塵誰謂天地閒閒閒只老僧孔謙居士請伊供養得不知音余孔謙請不喜呵祖罵佛單與禪和作孽若道徹底為人好與鐵鞭三百天儀請題李次公寫破山和尚像破山兄蜀中客驀劄相逢同門出入春風別去十八年面目儼然頭未白阿呵呵也難得不是李次公先生那來有者個消息鹿門和尚像清風白雲高山明月磊落神襟怡然坦率玉轉珠回佛祖言要津把斷過者難白棒聲聲作指南又從律入教由教歸宗一稱義虎一號人龍眉毛恬惔拄杖巃嵷扶起剎竿青嶂裏白雲坐斷何終窮寶慶南大師像悠然只塊太湖石坐底閒閒體自寬三尺竹篦拈在手清風凜凜逼人寒見月和尚像髮白顏童眉橫目秀戒光爍天是大明咒咦儼然只個須菩提趺坐蒲團絶滲漏空林大師像堆堆兀坐老知止白眼睜睜耐看人直截口門殊不管任他歡喜任他嗔殊可怪又可親不知誰是吾知音梵清禪師像咄者老古錐清風拂人意一味喜高閒望海峰頭寄金粟天童聚晤來三十餘年情不替而今老大更何為彼此依然眼似眉法幢藏主肖像請題天岸寧遠一輪秋碧大寶在握聲光奚奕把斷兮離微展開兮妙密春風影裏起春雷迅耳令人掩不及吳萃凡肖像其子侍立松間屏坐石床寒無字經兮不耐看剔起眉毛開兩眼宛然分付與郎官養拙法姪像清秋葉落庭前樹皓月當空影自虛鼻孔遼天生話墮克家之子固如如黎太沖居士像闊目長髯清神古道韻出儒林衲僧履造如我意把柄在手頂門上日輪杲杲悠悠坐斷楚陽城世出世間揖此老道婆小像乞題者婆子亦奇特也向山僧討筆墨雖然不說老婆禪豈可與麼便默得咄念佛底識不識手中者串數珠一百零單八粒吳定庵居士像大好悠悠獨步時心如墻壁眼如眉等閒踏著自家底便跨虛空背上騎張叔平居士像叔平居士僧無異只少身披一衲衣不知何意秋林下獨立亭亭喚不歸湧泉六可禪師像化行台嶺已多年末後光明在湧泉住院草鞋長挂壁諸方嘉仰競稱傳為人處絶廉纖掌握看看據令全戒初律師像者個阿師春風滿面戒月輝輝是渠影現淡道交情三十年今朝冷坐誠難倩緇素數禪侶自繪小像請題法偈於頂匡床兀坐默無言何止單丁三十年孤坐一般開化遠卓然雪竇一同參無等上座讚歎難容個阿師鬧藍叢裏解垂機已然面目難磨滅何待知音更寫眉印初講主蒲團一幅即空山端的那伽大定間開眼不須彈指作和盤生意在容顏清隱上人空山片石冷坐忘歸手中如意一柄兩眼睜開看誰咄咄莫便隨他去應觀自己底雪汀上人氣吞海嶽力荷叢林肯受佛祖鉗鎚不落聖凡階級坐斷乾坤事未休畢竟與誰同得失無凡上座一叢梅竹一溪雲指上輪珠歷歷分惟我獨尊真面目乾坤之大與誰聞張雲臺鼻直眉橫已若知水邊林下且隨時掌珠揚得滄溟裏自有光輝動四維王民璽更無些物眼前橫一念於中生不生風味者時描不就虛空上下坦然平李伯凝手轉輪珠殊好時長松峭石絶塵機達人氣宇曾開拓自問休容一點疑張本泉年深松節已摩霄瘦石閒雲類可調著個愛閒空觀士人生誰似此逍遙劉子賢嚴公一片閒田地翻轉多時雨露新猶把鋤頭眼律律不知有底向誰論法姪嚴𨍏轢枕流漱石豈尋常卻是子潛坐有當斂手停看書不語莫非為想自家忙徐子潛寒山層層白雲寂寂松聲在耳清風起握文章滿口兮王侯可卑量等虛空兮彭搏算失正與麼時誰證明祖孫坐立何親親彥函黃公眉際渾無事一種閒三昧晏坐于其中闍黎何所愛松一枝石一塊展開風月常相對無飾上人
