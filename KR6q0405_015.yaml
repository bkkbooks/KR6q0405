body:
  text: 嗣法門人行正等編録佛事為林野和尚封龕云林和尚我師弟十年行道四坐道場忽爾告終人天失望正期長光佛日永作舟航豈宜縮手偷閒退藏於密咦我雖與你同條生不與你同條死說甚末後句請坐雲龕裏起龕云葉落歸根來時無口木馬翻身泥牛解走以拄杖引行入塔云一葉落天下秋一塵舉大地收殺活縱奪照用自由茲我林野和尚自從出蜀遊楚抵南都乃至東浙明州中間歷叢林參知識逗到鄮山廣利撞著個老和尚一語相投十年來一條拄杖橫行海上東打西打管教佛祖不容駐足撞著底衲子性命不留驀地一朝歇手被伊超過一頭既然如此全身奉重一句又作麼生道以拄杖卓云為君直下蒼龍窟坐斷玲瓏體自悠為藏禪徒火舉火炬云藏上座秪者個相從我十年叢林力匡荷一朝手撒開乃云日當午休話墮者裏應須快轉身老僧助你一把火藏書偈擲筆而歿為見咄禪人火咄哉見上人面門光焰焰只者火柴頭一見不再見為古車禪徒火當人一著遍界全提應自知時轉身在爾直饒聲和響順形直影端一道坦平規行矩步便與麼去不妨轉轆轆地是處古車鼻孔撩天方始受用舉起火炬云委悉麼烈焰光中著眼看記取當陽者句子為孤輪禪人說戒畢以靈骨入塔云晴雪滿山頭白骨無藏處收歸入普同頂𩕳紅日熾咄為寶慈印沙彌火以火炬作圓相云一印當陽虛空體露寶明在爾受用無窮不覺向外馳求吳越遂分兩地直下回觀本得一念便是家鄉父母師長窮劫不離生死去來了無所寄雖然廓爾如如者個少他不得遂點云還會麼烈焰光中急轉身赤腳波斯難趁及為寧遠慈雲寶慈入塔舉一明三明三即一三一明明虛空出骨召大衆還見麼以拄杖敲塔門總向者裏退藏於密為寶梁禪德火天寒地凍觸目凝然兩手撒開冰消瓦解便與麼去人間天上任意遊行此界他方縱橫自在不離當處嘗湛然覓即明明不可見豎火炬云還會麼燎卻面門便擲為會心上人入塔三界惟心萬法惟識會得心時虛空出骨以拄杖指靈骨召大衆云骨在者裏且道心在甚麼處遂送入云普為空林大師起龕門裏出身易身裏出門難不難不易便與麼去復云請入塔云水肅千溪雲屯萬壑真機獨露是處生涯恭惟吾空林大師生緣吳門鹿城遍參湖海知識高踞雙徑峰頭兩目自空雲漢後投金粟室內一心頓徹物我一如逢原自在共侍我天童老人一十五載聲光嘖嘖叢林老成無出其右雖則韜光慎重獨善其身誠為末世風規法門標望嗚呼云往夫復何言生平高尚末後全提坐斷雲山今之是也召大衆且道不出那伽大定一句作麼生道出頭天外看誰是個般人一喝為圓通禪師入塔青山溢目緑竹滿前左右逢原現成受用茲我圓通大師年高有德四衆依皈戒肅風清法門耆宿可以為規範可以為準繩可以為舟航可以為津濟同光混俗合水和泥獨契大方高超物表今則化緣已畢葉落歸根正恁麼時如何舉示以拄杖指塔云大衆還會麼無縫塔開光簇簇全身直入涅槃城為幻緣禪宿入塔知幻即離離幻即覺覺了幻緣是甚風骨咦為君幾下蒼龍窟為乍城一葦尊宿封塔雨霽風鳴極目寒煙冪冪海天空闊行空曉月澄澄境物何殊了無間隔恭惟我一葦大師年高臘茂誠標望於叢林德被道充乃津梁於士庶人天敬仰南北皈依嗚呼一條白棒忽然袖手不拈坐斷空山直得全提向上召大衆正恁麼時且道如何泥牛入海無消息天岸空空雲自封為僧幢上座火酷暑蒸人似火都來沒處藏身拶開頂門隻眼從教觸處維新建上座老叢林法門擔子忽辭行偷閒不顧老僧老鬧裏抽身太不仁舉火炬云高著眼了無情火光烈焰燎卻面門為寶慶南源大師封龕山空木落水肅霜明智鏡全彰靈機密運贊叢林而不間師友自成業以未竣法壇正期佛日高輝遽爾身藏北斗咦幾樹庭梅香雪冷白雲靄靄自來封為妙德靈骨入塔萬木凋零千山露骨空生相現妙德呈機雖然遍界難藏者裏應須放下舉靈骨云還委悉麼便送入為妙融禪人火半雨半晴山夜瞑春雲欲開欲不開以火炬點云火光觸處通明亮得妙隨圓歸去來為守先上人火守先一著天空地廓烈焰光中通身快活為仗錫翠浪禪德入塔千峰雨歇霜問候仗錫山頭翠浪空消息竟從何處去明明具骨體玲瓏藏身處沒行蹤以拄杖擊云大開無縫塔入此圓光中為日聞火雲開霧捲山青水碧會麼撩起便行西方日出行狀先師出蘇之太倉州徐氏法諱通雲字石奇脫白於本州南廣寺繼住隆福因誦中峰偈有感矢願參方既而習靜虞山刺血書華嚴大典遇等慈老宿知提究本分慈化後廣參知識至雲門顯聖圓戒隨衆參請疑情大發卒參密雲師翁屢呈所解密叱之甚曰待你入處硬掙後來為人手段自別忽於棒下頓脫凝滯生太感激矢願匡扶法社不避勞怨不離左右一十三年崇禎丁丑年四十有四赴興化黎太沖居士請為治病計密殷勤囑纍授拂而別仍題肖像付曰咄哉老癡不識是非但來問者一味直槌無物可似分付石奇遂於普潤院掩關三周寒暑師雖深韜鋒鍔坐斷十方然而玉韞珠潛光輝自著黎君晨夕問難飽喫獰拳日用應緣作得主宰乃若柴庵吳相國賓吾魏司馬皆負儒林重望諦信皈誠關期既滿三君率諸道俗敦請說法淮海人士方知向上一事莫不謂靈山一會儼然未散歸省師翁立作座元而台之靈鷲山印明者以住持請命師應焉辛巳秋入院正之給侍巾瓶自此始也來歲密退隱通玄師先一日省覲密喜師至笑談訣別是時得法諸弟子往往專令一方遠隔天涯師力襄後事傳訃遐邇扶龕返天童入塔率衆請新住持為今弘覺老人乃赴景星之請其地乃先德貫首座簡堂禪師隱跡之所溪山奇勝甲於緱城一時英靈涌集氣吞諸方刀耕火種不復作出山想崇禎癸未雪竇燬豪強乘間侵漁故址不可復問寧紹士紳公牘三至而侍御徐公心韋授同門之誼勸駕尤力師愀然動容策杖而來倚巘架屋編荊作衛以處之先是赴靈鷲日密記曰狗子無一隻折箸無一雙是汝住處讖固在雪竇也至是甘之如飴嘗以偈勉衆曰山居茆屋十餘間驀地狂風盡打翻珍重吾徒齊著力大家扶起莫生煩日則俱衆作息祁寒溽暑不廢晚參明月在庭坐嘗徹旦禪者環植之一一與之刮皮及髓洞徹見元飲之以冰檗飽之以雪霜于是會下多士見重諸方越歲八月夢章羅公虛谷顧公心韋徐公等請就殿址說法師拾級而上曰瓊樓玉殿百草頭上全彰千丈報身瓦礫堆邊頓現塵塵爾剎剎爾突出無位真人發明現成公案聞者心豁然而積敝未清魔孽若而人且有假法産充兵餉媚茲驕軍悍將冀滿其溝壑護法殫誠禦侮多種而師初不以得失介意利害填膺也諸山寇兵迭橫師旅充斥饑饉相仍無不驚心駭目與師相厚善者莫不以舍難圖易為勸而師一切不顧慈以攝暴忍以應強久而又久冥頑翕然從化公侯作我干城法堂佛殿方丈庫廚湢室次第告成咸謂非師定力不可雪竇之中興碑有曰十年之內山海交訌朝來非象弭之夫夕來則魚服之士師蓋與諸禪日在鋒刀頭坐臥者也乃能需材則百圍之木不難塹堙山谷以轉輸需石則千仞之岡可使奮迅龍蹖而開宕雲水趍於父事四衆說而子來幻出方蹶之瑤天追還既湮之寶地斯為實録越歲庚寅興化黎君以舊訂致書甚懇赴之求見者舟楫蹌躋老幼肩摩獻資帛衣履至無地以容師一視而已庵址宅水中邑之富有議聚五十三人如華嚴士數聚財編木以衛逡巡未舉師以供養之所入悉付主僧工方告竣而泗水忽至得免漂滌叢林至今無恙賴此舉也鴻儒碩彥追隨掛搭得法喜者不可勝數解夏東還凡經由之地若法姪法孫輩察其保重法道者獎之勵之或以檀資展轉給贈其裸販化門者斥之逐之面詈而筆討之兩淮吳越上下數十里之間聞風震恐頓知忌憚諸方稱雪竇而不敢名競推雪竇為中流砥柱匡扶大法師以直捷行令以枯淡自持以珍重付授顧以廣大御衆有過犯者改則許之嘗曰使人根皆端不復用諸佛菩薩出現世間矣每遇險患衆排擠至師前師曰任緣而已衆意自解賢士大夫莫論有信無信既見之後如飲醇醪醉心不捨善哉徐石侶之言曰吾見石翁溫而厲恭而安慈悲中自稟巖峻方是上古宗匠咸安羅公夢章由明州司理轉觀察復雪竇有巨功休沐之日家蓮山與師莫逆師嘗以戒和尚等視囑其遍護法社癸巳春二月為師六旬誕獻祝騰涌盡給諸弟子丈室蕭然而已歲甲午西堂法幢幟偕余公孔謙以密印道場請則屐東甌化儀之廣不啻遊興化時也歲乙未憫通玄蕩廢則駕赤城之輿別立住持而還昔佛印元以甘露宣長老演法未有宗旨竟遭逐實古今一轍二十年間天童五請大溈三請金粟再請徑山龍池一請皆毅然不允而猶不廢普潤密印通玄之行者非法門關係即師資義重如鄞之大梅有力據為墳塋師嘗竭誠恢復怨謗勿恤也既復之後命西堂幟主之慈有香山兵荒甚烈請為別院師嘗歡顏納受雖艱困勿拒也事平之後不無異同則仍歸之舊住應物而不傷類如此同參泯巖空林禪師廬四明絶頂得塔地旋往武林遂歿焉臨歿謂群弟子但寄語雪竇無別諭得訃親往奠衆憚扶龕議火化師謂非故人命乃料捆載之費咸周給之親送函塔推弘覺忞和尚為塔上之銘曰吾不能文其德也嗚呼世不云乎一死一生交情乃見斯誠風勵後學之一端歟丁酉之歲兩殿完舉摩空贔漢顧而悅之亟掃塔龍池婁東士紳有南廣之請便道經過見梵剎荒蕪僧徒寥落不勝心惻誅茆數間以居期月欲還四衆堅留不得師許結雪竇局再至盡出衣鉢預鬻殿材以安衆志衆請持畚鍤浚鹽鐵支河直達於寺以便舟楫師許之遂成功其開化之衆嚮慕之盛復不翅興化時也時有趙伯州者自稱知禪遍探知識攜友來謁語浮游無本方擬湊泊師示以兩掌士怒輸機造謗辭甚酷傳至再三冀師畏憚一日憨睡火燎床簣間家人倉皇以水潑救油裸若羊狀蓋其參師之日乃飽噉羊酒登興也痛苦不可忍遣親屬追取謗辭至亟竟號叫而斃以故婁之人士益加重法戊戌夏歸雪竇則修復顯祖諸塔用酬夙願適明公自天童至為定壽藏於妙高峰解齊純無凡誠二上首力言從臾師為之頤解遂成塔院於左方為退居計門士倪伯屏集吳中人士促逼赴南廣乃命正嗣主法席正以師精神未艾院事艱巨力辭苦辭師拂意怒叱以為子道當事養志耳并囑夢章羅公勉正任守成之擔山門事無巨細託護衛焉復命退庵恂居守塔院策杖至南廣商之京督張公鹺臺胡公皆大歡喜互有弘施殿堂方丈大悲閣廚庫煥然一新師以行腳發始自負一願幾四十年至是稍畢將立住持以自代東歸妙峰不謂歲除之辰一旦疾作勢亟仗錫旋以諸弟子記莂請師作色無敢復言問疾者日衆師曰汝輩擾攘謂我死耶厲聲揮去師以狂瀾既倒不惜以身障故至歿不變二侍僧前後進命舉吉時同以子時對微點首次早果以子時示寂嗚呼痛哉停龕多日以待弘覺老人自浙西至值雷聲頻動衆切虞慮觀者如市唇吻紅潤容貌如生弘覺老人哭之慟命勿掩龕扃迎歸四明啓人敬信蓋諸弟子不能從焉寺鄰習尚遊俠計留龕以恣觀瞻群弟子袖手窘迫無如何倪公伯屏力排之依違殆半忽火從寺西發前後寮舍並燎惟龕巋然獨存無斑炙痕若輩乃始革心懼罪從倪公斷得于四月十二日扶龕東行自婁至甬千有餘里舟車遞進幢幡蔽道哀聲動地諸弟子駿奔左右不遺餘力五月十三日歸窆妙峰嗚呼痛哉吾師平生以真實心履真實行至誠感人無違勿屆未暇枚舉正小子敢謂濟北宗風自密祖弘震之後諸知識孰不垂鉤萬里布網漫天騅鯨無逃於格外吾師正令全提不令人有憩足地故浮夸之徒望崖而返唯操守敦篤若而人水灑梃逐不去此師之異於當世也吾師開闢雪竇辛勤草載瞬息罔懈猶勉後人續未竟之緒名山巨剎借重光影不知凡幾而師不欲以虛名可否斷斷然謝之此師之異於當世也名器泛濫師早發歎於靈鷲之日數年以來非無點胸自肯久弼叢林之士而必欲深鎚密鍊俟其晚成此師之異於當世也師吐為辭語多絶塵之韻侍者記録成集戒勿刊布不欲稍以伎倆一路起人咀嚼惟隨機開導關係大法流通宇內者有把關靈鷲景星雪竇興化密印六種將結集成帙廣勵後學嗣法弟子景星行常大梅行幟不孝行正仗錫行旋金沙行研天王行林妙高行恂南廣行制海岸行紹登岱行建南嶽行環西園行月及庵主一人雄聖行致居士一人滇南施于身囑偈祖綱目萬因聖剃度野夫元等克守師志果熟香飄光耀于師未有艾也宰官弟子員素荷鉗鎚叨承印許應驗于撒手之際者則有當湖馬嘉植培原東甌余道光孔謙李維樾拙豫慈水姚宗文益城會稽陶履卓岸生昭陽黎希淳太沖是也現闡化條于支那者則有滇南施于身青城當湖倪長玗伯屏姚江沈之恂恂如韓行甫仁甫堇江周齊曾公唯顧二榮心璧是也異日著於禪史開人正眼斯其傑然者矣師世壽七十僧臘四十有五諸凡行道巔末傳中撰次頗詳同門倪公伯屏更加表章不敢贅述茲唯據不孝侍側以後親知灼見者抆淚授管仰質高明實未能揄揚師德於萬一伏祈大君子不棄葑菲賜之采擇年月日繼席雪竇弟子行正謹狀塔銘皇清康熙歲在癸卯春正雪竇石奇和尚示寂於婁東之南廣寺越五月歸葬於甬之妙高峰從其志也丙午春二月雪竇繼席弟子山夫行正以狀來請余銘其塔余與師雖未謀面而師之行解雷耳久已隔峰相見其何能辭按狀師諱通雲號石奇系出婁東徐氏父諱調元母孫氏十歲失怙寄養姊家因篤疾間陡現一境如夢忽醒曰前途灼然有條大路何故留滯於此乃辭母告以出家之志遂脫白於本州南廣寺適往嘉定於護國寺壁間睹中峰祖師偈云蹭蹬莫隨愚伴侶蹉跎又恐落風塵悚焉猛省矢願參方因母老未果寄居隆福寺四年既而住靜虞山刺血書華嚴經遇等慈老宿令看高峰語録提究父母未生前一著服膺弗替後往藤溪聽講楞嚴聞法師舉千日學慧不如一日學佛憬然曰聽教非究竟也旋往中峰書完華嚴至瓶窯見聞谷師復到顯聖見湛然師疑情大發卒參密雲老人屢呈所見密震威叱曰待你入處硬掙後來為人手段自別于是棒下頓脫凝滯不離左右者一十三載歲丁丑於普潤院掩關三年一踞猊座問難響答機辨泉流淮海人士翕然景從辛巳應密雲師命住持台之靈鷲來年省密密親手授師衣未幾密示寂爾時得法諸弟子競各布席一方雲山渺隔弗克躬襄後事獨師一人肩之後赴景星之請景星溪山之勝甲於緱城座下英靈雲集氣吞諸方刀耕火耨不復作出山想會癸未雪竇寺燬乏主者紳士延請再四因杖策而至山空無依惟有堆雲敗葉寺址半為豪侵如河南南陽之不可問乃倚巖架屋而居先時密師記曰狗子無一隻折箸無一雙是汝住處固在雪竇也遂甘心居之以偈勉衆曰山居茆屋十餘間驀地狂風盡打翻珍重吾徒齊著力大家扶起莫生煩時諸山谷間兵寇縱橫兼之饑饉相仍所在無寧宇師恬不介意攝暴以慈伏強以忍久之皈誠向化皆為外護法堂佛殿方丈廚庫湢室次第落成二覺祖庭崢嶸壯麗頓復前規師入山所云瓊樓玉殿百草頭上全彰千丈報身瓦礫堆邊頓現非虛語矣越明年己丑赴興化黎君之請遠近信嚮者舟楫鱗比老幼肩摩諸方主席之盛罕出其右庵址宅水中邑人慮有水患方議聚財編木為衛逡巡未舉師以檀信供養所入罄付主僧紏工竣事俄而泗水忽至竟免漂溺師之力也師珍重付授絶不以佛法作人情自是兩淮吳越數千里間學道高流聞風興感競推雪竇為中流砥柱云大抵師之門庭嚴峻而存心廣大有過犯者改則許之嘗云若使人根皆端不復用諸佛菩薩出現世間矣歲丁酉婁東士紳有南廣之請師因浚鹽鐵河直達於寺以利舟行其皈命之衆倡化之隆復不啻興化時也初師矢志力扶法社自是幾四十年誓願已愜且將東歸妙高未幾疾作歷數日命二侍舉時皆以子時對乃微點首遂以是時逝越數日尚未合龕顏色如生瀕舉龕歸四明忽寺西失火僧寮俱燼而龕獨巋然人共異之乃於五月十三日抵甬窆於妙高峰之塔院溯其生于萬曆甲午二月草五日卒于康熙二年正月初十世壽七十僧臘四十有五嗟乎濟北宗風自密師弘震之後全提正令而橫身坐斷百尺無枝孰有如石奇和尚者乎其闡揚法録曰把關曰靈鷲曰景星曰雪竇曰興化曰密印六種集行世其嗣法弟子一十二人景星行常大梅行幟雪竇行正仗錫行旋金沙行研天王行林妙高行恂南廣行制海岸行紹登岱行建南嶽行環西園行月及庵主一人雄聖行致至一時紳士之真心嚮道獲受爐錘者指不勝屈也為之銘曰承源臨濟溯流楊岐密老血胤人天共推入處硬掙為人自別凜奉師言提持直捷乳峰生面千載重開二覺光明爍破埏垓靈鷲景星施設蔚隆末後涵藏妙高一峰大機大用邈不可即雪瀑虹飛今古為式康熙丙午春王二月豫告光祿大夫太傅兼太子太師吏部尚書中和殿內祕書院大學士加一級雲棲弟子金之俊大周撰後序先師幾坐道場時有言句悉命祕而弗行重實行也正弗能從為之隨時發刻不拘編次先師既往神州赤縣之鄉巖棲壑隱之士悲惋不得復見顏面謂可以解廣衆之追慕者何哉因稽往録繁復者稍加芟訂總集十五卷釐上中下三冊計近三百頁梓以世憶昔如來滅度大迦葉遣目連弟子呼提那羅漢憍梵鉢提等為如來結集法藏而那提等不忍見佛滅度並先涅槃嗚呼在正今日敢任結集哉于景星永嘉二兄得不重增傷歎康熙七年桂月中秋前二日嗣法門人行正謹識
