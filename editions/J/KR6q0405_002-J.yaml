body:
  text: 嗣法門人行正等編錄住明州雪竇山資聖禪寺語錄崇禎甲申冬師在天台景星巖明州諸檀護請住雪竇資聖禪寺越明年乙酉本郡司理夢章羅公邑侯虛谷顧公督學侍御心韋徐公請師開堂師至法座前云三世諸佛歷代祖師盡向者裏起模畫樣山僧今日當頭撞著迴避無門還見麼便陞座拈香祝聖畢次拈云者一瓣香奉為今辰請主大護法及遠近宰官孝廉文學在筵道信本寺耆宿共履泰階深明實相又拈云者一瓣香昔日靈鷲山中已曾舉出今朝資聖寺裏重復拈來爇向爐中端為傳曹溪正脈第三十四世先天童密雲大和尚用酬法乳之恩斂衣趺坐維那白椎云法筵龍象眾當觀第一義師云結個茆蓬豎法幢祝延纔爇一爐香當陽舉似分明極動地風和遍界彰還有互相激揚者麼僧問干戈擾攘天下紛爭如何是定國安邦句師云今日天晴進云黼黻宰官臨法座師提正令報皇恩師云卻被闍黎道著乃云當陽一著獨露無遮八面玲瓏十方軒豁明眼作證豈敢囊藏直得瓊樓玉殿百草頭上全彰千丈報身瓦礫堆邊頓現塵塵爾剎剎爾突出無位真人發明現成公案直饒三世諸佛歷代老古錐到來個個退身有分正當恁麼時如何水歸大海波濤靜雲到蒼梧氣象閒復舉昔日臨濟大師示眾云有一無位真人嘗在汝等諸人面門出入未證據者看看時有一僧出問云如何是無位真人濟便下禪床擒住云道道僧擬議濟托開云無位真人是甚麼乾屎橛雪峰道臨濟大似個白拈賊古雪竇明覺禪師舉云夫善竊者鬼神莫測既被雪峰覷破臨濟未是好手山僧道明覺也是個賊諸人還委悉麼且聽新雪竇頌出無位真人劈面來攔胸把住絕疑猜個中無處分賓主鐵壁銀山一拶開復白椎云諦觀法王法法王法如是下座到通玄上堂現前諸公都是英達若是覿面提持多方開示又自有我通玄和尚在何消山僧鬧處插腳雪上加霜雖然不可辜負來機借木上座為大眾通個消息以拄杖擊香几下座天童掃塔眾請上堂師云大眾者一片祖翁田地我法兄分付汝等諸人多時了也四至界限歷歷明明若待山僧指示又堪作甚麼雖然不妨有個問處秪如中心樹子猶屬阿誰良久云還委悉麼倒卻門前剎竿著復舉昔道吾禪師遷化後石霜為住持一日漸源擔鍬子入法堂從東過西從西過東霜云作麼漸云覓先師靈骨霜云洪波浩渺白浪滔天覓甚先師靈骨漸云正好著力擔鍬子便下去前者古南和尚到來舉云明向上機有出身句漸源石霜不忝同條若是正眼觀來猶帶之遶今日法兄在座山僧持拄杖直上法堂我先師靈骨不用更覓何故面目現在師云是則是也不甚容易直須知恩方解報恩還見我先師靈骨麼遂頌云先師靈骨無多子覿面誰知刺眼睛開合總教無避處一番提起一番新卓拄杖下座結冬開爐給諫馬培原象賢徐質可文學董治升單時鼎徐鍾季請上堂僧問多歲寒爐光輝今日忽遇無面目漢如何煆煉師云一棒打殺進云從他白棒當頭楔到處分明絕點塵師云看取頂門進云未審狸奴白牯還會結制也無師云渠無面目居士問拈一莖草建梵剎已竟時如何師豎拄杖進云恁麼則昔日顯禪師今朝和尚去也師云現成公案乃云當軒獨露坐斷天下舌頭覿面全彰證取自家境界直得茆堂竹戶宰輔光臨瑞氣雍雍通身和暢秪如道三世諸佛在火焰裏轉大法輪火焰為三世諸佛說法三世諸佛立地聽聽則不問且道火焰說底是甚麼法還會麼一衲蒙頭萬事休此時山僧都不會卓拄杖上堂僧問二人相戰身無寸進以何為勝師云闍黎馬頭在甚處僧喝師便打問如何是函蓋乾坤句師便打如何是隨波逐浪句師以拄杖擉云速退如何是截斷眾流句師連棒打出乃云月初一好消息今朝遍界是清霜凍得人人鼻子直卓拄杖云不煩久立檀信送法衣請上堂僧問大庾嶺頭提掇不起天童堂上覿面相呈師云者裏又作麼生僧喝師便打乃云千峰寒色萬木蕭條遍界分明道人活計所以道終日喫飯不曾咬著一粒米終日穿衣不曾挂著一縷絲既然如是提起法衣云且道者個又喚作甚麼大庾嶺頭提未得不妨檀越送將來長至上堂居士問冬至一陽生為甚麼滴水成冰師云焦磚打著連底凍進云冬至已蒙師指示今朝初四事如何師云遠春四十五進云恁麼則水盡冰消一句流通去也師云腳跟下好與三十棒進云霜風刮面侵人骨歷歷明明絕覆藏師云者裏放過不得便打乃云群陰已去一陽來復匝地普天填溝塞壑秪如迥然獨脫一句作麼生良久云萬象之中長獨露何山松柏不青青下座值雪上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了即如大雪滿長安冷光成一片是汝諸人還了也未即便了去達磨一宗掃地而盡若還未了且看天晴日出上堂僧問纔開口時請師垂棒師云為甚麼聻僧舉坐具師便打問龍藏海底布雨興雲頭角在甚麼處師云在腳下進云頭角全彰如何得隱身三昧師云試轉身看僧作轉身勢師云獅子咬人韓盧逐塊乃云一九與二九相喚不出手今朝十五日面南看北斗一喝下座上堂僧問天既普覆豎拳云因甚遮蓋者個不得師云放下著進云地職普載打圓相云為何者個脫然無底師云放下著乃云祖師心印遍界明明難辨的濟北宗乘當陽浩浩莫能觀一任山鳴谷應虎嘯風生林木淒清巖花凍結所以道映眼時若千日萬象不能逃影質凡夫只是未曾觀何得自輕而退屈雖然要承當恁麼事須是恁麼人始得昔臨濟大師在黃檗處喫三頓痛棒及見高安大愚道黃檗恁麼老婆心切臨濟即便悟去後來住個院子便道我當時在黃檗先師處喫六十痛棒猶如蒿枝拂相似而今更思一頓喫大眾他既喫六十痛棒為甚又道是蒿枝拂著相似且道臨濟意在於何委悉麼手握金鞭問歸客夜深誰共御階行擲拄杖上堂僧問踏翻滄海大地平沉藏經閣寄在甚麼處師云頂門上乃云十五日已前天不能蓋十五日已後地不能載正當十五日又道如何會麼兩彩一賽春日上堂臘月二十日春風驀地起瑞氣靄乾坤祥光照寰宇笑倒須彌山虛空盡歡喜泥牛忍俊不禁直得粉骨碎體且道是何消息逢人不可錯舉元旦上堂祝聖畢僧問如何是新年佛法師云日輪普照進云舊年佛法又如何師云匝地韶光乃豎拄杖云歲朝元旦事事成現條令斬新吾道一貫擲拄杖云會麼撒向階前高著眼看解制上堂僧問把斷千江絕滴放行萬派漰騰不把不放又作麼生師云肩橫拄杖進云與麼則剔翻爐鞴一塵不立去也師云腳跟點地也未僧豎指云嗚師便打乃云十月十五結制正月十五始解九十日內把住不通今朝放開一線露柱燈籠沒處藏身卻向十字街頭分明露布還委悉麼家家門前火把子下座義士沈世恩請上堂師云聲前一句不容擬議尋思覿面一機那許低回湊泊所以道般若如大火聚近之則燎卻面門又如按太阿劍擬之則魂驚膽落若是有大力量信得及直前擔荷去如龍得水似虎靠山便可以為無為作無作轉凡成聖點鐵成金永護正法驅除邪外是甚麼閒正恁麼時不違物義一句又作麼生山花開爛熳啼鳥弄陽春上堂僧問醒夢子規啼夜血春風影裏喚歸來未審喚得幾個回頭師云啼得血流無用處進云恁麼則百花叢裏過一葉不沾身師云不如緘口過殘春乃云春日陰晴綠柳啼鶯春雲靄靄春睡昏昏七尺單前禪和子休瞌睡好惺惺臨濟三玄三要四料揀四賓主無位真人雲門乾屎橛洞山麻三觔者裏覷得透無春無夏無古無今無彼無此覿體全真委悉麼等閒坐斷千峰頂不動干戈見太平卓拄杖下座初夏無糧居士設齋請上堂僧問棒喝交馳靈鷲親遭毒手今日更思一頓如何下手師云老僧沒氣力進云與麼則直透萬重關不住青霄外師以目顧左邊僧禮拜乃云螻蛄鳴蚯蚓出萬象不能逃影質苦菜秀王瓜生深山無地避徭征喫緊事要惺惺忍饑不暇佛法無靈通身饑火通身病幸然得自有知音喝一喝云出頭天外看誰是個般人薦亡請上堂云昔日巖頭禪師值沙汰時於河邊作渡子兩岸各挂一板有人過渡打板一下巖曰阿誰或曰要過那邊去巖即舞棹迎之一日有一婆子抱一孩兒曰呈橈舞棹即不問且道婆手中兒從甚處得來巖頭不覺手忙腳亂和聲便打誰料這婆子反有丈夫氣概便道婆生七子六個不遇知音秪者一個也不消得便拋向水中直至如今杳無消息敢問眾中還有知得老婆落處者麼若有即知今日所薦七八個孩兒總是一個鼻孔出氣若未委悉山僧為你通個消息卓拄杖一下云一二三四五六七七六五四三二一明明歷歷一毫頭摩訶般若波羅密上堂五月山房冷似冰耳邊熱句自來聞翻看近日端然異閒坐通身汗若淋冷不見熱熱不見冷冷熱俱亡無異流俗阿師且道畢竟如何卓拄杖云薰風自南來殿閣生微涼結冬上堂僧問道場繼建衲子雲臻先聖舉揚今師提唱還有差別也無師云一道神光亙古今問如何是雪竇境師云翰林松老如何是境中人師云應夢碑寒如何是人中意師便打乃云晴天日自出下雨地上濕遍界忽成冰禪和也結舌拈拄杖云拄杖子真烈傑一任缽囊高挂眉毛撕結七尺單前成獨立且道是何標格擲下云急急如律令敕上堂正說知見時知見即是心當心即知見知見即如今試問大眾作麼說即如今底事不可道鐘鳴鼓響海眾雲集坐立儼然眼眼相看老僧搖唇鼓舌說黃道黑便當得去若恁麼豈止三千里外且道畢竟如何良久云簷聲不斷經旬雨鼻孔遼天爛不知卓拄杖長至上堂僧問陰消陽長即不問如何是君師云高著眼如何是臣師云向下看如何是君臣道合師云今日不答話進云君臣道合蒙師指末後一句作麼生師云速退乃拈拄杖云今日陽生拄杖子𨁝跳上天觸著帝釋鼻孔四天王惡發將堅牢地神一摑直得冰河發燄葭管飛灰應夢碑氣靄空亭翰林松風清四起是汝諸人還覺眉毛生動麼噓一噓續宗上人請上堂一九二九有誰拈卻水肅霜明風高木落遍界突出無位真人壽量豈容計度所以道不是心不是佛不是物日面月面攢簇不得雲門露乾屎橛等閒覷透誠不惑赤灑灑莫可把天地一指萬物一馬喝一喝下座追慈請上堂問十方同聚會時如何師云喫粥喫飯僧喝師便打乃云天寒日短海枯山竭春夏秋冬生住異滅不離當處常湛然覓則知伊不可得咄休相憶庭梅香發枝頭白徐侍御心韋入山上堂晴日出雨地濕檀越昨臨門今朝是初一知音何必重拈出薦嚴請上堂僧問無位真人了無生滅正當粉骨碎身時如何師云哭泣有分進云不立一塵超物外杳無消息與人看師云望空啟告進云昔日師子臨頭白刃謂是正令全提謂是了他宿債師云腦後看進云恁麼則面目儼然師便打乃云朔風寒征鳥疾望斷白雲不見白本父母手足親雨餘山色青又青長憶江南三月裏鷓鴣啼處百花新元旦上堂僧出喝一喝云如何答話師默然進云劍為不平離寶匣藥因救病出金瓶師打一棒進云也不消得師乃云百年難遇歲朝春奼女梳籹越樣新拈拄杖云本色道人憑個事平生肝膽向人傾卓一卓下座應檀信請上堂正月二十六春風鳴萬壑大啟圓通門人人自寥廓未離兜率已降王宮未出母胎度人已畢良久云南山朵朵青兀突師誕日眾請上堂二月今朝二十五大地明明日卓午生育萬有包含今古常光現前沒處躲阿呵呵成我者師友生我者父母上堂舉世尊初生指天指地天上天下唯我獨尊師云看他通身賣俏不知是甚面孔後來雲門道我當時若見一棒打殺與狗子喫貴圖天下太平劍去久矣爾又刻舟也不知是甚麼面孔山僧恁麼道若有傍不甘的出來問雪竇又是個甚麼面孔山僧不妨向他道乃雙手策眉云還見麼一年一度娘生日白了眉毛多少莖
