body:
  text: 嗣法門人行正等編錄佛成道上堂初七初八誰無分別人情道情世法佛法南北東西恣行腳大雪滿長安填溝塞壑釋迦老子睹明星悟道人人盡知且道文殊堂裏萬菩薩是甚麼人為他羯磨良久云不得諱卻王居士等請上堂僧問劍刃交鋒當機不讓如何是臨濟宗師云特地一場愁進云君臣道合就路還家如何是曹洞宗師云白雲萬里進云杲日當空機超物外如何是雲門宗師云高著眼進云放去收來大坐當軒如何是溈仰宗師云須記熟進云月映蘆花影沉秋水如何是法眼宗師云千里萬里進云五宗綱要蒙垂示雪竇門庭是若何師便打乃云十月小陽天衲子眼皮穿覷破也奇特如何不當錢且道如何是奇特事豎拄杖云七十二棒且輕恕一百五十應放難喝一喝上堂僧問木落孤峰露雲開萬里天尋常一句子不必更重宣如何是出格底句師云老僧今日上堂進云猶是尋常底師云如何是出格底進云覿體全彰當陽獨露師云大好出格便打乃云一之日觱發兩耳聲寒鳴聒聒山河大地盡圓通直得虛空熾然說熾然說無間歇貴在諸人當下瞥瞥不瞥若要梅花撲鼻香須是一番寒徹骨喝一喝是汝諸仁不消久立拄杖一卓下座上堂臘月朔寒風作吹倒須彌山驚起撩天鶚人人鼻孔昂藏個個眉毛卓朔還見麼青山不老磨今古流水何曾洗是非上堂臘月半日輪煥高著眼快了斷不了斷豎拂子云是甚麼復一擊云只知事逐眼前過不覺老從頭上來道光上人誕請上堂僧問壽屆古稀一輪杲日正當天人逢春色十方衲僧同聚會正與麼時未審如何慶讚師云眉毛長十丈進云與麼則學人禮拜有分師云莫磕破頭僧喝師云識甚好惡乃云一年一度春一年一度老春老恰相當日輪紅杲杲人人頂𩕳上萬仞圓光腳跟下纖塵俱掃無位真人向面門上高聲喚叫看看百年三萬六千日反復原來是者漢喝一喝復舉昔日韓文公問大顛禪師云和尚春秋多少顛提起數珠示云會麼公云不會顛云晝夜一百八文公罔措又一日問首座秪如堂頭和尚道晝夜一百八意旨如何首座扣齒三下文公復問大顛顛亦如是公云信知佛法無二顛云見甚麼道理乃云無二公云適來門首接見首座亦復如是顛遂喚首座問云適來答侍郎佛法是否座云是顛便打趁出院師云大顛雖據令而行有伸無理首座喫棒有理無伸雪竇今朝忍俊不禁要為者兩個老漢分析一下打個平交雖然忽有個禪客出來道老和尚休休不如自掃門前雪莫管他人屋上霜呵呵便下座佛誕授衣拂上堂僧問紅爐燄燄法雨紛紛天上人間皆解脫銅頭鐵額總陶鎔如何是陶鎔一句師豎拂云會麼僧喝師云向甚麼處喝老僧僧擬議師云去乃云今朝四月初八世尊降誕時節山花岸柳爭妍祖意都來漏洩所以道欲識佛性義當觀時節因緣時節若至如睡忽覺如忘忽憶記得我先師住金粟時一日上堂舉起拄杖云古人道舉一不得舉二放過一著落在第二遂擲下杖云老僧落二去也且道一又如何舉便下座老和尚有年有德其力不堪若論舉一則又何難遂舉拂云雪竇舉一也汝等諸仁還見麼擊拂子云秖者個囑付山夫正上座善自護持便下座西堂冷上座誕辰請上堂問如何是主賓互換啐啄同時一句師云禮拜著進云恁麼則海不揚波千谿競注師云看取腳下堂禮拜云長鯨一吸海水盡森森露出珊瑚枝師云也難得堂一喝師便打乃云五月六月無風便熱驀地涼生好個時節是甚麼時節不見道秋江清淺深白露和煙島良哉觀世音全身入荒草雖然秪如道有物先天地無形本寂寥能為萬象主不逐四時凋一句又作麼生以拂子左右拂云還會麼昨見梧桐飄一葉今朝秋滿萬山頭便下座結冬上堂僧問千佛出興過犯彌天祖師西來自救未了未知和尚今日陞座又作麼生師云老僧有甚麼過進云爭奈傍觀者哂師云哂個甚麼僧以手撥眉云貓師便打乃云一期結制今日為首不許諸仁向外馳走團圞只在火爐頭既在火爐頭且道火爐闊多少直饒向者裏道得倜儻分明正好入此爐鞴受此鉗鎚煆煉得十成無滲漏於二六時中涵養得淳淳熟熟等閒出向人前或拈一機示一境自然賓則始終賓主則始終主賓主交參轉換落落地不致傷鋒犯手方堪為從上種草所以臨濟大師云參學人大須仔細如賓主相見便有言說往來或應物現形或全體權喜怒或現半身或乘獅子或乘象王如有真正學人便喝先拈出一個膠盆子善知識不辨是境便上他境上做模做樣學人又喝前人不肯放此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物隨學人問處即奪學人被奪抵死不放此是主看賓或有學人應一個清淨境界出善知識前善知識辨得是境把得住拋向坑裏學人言大好善知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人被枷帶鎖出善知識前善知識更與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正師云殺人刀活人劍乃上古之規繩亦今時之樞要誠不容易山僧今朝與麼舉且道還有過也無良久云若是陶淵明攢眉便歸去卓拄杖下座上堂古人道者一片田地分付來多時了也我立地待你搆去是則是誣人之罪義所難容立春上堂今日新春山僧不合向諸仁屙便下座上堂僧問光境俱忘復是何物師一喝進云除卻者個將何示人師便打乃云臘月一交單拆烏龜背上爆紋生水底凍殺跛鱉一喝下座解制上堂僧問德山棒無端誑謼平人臨濟喝覿面瞞他識者如何是賓中主師云高著眼進云大座當軒孰敢窺眼光爍破四天下如何是主中賓師云站過一邊進云佛祖到來齊按過吹毛凜凜逼人寒如何是主中主師云老僧在者裏進云踏破銕鞋無覓處相逢到處問疏親如何是賓中賓師云莫亂走進云賓主已蒙師指示辨魔揀異事如何師云與你三十棒僧喝師云亂喝乃云昨乃天童掃塔回今朝陞座示全提燈光零亂分明極觸處梅香影齊高著眼絕遲回肩橫拄杖不思議還家盡是兒孫事布袋打開任爾為以拄杖一卓下座大士成道吳門黃五芝居士薦嚴請上堂六月十九個觀音法界本無出沒身大雨狂風無間歇虛空翻覆說無生遂舉文殊大士問庵提遮女曰生以何為義女曰生以不生生為生義殊曰如何是生以不生生為生義女曰若能明知地水火風四緣未嘗自得有所和合而能隨其所宜是為生義殊曰死以何為義女曰死以不死死為死義殊曰如何是死以不死死為死義女曰若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義既如是生即無生死亦無死無死無生正是倚天長劍逼塞太虛剎剎塵塵總是個清淨法界一道大均且如今日黃五芝居士追嚴二親又在甚處安身立命良久云圓通門大啟不動體全彰下座沈尚卿居士請上堂節屆中元擊大法鼓一缽和羅解倒懸苦大眾倒懸苦已解汝等也須照顧且道照顧個甚麼以拂子左右拂云天堂佛國總由他飯裏有沙須咬破到禹門掃幻祖塔眾請上堂僧問未開口已前請師道一句師和聲便打乃云龍池法窟祖翁道場不肖兒孫今日歸來掃塔燒一炷香承我法兄堂頭和尚命兩序諸公洎及大眾請山僧陞座舉揚正法則不妨言我所欲言且道言個甚麼豎拂子云諸仁者委悉麼要知此物非他物勿可輕看當等閒喝一喝下座出隊歸上堂僧問和尚出山梯航九有津濟四生即不問如何是途中句師云到江吳地盡進云瀑飛千丈雪山鎖萬重雲如何是到家句師云隔岸越山多進云未審出山還山是同是別師云今日始安閒進云恁麼則動若行雲止猶谷神去也師便打乃云出山一載兩序頭首料理常住事事如意佛祖龍天人人歡喜山僧一向在外者邊那邊東觸西觸博得四大猶如破舟相似不堪裝載無所濟用今日要說佛法縱然有口不能說得且待來日上堂清秋七月十五是處修建盂蘭盆會解倒懸苦召眾云且道倒懸苦作麼生解豎拂子云還見麼無量壽佛在山僧拂子頭上放大光明普照三千大千世界百億日月百億四天下百億四大海百億五須彌百億欲界色界無色界於諸天宮殿內皆有菩薩四眾圍繞隨機說法各各不同頓說漸說實說權說縱橫說顯了說蓋覆說凡有所說皆說此一心法於此會得何恩不報何福不臻何苦不除何怨不解所以道若人欲了知三世一切佛應觀法界性一切惟心造擊拂子云還委悉麼諸佛於此一心成等正覺轉大法輪菩薩於此一心圓滿六度萬行緣覺於此一心洞明十二緣生聲聞於此一心三明六通證入解脫諸天於此一心高超十地人倫於此一心具足十善修羅於此一心永離憍慢地獄於此一心迥脫苦輪乃至餓鬼畜生四生十類莫不皆悟自心成自心佛所以道惟是一心法遂成十法界祖師又道覓心了不可得心既不可得佛亦不可得菩薩亦不可得緣覺亦不可得聲聞亦不可得諸天亦不可得人倫亦不可得乃至修羅地獄餓鬼畜生四生十類皆不可得正與麼時又作麼生良久云願今得果成寶王還度如是恒沙眾上堂今朝是重九不飲曹山酒東籬黃菊漸開香龍山落帽可知有衲僧行處驅風雷驚倒南辰禮北斗一喝下座戴良全良善居士請上堂九月二十一楓林葉盡赤良時作善緣底事如何說不見道生心受施淨名蚤訶有法可說世尊不許直饒無物可施無法可說佛祖無容聖凡不立猶是半珠未為全璧且道畢究如何三德六味味愈高一句了然超百億一喝下座開爐上堂十月二十虛空壁立諸方叢林開爐結制雪竇今朝亦不妨遵例記得先師柱金粟時上堂云大地分明一個爐看來渾是火柴頭老僧信手輕挑撥便解翻身動地流豎拄杖云還有恁麼底衲僧也無試出來𨁝跳看老和尚雖然一期為眾竭力大似勞而無功爭如不肖雪竇昨日草篷下偶爾火發山僧挑撥知事頭首大眾各各自解翻身盡出𨁝跳腳跟下七縱八橫一一動轉臨時不假他力蓋有一夥護法伽藍神冷地忍俊不禁把火柴頭輕輕撲滅知事頭首大眾直得一場懡㦬燈籠露柱亦不可道不懡㦬老僧亦不可道不懡㦬拄杖子亦不可道不懡㦬一喝下座正首座立僧上堂僧問把住絲毫千丈合流含碧漢放行線道乳峰吐日照雲堂正恁麼時不把不放又作麼生師便打進云和尚卻又放行去也師云高著眼僧擬議師便喝乃云獨掌不浪鳴明教與香林雪後始知松柏操夜深方見把鍼人召大眾且道誰是把鍼人若不會問取首座長至上堂召大眾晷運推移日南長至首座偷懶不肯為眾小參故討老僧氣力直得人人兩眼睜睜噓昨夜三更失卻牛天明重復遭指註一喝下座庵主靈玄密嚴領眾請上堂臘月朔恣寥廓南山燒炭北山紅萬里天邊飛一鴞會則是處生涯未會則南天台北五臺一任驢腳馬腳喝一喝復云昔有僧遊臺山問一婆子云臺山路向甚處去婆云驀直去者僧纔行三兩步婆云好個師僧又恁麼去後有僧至趙州州云待我勘過者婆子明日便去亦如是問婆亦如是答州歸謂眾云臺山婆子我為勘破了也趙州老人眼光爍破四天下只見得一邊道個勘破婆子殊不知自己卻被婆子勘破雖然一機一境一問一答一個對一個勘破有甚難秖如現前數眾總是臺山婆子又作麼生勘眾中還有勘得底麼若勘得可為衲僧若勘不得且放此話大行東剡濟松二禪德領眾請上堂天晴一月來喜見林泉雨少婦棹輕舟歌聲逐流水拄杖子驀跳上三十三天擉著帝釋鼻孔東海鯉魚打一棒雨似盆傾且道是何宗旨良久云還會麼頃教放下身心自然仁義禮智擲拄杖下座歲朝上堂舉鏡清有僧問新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啟祚萬物咸新僧云謝師答話清云鏡清今日失利有僧問明教新年頭還有佛法也無教云無僧云年年是好年日日是好日因甚卻無教云張公喫酒李公醉僧云老老大大龍頭蛇尾教云明教今日失利師云者兩個老漢等是善知識為人道有也失利道無也失利然則失利雖同其間作用似有不同一人有回天轉地之機一人有順水推舟之作若有人辨得出雪竇與他三十拄杖且道何故具擇法眼者試辨看新昌平頂山太平庵隱然上人領眾請上堂新正十日天花狼籍南海波斯與拾得寒山在庭前相笑云且喜新昌石佛供養達磨大師請天台羅漢我等總在其間並無有人識得要問老和尚設有人識得又作麼生老僧向他道雪竇山門砌造彌勒法座且為我一齊去抬石立春古杭范君瑞請上堂居士問向上一路千聖不傳如何是不傳底句師云你只一拜彀了進云和尚恁麼道是傳不傳師云再拜兩拜進云可謂慈雲彌布三千界法雨均霑大地春師云與你一棒士喝師云再喝看進云禮拜去也師便打問如何是雪竇境師云門對千尋瀑進云千丈崖瀑水競下且道誰人收得師云看腳下進云含珠林數松挺秀因甚老龍不栖師云且莫眼花進云人境已蒙師指示大地回春意若何師云頂門上薦取始得乃云東君始行令百物盡蒙春瑞氣開嘉運人惟日用親作麼說個日用親底道理不見龐居士云日用事無別惟吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號丘山絕點埃神通并妙用運水及搬柴夫如是則梅花香暖無非古佛風規流水聲長盡是道人家活驀豎拄杖云還會麼擲下云不必多言便下座程乃寧居士請上堂僧問龐居士問馬祖云不與萬法為侶者是甚麼人祖云待汝一口吸盡西江水即向汝道今日居士亦如是問未審和尚作何抵對師云一狀領過乃云二月二十五雨法雨兮擊法鼓謂是我生辰無可無不可何以不見道恁麼也得不恁麼也得恁麼不恁麼總得到者裏手擎仲尼日月腰佩佛祖靈符底丈夫自然領略得去是則是設有個目機銖兩底衲僧出來道老和尚秪如恁麼也不得不恁麼也不得恁麼不恁麼總不得又作麼生呵呵山僧被他一問只得借光於檀越向道雪竇寺裏今日有齋一喝下座黃洪振居士為母壽請上堂清和四月天梁燕語喃喃犁雨家家足青秧競插田正所謂欲識佛性義當觀時節因緣時節既至佛性義又如何識若能識得不妨同天同地同陰同陽同凡同聖同老同少同壽同康無同無異無不同無不異更說什麼七十八十春秋多少會麼千山勢到嶽邊止萬派聲歸海上消佛誕沈恂如居士請上堂值譚協鎮到山師云淨梵王宮生悉達便是今朝四月八九龍吐水降吉祥若天若人盡歡悅召大眾歡悅且置秪如道未離兜率已降王宮未出母胎度人已畢又當如何良久云委悉也無不立一塵家國盛頂天立地丈夫兒復舉昔日錢塘鎮使在界上為鎮帥時問僧其或相契即留止宿一日因二僧至遂問近離甚處云江西馬大師處帥云馬師有什麼方便僧云道即心即佛便被揖出又有二僧到亦如前問僧云非心非佛亦被揖出不得止宿師云坐籌帷幄決勝千里還他鎮帥本分作家如者二僧也須救取始得若是山僧待揖出時不妨向他道相識滿天下今朝有一人若道得者一轉語不惟令鎮帥知有行腳衲僧抑亦自己有多少光彩秪如雪竇今日護法入山款留止宿一句又作麼生相逢原故舊同喫趙州茶結夏上堂四月十五日天雨地上濕今朝結夏安居不許向外拋擲夫如是折旋俯仰無非本地風光食息起居不離自家境界一任天來龍來神來鬼來凡來聖來魔來佛來總不能動著些子所謂以大圓覺為我伽藍身心安居平等性智雖然猶涉化門未是衲僧巴鼻大眾要知衲僧巴鼻麼萬古碧潭空界月再三撈摝始應知下座西堂解上座六秩請上堂今朝五月六波斯眼光如日酷等閒爍破四天下依舊山青水綠恁麼中不恁麼不恁麼中卻恁麼又作麼生無相光中千佛現清虛一道亙常存上堂五月十五榴花噴火寶王剎海高懸直得萬歲塔與乳峰山一齊起舞且道何故國有定亂之劍家有白澤之圖蟠龍若乾禪師訃至上堂六月初一虛空迸赤泥牛走入海石人也淚出昨朝蟠龍和尚訃至卻道去歲四月八日示寂直令山僧不勝痛惜還委悉麼道義不從貧處斷交情豈向鬧中投黎瞻湛持二上座為蟠龍大師請上堂古人道舉一不得舉二放過一著落在第二雪竇舉一了也大眾還見麼若不見不妨為爾說破豎拂子云蟠龍即今在山僧拂子頭上高揮大抹換斗移星撫沒絃琴唱無生曲也爾還聞麼既聞且道音調如何遂放下拂云金雞啼上玉欄杆自有嘉聲繼高哲一喝解夏上堂七月十五日眾僧自恣時千尋瀑雪飛寒玉大丈夫兮合自知結冬牧貧知浴領台鎮葵吾司護法洎各標官請上堂一期結制要看頭采本自脫灑好便脫灑人人盡是丈夫兒眼睛休被眉毛蓋豎拄杖云看看十方諸佛諸祖師乃至天下老和尚盡在拄杖頭上各各安其居正其位眉毛卓朔立地聽虛空為鼓須彌為槌以拄杖擊香几云鼕鼕大眾還聞麼還見麼直下見處精明聞處透徹去住自由無在不在若是聞不出聲見不超色總被拄杖子穿卻鼻孔薦亡陞座昨朝十五今辰十六自從無始以至盡未來際總不出當人一念鑒覺今日普生聶居士為先考天香府君先妣李孺人超脫懺悔請山僧陞座說法也只是開悟者一念鑒覺普生居士出眾作禮師豎拄杖云鑒麼士云鑒擊香几云覺麼士云覺復云果向者裏鑒得徹覺得透直下悟去即乃無邊剎境自他不隔於毫端無邊剎境是佛境佛境即是我境一念是我念我念即是佛念佛念即是我念至於念佛念法念僧念父母念師長念眷屬念君親念天地念日月念彼念此念古念今無非是此一念十方蕩蕩寬廓無餘豈止超脫一世父母而已既然且道普生居士二親即今在甚處安身立命會麼天香觸處蓮華國萬象光中百福嚴咄比丘戒願海庵主同大心請上堂一二三四五雪竇不打禾山鼓戒光赫赫頂門圓珍重諸仁休莽鹵僧伽黎安陀會缽多羅三德六味供佛及僧法界人天普同供養且道施者是誰受者是誰誰復誰大心人兮應合知不知問取優波離一喝下座成道日新戒思明請上堂大寒臘月天頭方足底圓通身冷徹骨忍辱鎧披肩直得戒香定香慧香解脫香光明雲臺周法界看看在目前大眾還見麼見則便見切莫思量懷慈殿主泥蓋佛殿請上堂僧問階級不落是什麼人師云禮拜著進云不禮拜又作麼生師云你是個倔強漢進云學人不會請和尚指示師云將謂將謂問教中道若能轉物即同如來指座前香爐云者個是物和尚作麼生轉師云圊房裏是那個打掃進云露柱抽橫骨虛空弄爪牙師云閒言語乃云春風三日春雨維新萬物蒙濡人人生喜天上天下了無空處一聲㘞地惟我獨尊以拄杖指云大眾還見麼目前得力分明事一句當陽殿閣新下座春日僧幢萃長二上座鋪地請上堂臘月二十四平地春風起觸目見新光人人生歡喜召大眾且道歡喜甚處生來還會麼請看腳下燈節微庵監院請上堂今日元宵節連綿雨未晴家家門前火把子還有辨得底麼若無問取監院解制上堂常年解制正月十五今朝乃是二十不是有意遲延亦非無心蚤及且道因甚如此良久云還會麼試聽老僧一頌澹蕩春風徹曉晴腳跟搖動在今辰老僧坐斷乳峰頂珍重諸仁莫亂行拄杖一卓下座
