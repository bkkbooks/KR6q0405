body:
  text: 嗣法門人行正等編錄興化普潤禪院語錄師前於崇禎庚辰孟冬關期滿賓吾魏司馬鹿友吳司馬太沖黎居士等請上堂師拈香畢僧問玄關把住不容凡聖出頭今朝八字打開翻卻恒沙世界正恁麼時且道打開耶把住耶師便打進云今日已行摩竭令大千無處不稱尊師又打進云恁麼則當陽無句呈師座拂拂清風滿座前師復打乃云立問立答分主分賓直須坐斷舌頭爭容葛藤露布向者裏水不洗水金不博金赤手提持當陽顯示要令人人洞徹生死根株各各頓見本來面目去住自由縱橫無礙如獅子遊行不求伴侶所以道隨處作主遇緣即宗法隨法行法幢隨處建立驀豎拂云大眾者個是山僧拂子且喚什麼作法幢遂放下云還委悉麼眼空宇宙渾無物大座當軒孰敢窺記得臨濟大師初住河北時一日謂普化克符二人道我欲於此建立黃檗宗旨汝二人成褫我時二人珍重下去三日後普化卻上問云和尚三日前道什麼濟便拈棒打下又三日克符亦上問云和尚三日前打普化有甚事濟亦拈棒打下大眾秪如適纔者僧恁麼問山僧恁麼打且道與臨濟相去多少眾中還有為山僧證明者麼若有山僧拄杖子兩手分付若無且向別處尋討師於順治己丑三月十八日重赴檀越請到院眾請陞座師云入門個事脫體全彰佇思停機千里萬里更若踏步向前眼孔定動立問立答正是依草附木精靈豈堪持論若向衲僧門下打殺千個萬個有甚麼過秪如今日山僧與眾位居士覿面相逢一句又作麼生道相見又無事不來還憶君結夏上堂僧問大開爐鞴煆煉聖凡出格人來如何師云且站一邊進云向上宗乘如何舉唱師云揭開頂門眼進云有問有答賓主歷然無問無答時如何師云速退進云信步踏翻空界月大千無處不稱尊師打云者裏不得放過王紹箕問高峰枕子落地便悟去枕子向高峰道個甚麼高峰又悟個甚麼師便打進云雖則和盤托出未免眼裏生花師云腳跟下更與三十棒士禮拜乃云我本山中人還自山中住今復來於此只為舊賓主所以道賓則始終賓主則始終主賓主歷然便恁麼去道泰不傳天子令行人盡唱太平歌復舉昔日興化道我逢人則不出出則便為人三聖道我逢人則出出則不為人師云者兩個老漢一人有餘處不足一人不足處有餘仔細檢點將來各與三十拄杖山僧與麼批判且道是為人不為人具眼者試辨看上堂佛法門中有疑有信疑也山不是山水不是水僧不是僧俗不是俗見如不見聞如不聞信也山是山水是水僧是僧俗是俗不疑不信又作麼生良久云今辰一會應合知時上堂僧問賓主照用秪為今時格外玄機請師直指師云今日不答話進云露柱與燈籠相見又說個甚麼師云漆桶不快進云析栴檀片片皆香碎珙璧塵塵是玉師云是玉也大奇乃云昨日上堂今日陞座青山白雲裏人只知青山白雲裏事紅塵鬧市中人只知紅塵鬧市中事青山白雲紅塵鬧市一時拈卻拄杖頭邊一句又如何道行到水窮處坐看雲起時憫生上座請上堂三月昨朝過去鬧市裏磕頭撞額四月今日又來百草邊全彰揭露不來不去鶯啼古木花放園林景物舒情宗乘舉唱髑髏常于世界鼻孔摩觸家風萬里神光頂後相直下會去日費斗金初非分外脫或未然飲水也須防噎復舉黃龍示眾云有五種不易第一施者不易第二化者不易第三變生作熟不易第四端坐受供者不易第五不易聻便下座有僧問翠巖真第五不易者誰真云腦後見腮莫與往來師云是則是猶有者個在今日有人問第五不易者是誰但向伊道老僧隨例餐䭔子也得三文買草鞋卓拄杖下座清空上座請上堂四月初三眾信臨莚山僧連日勞倦不能說得拄杖子為汝指南遂豎拄杖云見麼擊禪床云聞麼聞見了然還有知恩報恩者麼若有拄杖子一期佛事功不浪施若無應須各生慚愧何故不見六祖大師道若能一念自知非自己靈光常顯現一喝擲拄杖下座鹽城眾信請陞座大盡三十日小盡二十九舉示甚現成衲僧笑破口召大眾云舉示現成又笑個甚麼山門連日有齋能有幾人咬著顧玄玉追慈請上堂群芳已謝九夏時臨覿面一機原無變易既無變易生滅何來所以道生而無生鏡裏之形滅而無滅水中之月不是目前法亦非目前事當下悟去便是文殊普賢大人境界觸處了然道無不在喝一喝云將此身心奉塵剎是則名為報恩者上堂召大眾云佛法要妙一一天真一一成現不是安排攢湊得底莫受人瞞好眾中莫有眼辨手親不受人瞞者麼若有東家杓柄長西家杓柄短七十三八十四一一無差上堂僧問四十九年不曾說和尚陞座說甚麼師云今日人無昨日多進云一句了然超百億泥牛哮吼露全機師便打乃舉普化在城市裏道明頭來明頭打暗頭來暗頭打虛空裏來虛空裏打四方八面來連架打臨濟聞之令僧問云總不與麼來時如何化云明日大悲院裏有齋師云普化與麼答話雖則超今邁古大似借他人之物為自己用若要塞斷衲僧咽喉則未得在若問山僧總不與麼來時如何但向伊道谷谷孤復聽一頌總不與麼來如何但向伊云谷谷孤雨過庭前苔蘚綠平溪水滿長新荷王紹箕居士請上堂一不得有二不得無放過一二正在平途向空劫已前明得自己即今日用不隔絲頭正好朝打三千暮打三百天高海闊雲行鳥飛腳尾腳頭橫三豎四者是山僧尋常行履諸仁如何企及古人云你有拄杖子與你拄杖子你無拄杖子奪卻你拄杖子正是有力大人可以殺一切人亦能活一切人用則星飛火發不用則海晏河清正當恁麼時用即是不用即是上堂僧問棒喝交馳即不問請師直指未問前師云海眾雲臻進云恁麼不恁麼一時坐斷時如何師云鳥飛毛落乃云昨日說今日說日日說說無說德山見人入門便棒臨濟見人入門便喝且道是何消息以拂子擊云只為分明極翻令所得遲上堂一處是處處是一人是人人是且道是個甚麼不是心不是佛不是物不是又不是個甚麼僧問雲門一言道盡時如何門云老僧在爾缽盂裏師乃哨呵大笑云大眾分明記取太和上座請上堂召大眾云今日何似昨日還委悉麼三十棒快領出去莫妨我下座蒼玄上座同孟居士請上堂當陽一著遍界不藏信手拈來清風滿目見麼見則攢花簇錦不露鋒芒不見則削跡吞聲全無向背見與不見拈了也拄杖子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾且道明甚麼邊事若道得拄杖子價增十倍道不得還歸依舊臥床頭夜半拈來打老鼠華國徐居士請上堂僧問如何是世尊不說說師云耳聾也未如何是迦葉不聞聞師云試念後句看進云見不超色聞不出聲又如何師便打進云總不與麼聻師復打乃召大眾以拂子擊香几云人天眾前不得諱卻所以道覺即了不施功一切有為法不同住相布施生天福猶如仰箭射虛空秪如不住相布施畢竟如何復擊香几云但有路可上更高人也行檀越主黎太沖居士請上堂若論此事山僧未出方丈時便乃兩手分付了豈待高陞法座鼓舌搖唇又堪作甚麼不見雪峰道望州亭與汝相見了烏石嶺與汝相見了僧堂前與汝相見了望州亭烏石嶺相見且置如何說僧堂前相見底道理莫是擊動法鼓大眾一時雲集麼莫是坐立儼然眼眼相看麼莫是你面前是我我面前是你賓主歷然麼若作與麼解不惟錯過雪峰亦乃錯過自己昔日世尊因地中見燃燈佛來布髮掩泥獻花於燃燈燈約退大眾於布髮處指云此一方地宜建梵剎眾中有一長者持一莖草於世尊指處插云建梵剎已竟看他古人一期佛事洞古輝今絲毫不間者裏還信得及麼若信得及梵剎已建智慧門開種種方便種種功德種種莊嚴種種殊勝皆不離檀越居士一念心印便與三世諸佛遞代祖師天下老和尚同一受用無二無別修如是行成如是事滿如是願獲如是福無古無今有終有始猶如善財童子一彈指入彌勒樓閣塵沙佛事一時證入種種功德種種殊勝如帝網交光互攝互入重重無礙一一融通處處周遍普令一切善不善眾生皆發菩提之心生希有想然皆居士自心之常分亦不假於他術居士如是山僧亦如是現前大眾亦如是於其中間不捨一法不留一法充塞太虛無欠無餘正當恁麼時且道如何委悉擊拂子云一毫端上通消息遍界明明不覆藏恒覺上座請上堂山僧福薄身多病陞座明明強自持道誼難辭恒老宿當陽舉似知音知大眾且道知後又作麼生你替不得我我替不得你各自歸堂喫茶去蕭居士薦慈請上堂今朝四月二十五為報禪家莫莽鹵綠水青山在目前一一證明佛淨土既然與麼則無苦忻無生滅生滅既滅寂滅現前卓拄杖云入此寂滅境證此寂滅樂復一卓下座上堂僧問如何是當陽一句師云頂門看取如何是親切一句師云且領前話乃云五月初一塺風透壁山僧為爾諸禪露個消息拈起袈裟角云休把將來胡亂搭等閒沾著便生斑端節上堂久晴不雨一雨地濕直下承當何事不畢便可以虛空為紙須彌作筆信手書個大吉千妖萬怪遠遁他方赤口白舌盡皆消滅且道應時及節一句作麼生熏風自南來殿角生微涼徐煥谷沈逵楚居士請上堂問答罷乃云當人一著不假絲毫依倚孤迥迥峭巍巍極是現成只如一問一答動轉施為皆自己神通光明發現自是諸人昧而不覺雲門大師云聞聲悟道見色明心觀世音菩薩將錢買胡餅放下手卻是饅頭且道是何消息遂以手合掌云皈依佛法僧上堂舉風穴道若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老謳歌師云秪如今日野老盡其所有而來供養又作麼生以拂子擊云要知此個真消息末後殷勤味更長解制上堂結夏來五十日了諸人本分事作麼生總饒直下承當得去山僧敢保你未徹在不見道言前薦得猶為滯殼迷封句下精通未免觸途狂見以拂子擊云敲骨打髓抽釘拔楔幾人到者裏吞吐不下醍醐上味翻成毒藥只如道有時句到意不到有時意到句不到句能鏟意意能鏟句意句交馳衲僧巴鼻猶未踏著向上闕在若有踏著底便乃高肩拄杖天下橫行若無且聽山僧自便慈水香山禪寺語錄師於庚寅春到寺眾請上堂僧問法源枯涸思甘雨纔布慈雲一眾瞻如何是祖道中興一句師云春風漸暖進云只如開山蘊良禪師道天上無彌勒地下無彌勒未免言中有刺句裏藏機如何是和尚直截為人一句師便打乃云澹蕩春風二月天山花似錦碧巖前深深古寺今來到端的無如鼻祖禪前是山門佛殿後是寢室法堂當陽坐斷一句且置拈拄杖云喚者個作什麼擊禪床云但見皇風成一片不知何處有封疆復舉前住蘊良禪師一日上堂呵呵大笑曰且道笑個甚麼笑他鴻鵠沖天飛烏龜水底逐魚兒三個老婆六隻嬭金剛背上爛如泥阿呵呵知不知東村陳大期參師云諸禪德還知也無知乃今古一如彼此無異若不知山僧今日也好一笑且道笑個甚麼笑他鴻鵠沖天飛鷦鷯只一枝都來好一笑天地我蘧廬阿呵呵奈若何喝一喝下座大悲誕日上堂僧問如何是香山境師云門前一溪水進云如何是境中人師云坐斷不知年進云恁麼則頭頭顯露處處全彰師云頂𩕳上作麼生僧喝師便打乃云南山雲北山雨春風無賴屋頭起聞見明明個是誰應須識取自家底所以雲門大師云聞聲悟道見色明心觀世音菩薩將錢買胡餅放下手卻是饅頭雖然恁麼話大似嚼飯餧嬰孩山僧則不然聞聲豈悟道見色不明心證取三摩地南無觀世音下座圓明上人請上堂僧問某甲自遠趨風和尚還受祝也無師云三千里外進云不因今日問爭識法王機師打云是什麼機進云知恩者少負恩者多師云果然乃云年年我生是今日今日我生事可知滿目桃花開笑口宛然㘞地一聲時召大眾秪如父母未生已前一句作麼生卓拄杖云委悉麼今朝二十五永嘉頭陀山密印禪寺語錄本寺請主法幢上座孔謙居士等請上堂問永嘉昔到曹溪尋師訪道雪竇今來密印為法求人一句當陽請師開演師云總在者裏進云有一人已辭雪竇不在雁宕途中有一人既到頭陀不離乳峰室內請道是什麼人境界師云莫妄想僧一喝師便打乃云永嘉祖道場法幢乃重建宰護眾檀臨山光映佛面今日山僧來普請看方便豎起拄杖云大眾見不見見則便與麼去隨處作主遇緣即宗當年本山真覺大師到曹溪時振錫三下卓然而立遂一宿而返今朝不妨有個同參若不見山僧大似勞而無功不見云宗師唱道譬如滄溟上客獨泛蘭舟月渚煙波隨情放曠欲拋香餌為待長鯨即今還有麼遂卓拄杖云三千劍客分明在那許莊周致太平復卓拄杖下座結制上堂僧問以大圓覺為伽藍個個全身在裏許為甚麼又要結制師云為你不了進云無位真人長年不出戶因甚佛眼覷不見師云莫怪老僧好問古剎重興纔開爐鞴秪如不受煆煉底人到來如何相接師云你是頑石進云無位真人現在師便打僧擬開口師以拄杖擉退乃云暮春好天氣農種及時怍道人家活計疊足倚禪床身心安居平等本際以大圓覺為我伽藍鳧脛自短鶴脛自長會則途中受用未會作世諦商量一喝下座法通寺西寺請上堂僧問祖道重光人天普集則不問願聞提唱永嘉歌師云問取真覺大師進云恁麼則取不得捨不得不可得中只麼得師云不是他語乃云夜來好雨點點不落別處且道落在甚麼處若是識機宜別休咎眼親手辨的聞著便知落處一處透處處透一法通法法通若總是聞如不聞見如不見的老僧也沒奈你何遂按拄杖云還會麼會則便會切莫思量思量難得不見道黃帝失玄珠於赤水使智索之而不得使離朱索之而不得使喫詬索之而不得使罔象而得之雖然直饒罔象得之好與三十拄杖且道罔象過在甚麼處試辨看樂清諸山請上堂佛祖家風極是峭絕要個具大信根有大力量英俊衲僧堪為持論所以古人道夫為禪客如出塞將軍你將得雲門半片胡餅來我便與半個須彌山若不如是敢稱禪客山僧則不然你將得半觔胡餅來我便與八兩匾食且道何故喝一喝下座上堂舉肅宗帝問忠國師云和尚百年後所需何物忠云與老僧造個無縫塔帝云請師塔樣忠云會麼帝云不會忠云我有付法弟子耽源卻諳此事請詔問之五祖師翁拈云前面珍珠瑪瑙後面瑪瑙珍珠左邊觀音勢至右邊普賢文殊中間一道旛被風吹著道胡盧胡盧師乃召大眾云駑馬良驥遲速不同刀斧龍泉利鈍有異山僧不惜眉毛為汝下個註腳攜拄杖下座瑞安永泉寺同平陽諸山請上堂方纔說戒今又陞座佛法重重休云話墮墮不墮誰解顧不是目前法亦非目前事且道是個甚麼若也道得三世諸佛歷代祖師性命盡屬闍黎若也道不得有口只堪喫飯下座佛誕王夔玉居士請上堂一二三四五六七八受戒羯磨虛空迸裂驚起拄杖𨁝跳擉著優波離尊者鼻孔通身是血屈屈釋迦老子年年受惡水潑且道是誰之過喝一喝林文侯舉雄請上堂昨日浩浩地今朝悄悄然一般好時節不必更尋玄召大眾云不尋玄也大奇龍生金鳳子衝破碧琉璃解制上堂不拘佛制今朝事拄杖隨拈豈大方自怪一生無定力從來熟處更難忘下座婁東南廣禪寺語錄李固山護法請上堂老病只堪藏拙訥深栖巖竇養衰殘業緣債負來相逼特地攜笻過杏山眾中有為老僧道得轉身句者不妨出眾相見僧問法幢六建祖道中興得旨歸根一句作麼生指示師云銀杏參天乃云古寺基荒久門開樓閣新大圓滿覺者自在大心人所謂於一毫端現寶王剎坐微塵裏轉大法輪豈是小根淺智者所能搆哉不見世尊當時與賢於長者同行以手指地云此處宜建一梵剎長者便於地上拈起一莖草遂插云建梵剎已竟看他長者與麼作用與麼力量與麼智慧與麼容易無他只在當人自肯便了今日太護法李固山同在筵眾信還知得麼若知無異無別無彼無此靈山一會儼在目前擊拂子下座上堂僧問如何是南廣境師云石橋古寺進云如何是南廣人師云高著眼乃云月朔月望月圓月缺一句全提萬機寢削卓拄杖云看看擲下來也咄上堂仲冬嚴寒滴水點凍河下舟楫不通豈易舉動廚庫無米少柴眾禪和休內訟看他茅簷上鴟吻𨁝跳上天法堂前露柱歡喜齊道道個甚麼不是一番寒徹骨爭得梅花撲鼻香囑徵清月西堂時值五十歷亂桃花候清陽正是時新新無上意落落見真儀觸處從緣入隨機莫易施道人行履事珍重得相宜小參冬夜小參來朝十五又冬至兩序今晚請上堂山僧赤手窮無物一棒打來兩垛墻所以道冬至月頭賣被買牛冬至月尾賣牛買被衲僧鼻孔遼天佛祖門風掃地雪竇恁麼舉揚也是欠錢遭罪除夜小參臘月三十萬事都畢更問如何若何大似胡餅裏討汁豎拄杖面赤不如語直晚參舉昔日龍門遠祖道汝等為我修造我為汝說禪我將金彈子換你們泥彈子應庵祖云若識得金彈子便知泥彈子落處若識得泥彈子便知金彈子落處師云大眾要識金彈子麼以拄杖右邊卓云者裏是要識泥彈子麼以拄杖左邊卓云者裏是還知麼直饒你知得透頂透底去正好來擔磚運木何故放過則不得拈拄杖一時打散薦慈請小參天空雲靜水碧山明岸柳鶯啼花飛古木總是顯發當人父母未生前一著滿耳滿眼無處不是未嘗有一絲頭為隔為礙皮下有血底聞恁麼道直下領取灼見生本不生死本不死不生不死處釋迦老子著眼覷他不及大悲千手提掇不起當下坐斷一念無為者裏展過足來向千聖頂𩕳上行履始有相應分昔日夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死二人互相不肯同上見大梅夾山舉問未審二人見處那個較親梅云一親一疏夾山復問那個親梅云且去明日來明日夾山再上問梅云親者不問問者不親師云大梅當日老婆太煞不能斬斷二人葛藤以致夾山後來道我當時在大梅失卻一隻眼先雪竇又云畢竟不知當時換得一隻眼大眾秪如道失卻一隻眼換得一隻眼同別在甚麼處若簡點得出也許你具一隻眼如簡點不出山僧為你下個註腳乃云失卻一隻換一隻今朝恰是四月一智禪薦母來設齋一日缽盂兩度濕參小參一度一年來一度一年去來去本無形人自生虛計虛計自不生雪晴天地春白雲三片四片遠近徘徊晴煙東起西起欲停不停便恁麼歇去敢保猶未徹在不見道動則形現覺則冰生不動不覺死水裏平沉既動既覺又未免傷鋒犯手到者裏如何展演小參大盡三十日小盡二十九今晚是除夕面南看北斗斗柄回春又首大眾二時粥飯終不借他人之小參舉五祖住太平時上堂云太平不會禪一向外邊走臘月三十夜贏得一張口且道如何是太平日自云兩片皮也不識師云五祖與麼賣弄口皮即得要是衲僧受用則未在山僧不恁麼雪竇不會禪一向家裏坐臘月三十夜分明成話墮扯索底扯索抬木底抬木谷應山鳴聲光轆轆呵呵呵夜深山寺暖烘烘個個寮房一爐火小參臘月三十夜一年已盡頭看看正是結交頭不是冤家不聚頭無別頭火爐頭撞見傅大士空手把鋤頭步行騎水牛阿呵呵只是尋常那一頭一喝除夜小參僧問烹露地白牛分歲未審甚麼人喫師云無面目人進云和尚喫得否師便打乃云大年三十夜事事俱放下只盞琉璃燈圓明空裏挂喚侍者快放下且道放下後又作麼生召大眾請去做夜課便下座小參一年忽又終光陰如電過珍重參玄人時中莫懶墮懶墮若生心廢器成無補佛法不關心禪誦生冤禍處處好躲根勤喫不勤做逢人便扯皮那管傍觀惡慚媿些子無鬼神背地吐老病忽臨頭手腳忙無措死去見閻老要把飯錢討從頭打筭來爾將何抵倒銕棒打鬼骨沸湯請洗澡若痛不可當纔想老僧道我今向汝言切莫打之遶直下自家看頂門日杲杲瞥爾肯承當更不可草草晚參尋常喫茶山僧未嘗不說話今晚說話便喚是茶話茶話說話初無有二唯人妄計執著故有差殊所以尋常日用中法法頭頭總是觸途成滯那裏得自在去大眾不可道山僧尋常二六時內並不為我們說佛說法說禪說道又不教我們參話頭做工夫如何若何總拈一條拄杖是也打不是也打不喊便罵要我們挑柴擔米運土搬磚不顧我們通身汗雨親近善知識著甚要緊今晚居士設茶供眾畢竟為我們說禪道佛法奇言妙句令我們有個會處解處一夏以來誠不空過若作與麼見解莫道喫他果子便是水也消不得不見德山道我宗無語句亦無一法與人麼山僧豈肯開著兩片皮鼓些粥飯氣埋沒汝等塗汝汝等輕欺汝等然又不可道既無言句又無一法便無佛無祖無因無果無是無非一向無將去者便是永嘉大師道底豁達空撥因果莽莽蕩蕩招殃禍大可怖畏又不可聞山僧與麼道便乃休去歇去一念萬年去萬年一念去抱個死話頭等個會處喚作黑山下鬼窟裏是守古墓底魂靈直到驢年去未得究竟在既然畢竟如何向你們道山僧者裏也無畢竟亦無無畢竟若是個英靈漢子與麼不與麼纔閒舉著剔起便行略較些子不然山僧再舉個古人公案向你們聽昔日趙州和尚問一僧云曾到此間麼僧云曾到州云喫茶去又問一僧曾到此間麼僧云未曾到州云喫茶去院主便問和尚為什麼曾到喫茶去未到亦喫茶去州便喚院主主應諾州云喫茶去你看他古人何等直截為人人自不會錯過善知識善知識何曾孤負汝來遂擊拂子云還會麼山僧為汝頌出曾到喫茶去未到喫茶去院主自不會卻來討鈍置如何是不鈍置的高聲喚云大眾喫茶去便起
