body:
  text: 嗣法門人行正等編錄機緣下僧石琴參師云你是石琴作麼彈僧云請和尚彈師便打僧問九旬禁足猶如劃地為牢個中消息請師分付師云今日風頭太冷問某甲四大本空五蘊非有和尚向什麼處行棒師云還我鼻孔來僧擬議師便打僧問喚作棒入地獄如箭必定喚作什麼師打云喚作什麼問亡僧遷化向甚處去了師云在你腳跟下僧問涅槃心易曉差別智難明請問和尚如何是差別智師云一念不生全體現六根纔動被雲遮云二俱不涉師便打僧問學人欲借一問得麼師云山僧答汝了也僧無語師便打僧問一念未生時如何師云瞎云生後如何師云瞎瞎眾禮拜次師云今日好大風維那云是師云看好殿裏佛莫教吹去眾無語師云總是泥塑木雕底也不妨得維那轉身眾隨散師笑云只消一句僧禮拜以坐具架肩云適纔和尚問本分事某甲坐具答和尚去也師云恁麼則不本分也僧拂坐具云大眾證明師便打云請和尚高著眼師直打出師舉僧問趙州狗子還有佛性也無州云無你諸人看趙州答個無字是甚麼道理眾下語皆不契維那云某有一轉語師云鷂子過新羅一居士問看世間事俱是假底不如出家還得麼師云出家亦是假底士云只苦跳不出師云既知是假用跳作麼師問僧那裏來云雲南來師云遠遠到者裏做什麼云親近和尚師云將甚麼物來親近云一物也無師豎拂子云你那裏還有者個麼云有師打云妄語漢又道一物也無晚參次師亟喚一僧入僧應云待某甲著了衣服來師云要脫得乾淨始得僧入禮拜師云禮拜底是誰云是某甲師云還信得及麼無語師云去晚參師云我今生沒色力討了許多便宜來生好做頭牛拖犁拽耙去園頭云我嘗於此切師云又是一頭云和尚來生做牛今生做個甚麼師云你明日多挑些肥去澆菜晚參師問園頭古人道鐘樓上唱讚床腳下種菜是何意旨一僧云今日大有人喪身失命師云在床腳下鐘樓上僧無語師便打正侍者趍入呈偈云某甲有個省處師云你寒熱病不曾好侍便打師一掌師云你見個什麼道理侍以腳打地云者裏還有個甚麼師云老僧未肯點頭在拈棒連打侍向前拍桌云和尚今日瞞不得某甲師云再去打兩日寒熱來侍云且喜平帖帖地便出師因廚下板響云好個消息一僧云和尚拖人落水作麼師云爭怪得居士參師問路上辛苦麼士云上下四維在腳下不曾行路見崎嶇師云爭免得東拋西擲士擬議師喝師問正侍者古人道寒時寒殺闍黎熱時熱殺闍黎你試道看侍云寒時繇他寒熱時繇他熱邑侯施清城入山問師某不曾具得大乘根器乞善知識指示一漸門師云山僧一條拄杖問著便打不曉拗直作曲云政事邊勞心勞形總曉得猛省未有了手分師云猛省個甚麼云鐘鳴漏盡底時節不堪著想向者裏做工夫去得麼師云者裏喚什麼作工夫云善惡兩途擺在面前如何趍向得恰好師豎拂子云但向者裏會恰好云睡夢時者點光明在那裏師云睡夢且置即今底在甚麼處云要睡眠時如何消遣師云睡即消遣云悟後畢竟作佛作什麼師云莫妄想云佛家規矩嚴肅不似儒門放逸師云莫分別好師赴雪竇清城施邑侯邀師入署中道話次問云達磨初來還有者般方便麼師舉茶甌云請茶僊邑龔台峨廣文問修行解脫畢竟是林下無累師云即今兩眼對兩眼累個甚麼解居士問攝心工夫師云如何是心云無處下手師云無處下手你又作麼攝云聲色之中欲透身師即以手拍桌云者是聲你向者裏透看士擬議師便喝士又欲開口師驀頭打云還要妄想僧問無所從來亦無所去是什麼人師劈面掌云是什麼人僧擬議師又掌余孔謙居士侍立次師豎起拳頭士不顧師云如何說士云沒有說便禮拜云今日為師稱壽也高唱無彊一曲歸師云與你沒交涉適一僧出禮拜師一喝士云免和尚趁出便行僧參云聞和尚久不在家故來遲師云即今也不在僧無語師云杓卜聽虛聲耿兵憲玉齊居士敘話次師云居士見得善知識多了本分一著相應也未士云要自家親到師云如何是親到底消息士云正要求和尚指示師云未舉步時就該三十棒次日居士呈偈師接云只者個還別有士禮拜師閱畢云說底不道不是秪是未在士擬進語師以手掩其口問僧那裏來云寧城師云城中米價若何云無人酬價師云你喫底是甚麼云和尚話頭也不識師打一棒云且道是賞你罰你僧擬議師以杖拄出僧參師云何來云天童師云天童和尚好麼云好師云聞得近日又落了幾個牙齒云一個師云是那一個僧豎起指頭師云不是僧喝師云你喝那個僧云喝和尚師痛打一頓挑土次一僧扁擔脫師云好個消息一僧云是甚麼消息師云不是知音不與談師入堂拈拄杖問公唯書記者個喚作甚麼唯云不可更喚作拄杖子師云畢竟喚作什麼唯一喝師云者一喝喝阿誰唯云和尚自定當師打一棒云試道一句看唯無語師打云少一棒不得師入堂垂問次公唯出禮拜師打一棒便出堂唯隨入方丈作禮師云還記得老僧答話麼唯云謝和尚慈悲師云你道他答個什麼唯無對師云請歸堂晚參次公唯問昨日蒙和尚未開口處答某甲今日請和尚開口處不答某甲師云你即今在什麼所在說恁麼話唯云貧恨一身多便出師云好與三十棒一日公唯呈偈頌師接住豎起拳云還頌得者個麼唯云道過了師云者個卻是日前的唯云切忌道著因僧問話次師問韓仁甫居士你底圓光作麼生士以指畫圓相師云不是士頓足師云除了頓足豎拳道一句看士擬議師便打士禮拜師云昔日二祖三拜得髓汝皮也不得士云一總不要師云禮拜底事又作麼生士無語師云請去僧睡虎參師云還解哮吼麼僧云老和尚須照顧眉毛師云死底有什麼用處僧云和尚前不敢造次師云過去久矣僧云某甲罪過師云知過即得僧云是師大笑師落堂公唯出云某甲正瞌睡和尚落堂來作麼師云即今醒也未唯豎拳師云不是唯擬議師打云還未醒在師打知藏一棒云者是賞你罰你藏禮拜云起動和尚師又打云畢竟作麼生藏云猶嫌少在師連打云果然問悅眾你前日一棒作麼生悅便喝師云再喝喝看悅又喝師打云亂喝悅又喝師云三喝四喝後作麼生道悅云千喝萬喝總是者喝師云你是個沒轉智底漢連棒打退顧書記云你作麼生記云孟冬嚴寒請和尚珍重師云老僧珍重你畢竟作麼生道記推倒燭架便去師云亂做直打出堂僧參問多年摸取一件布衫特請和尚安領師云快須脫卻徐聖基問昔日僧問趙州萬法歸一一歸何處州云我青州做領布衫重七觔意旨如何師指手爐云者個二錢半銀子買師削草次適眾請陞座驀豎钁云擔取去紹藏主一喝師擲下钁頭紹云只好住山師云未夢見在紹云和尚不得壓良為賤師云韓盧逐塊紹云放過和尚師云十二刻眾禮拜出居士參問不是心不是佛語未竟師便喝士禮拜師便打師至京口維揚兵憲杜子濂請相會人事畢杜問老和尚雪竇真實風光指點一二師云若論真實風光老僧無開口處杜云此間金山與雪竇是同是別師指云請自看杜云還是雪竇好師云中流砥柱也少他不得杜怡然師驀豎扇子云喚作什麼杜云扇子師復豎拳云喚作什麼杜云扇子師云錯杜云老和尚又作麼生師便喝臨別杜以贈院僧偈請看師目之打云居士也須喫三十棒杜云當得當得師笑且行杜云另日還要親到鶴林師云不得忘卻杜唯唯杜過訪茶次問云弟子有兩種事與老和尚落草得麼師云有甚事杜云二六時中作麼生管帶師云遇茶喫茶遇飯喫飯杜云三十日到又作麼生師云明日是初一又問昔維摩有病十二菩薩俱來問疾請問老和尚畢竟是有病無病師舉起藕云者藕我極喜喫如今牙齒不濟不喜他了杜云通身慶快僧參問久嚮和尚如何是為人句師云你什麼處聞得僧云大善知識因甚借學人鼻孔出氣師云從來有些子代語法幢藏主答徑山費和尚五問呈師復請師答師援筆答之問如水無筋因甚長流不斷師答為和尚高鑒如此問鵬搏峰與雁鳧峰相交且道說個甚麼師答不妨疑著問佛祖公案如空中紙鷂向什麼處收取索頭師答便與麼去問望江亭垂機且道誰是知音師答緊峭草鞋問大冶飄風未審作何形色師答瞎又云好與三十棒學人呈五問請代語昔有官人入鎮州天王院睹神像因問院主此是何功德曰護國天王曰秪護此國遍護餘國曰在秦為秦在楚為楚曰臘月二十九日打破鎮州城天王向什麼處去院主無對師代云當面不識昔有僧與童子上經了令持經著函內童子曰某甲念底著向那裏無對師代云好個伶俐童子昔有僧到曹溪守衣缽僧提起衣曰此是大庾嶺頭提不起底曰為什麼在上座手裏無對師代云得來全不費工夫泗洲塔頭侍者及時鎖門有人問既是三界大師為什麼被弟子鎖無對師代云憐兒不覺醜南泉至莊所莊主預備迎奉泉曰老僧居常出入不與人知何得排辦如此主曰昨夜土地報道和尚今日來泉曰王老師修行無力被鬼神覷見侍者便問和尚是善知識為甚被鬼神覷見泉曰土地前更著一分齋師別云你還見老僧麼謝時協居士以十問答語呈師眾禪人請師代答問天地同根萬物一體為甚又有性相分別師云錯問人人本來是佛為甚又有四生六道師云一任承當問悟後底人又云修證即不無染污即不得如何是不染污底師云汝是念言語漢問天下善知識覺後牧牛行不知還有休息也無師云不妨再問來問儒書道智者過之愚者不及如何是智愚不二處師云領取者問問致中和天地位萬物育如何是中和之處師云針錐不入問易云體用一源顯微無間不知如何理會師云拄杖子在老僧手裏問道云玄牝之門天地根不知何者是玄師云踏著秤鎚硬似銕問古人未出方丈為甚莊上喫油餈師云咬嚼幾時來問文殊是七佛之師為甚出女子定不得師云好與三十棒
